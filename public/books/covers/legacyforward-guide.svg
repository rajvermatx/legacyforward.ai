  <text x="300" y="253" text-anchor="middle" fill="#a855f7" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">Delivery</text>
  <text x="300" y="280" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">Non-deterministic</text>
  <text x="300" y="293" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">by default</text>
  <text x="300" y="350" text-anchor="middle" fill="#94a3b8" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="700">2</text>

  <rect x="380" y="200" width="120" height="180" rx="8" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="440" y="235" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">Legacy</text>
  <text x="440" y="253" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">Coexistence</text>
  <text x="440" y="280" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">Legacy is</text>
  <text x="440" y="293" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">a feature</text>
  <text x="440" y="350" text-anchor="middle" fill="#94a3b8" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="700">3</text>

