<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bgGlow-lf" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="heroGlow-lf" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bgGlow-lf)"/>
  <rect width="600" height="200" fill="#060d1a" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="190" y="52" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="-0.5">Legacy</text>
  <text x="280" y="52" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#2dd4bf" letter-spacing="-0.5">Forward</text>
  <rect x="385" y="34" width="32" height="20" rx="4" fill="#14b8a6"/>
  <text x="394" y="49" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="white">AI</text>

  <!-- Title -->
  <text x="300" y="115" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-0.5">A PRACTITIONER'S</text>
  <text x="300" y="172" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="72" font-weight="900" fill="#2dd4bf" text-anchor="middle" letter-spacing="-2">GUIDE</text>
  <line x1="160" y1="186" x2="440" y2="186" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="300" y="214" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#93c5fd" text-anchor="middle" letter-spacing="0.5">Enterprise AI Transformation</text>
  <text x="300" y="236" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="0.3">The three pillars of the LegacyForward.ai framework</text>

  <!-- Hero: Three pillars -->
  <ellipse cx="300" cy="490" rx="260" ry="170" fill="url(#heroGlow-lf)"/>

  <!-- Pillar 1: Signal Capture -->
  <g transform="translate(68, 268)">
    <!-- Glow -->
    <ellipse cx="76" cy="170" rx="60" ry="20" fill="#14b8a6" opacity="0.06"/>
    <!-- Column body -->
    <rect x="28" y="40" width="96" height="280" rx="6" fill="#0a1e1e" stroke="#14b8a6" stroke-width="1.5" opacity="0.95"/>
    <rect x="28" y="40" width="96" height="280" rx="6" fill="#14b8a6" opacity="0.05"/>
    <!-- Capital (top) -->
    <rect x="18" y="28" width="116" height="16" rx="4" fill="#0d2d2d" stroke="#14b8a6" stroke-width="1.2"/>
    <!-- Base -->
    <rect x="10" y="318" width="132" height="12" rx="4" fill="#0d2d2d" stroke="#14b8a6" stroke-width="1.2"/>
    <!-- Number -->
    <text x="76" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="900" fill="#14b8a6" text-anchor="middle" opacity="0.25">1</text>
    <!-- Icon: signal/wifi bars -->
    <rect x="58" y="128" width="10" height="30" rx="2" fill="#14b8a6" opacity="0.6"/>
    <rect x="72" y="118" width="10" height="40" rx="2" fill="#14b8a6" opacity="0.8"/>
    <rect x="86" y="108" width="10" height="50" rx="2" fill="#14b8a6" opacity="1.0"/>
    <!-- Label -->
    <text x="76" y="196" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#14b8a6" text-anchor="middle" letter-spacing="0.5">SIGNAL</text>
    <text x="76" y="212" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#14b8a6" text-anchor="middle" letter-spacing="0.5">CAPTURE</text>
    <text x="76" y="238" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Value before</text>
    <text x="76" y="250" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">technology</text>
  </g>

  <!-- Pillar 2: Grounded Delivery -->
  <g transform="translate(224, 268)">
    <ellipse cx="76" cy="170" rx="60" ry="20" fill="#a855f7" opacity="0.06"/>
    <rect x="28" y="40" width="96" height="280" rx="6" fill="#120a1e" stroke="#a855f7" stroke-width="1.5" opacity="0.95"/>
    <rect x="28" y="40" width="96" height="280" rx="6" fill="#a855f7" opacity="0.05"/>
    <rect x="18" y="28" width="116" height="16" rx="4" fill="#1a0d2e" stroke="#a855f7" stroke-width="1.2"/>
    <rect x="10" y="318" width="132" height="12" rx="4" fill="#1a0d2e" stroke="#a855f7" stroke-width="1.2"/>
    <text x="76" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="900" fill="#a855f7" text-anchor="middle" opacity="0.25">2</text>
    <!-- Icon: target/bullseye -->
    <circle cx="76" cy="138" r="22" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
    <circle cx="76" cy="138" r="14" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.85"/>
    <circle cx="76" cy="138" r="6" fill="#a855f7" opacity="0.9"/>
    <label/>
    <text x="76" y="196" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#c084fc" text-anchor="middle" letter-spacing="0.5">GROUNDED</text>
    <text x="76" y="212" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#c084fc" text-anchor="middle" letter-spacing="0.5">DELIVERY</text>
    <text x="76" y="238" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Non-deterministic</text>
    <text x="76" y="250" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">by default</text>
  </g>

  <!-- Pillar 3: Legacy Coexistence -->
  <g transform="translate(380, 268)">
    <ellipse cx="76" cy="170" rx="60" ry="20" fill="#f59e0b" opacity="0.06"/>
    <rect x="28" y="40" width="96" height="280" rx="6" fill="#1a1204" stroke="#f59e0b" stroke-width="1.5" opacity="0.95"/>
    <rect x="28" y="40" width="96" height="280" rx="6" fill="#f59e0b" opacity="0.04"/>
    <rect x="18" y="28" width="116" height="16" rx="4" fill="#1e1604" stroke="#f59e0b" stroke-width="1.2"/>
    <rect x="10" y="318" width="132" height="12" rx="4" fill="#1e1604" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="76" y="100" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="900" fill="#f59e0b" text-anchor="middle" opacity="0.25">3</text>
    <!-- Icon: interlock rings -->
    <circle cx="66" cy="138" r="16" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
    <circle cx="86" cy="138" r="16" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
    <text x="76" y="196" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="0.5">LEGACY</text>
    <text x="76" y="212" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="0.5">COEXISTENCE</text>
    <text x="76" y="238" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Legacy is</text>
    <text x="76" y="250" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">a feature</text>
  </g>

  <!-- Connecting arrows between pillars -->
  <line x1="220" y1="450" x2="232" y2="450" stroke="#334155" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="230,446 238,450 230,454" fill="#334155"/>
  <line x1="376" y1="450" x2="388" y2="450" stroke="#334155" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="386,446 394,450 386,454" fill="#334155"/>

  <!-- Footer -->
  <line x1="60" y1="690" x2="540" y2="690" stroke="#1e3a5f" stroke-width="1"/>
  <text x="300" y="722" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#cbd5e1" text-anchor="middle" letter-spacing="1">By: Samira &amp; Rajesh Verma</text>
  <text x="300" y="752" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.2em">THE LEGACYFORWARD.AI FRAMEWORK GUIDE</text>
</svg>
