  <text x="160" y="280" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">Value before</text>
  <text x="160" y="293" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">technology</text>
  <text x="160" y="350" text-anchor="middle" fill="#94a3b8" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="700">1</text>

  <rect x="240" y="200" width="120" height="180" rx="8" fill="none" stroke="#a855f7" stroke-width="2"/>
