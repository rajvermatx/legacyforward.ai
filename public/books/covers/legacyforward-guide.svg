  <line x1="222" y1="290" x2="238" y2="290" stroke="#334155" stroke-width="1.5"/>
  <line x1="362" y1="290" x2="378" y2="290" stroke="#334155" stroke-width="1.5"/>

  <!-- Title -->
  <text x="300" y="460" text-anchor="middle" fill="white" font-family="Space Grotesk, sans-serif" font-size="32" font-weight="800">A Practitioner's</text>
  <text x="300" y="500" text-anchor="middle" fill="white" font-family="Space Grotesk, sans-serif" font-size="32" font-weight="800">Guide</text>

