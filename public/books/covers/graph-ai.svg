<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bgGlow-gr" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#2a0a1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="coreGlow-gr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow-gr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9f1239" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bgGlow-gr)"/>
  <rect width="600" height="200" fill="#060d1a" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="190" y="52" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="-0.5">Legacy</text>
  <text x="280" y="52" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#2dd4bf" letter-spacing="-0.5">Forward</text>
  <rect x="385" y="34" width="32" height="20" rx="4" fill="#14b8a6"/>
  <text x="394" y="49" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="white">AI</text>

  <!-- Title -->
  <text x="300" y="118" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="64" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">GRAPH</text>
  <text x="300" y="178" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">DATABASES</text>
  <text x="300" y="228" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48" font-weight="900" fill="#fb7185" text-anchor="middle" letter-spacing="-1">FOR AI</text>
  <line x1="150" y1="242" x2="450" y2="242" stroke="#f43f5e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="300" y="268" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="400" fill="#93c5fd" text-anchor="middle" letter-spacing="0.5">From SQL to Knowledge Graphs</text>
  <text x="300" y="290" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="0.3">The data practitioner's path to graph-powered AI</text>

  <!-- Hero: Knowledge graph constellation -->
  <ellipse cx="300" cy="490" rx="250" ry="175" fill="url(#outerGlow-gr)"/>
  <ellipse cx="300" cy="490" rx="150" ry="120" fill="url(#coreGlow-gr)"/>

  <!-- Graph edges (draw first, under nodes) -->
  <line x1="300" y1="430" x2="195" y2="370" stroke="#f43f5e" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="430" x2="405" y2="370" stroke="#f43f5e" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="430" x2="195" y2="510" stroke="#fb7185" stroke-width="1.2" opacity="0.45"/>
  <line x1="300" y1="430" x2="405" y2="510" stroke="#fb7185" stroke-width="1.2" opacity="0.45"/>
  <line x1="300" y1="430" x2="300" y2="555" stroke="#f43f5e" stroke-width="1.5" opacity="0.5"/>
  <line x1="195" y1="370" x2="130" y2="430" stroke="#f43f5e" stroke-width="1" opacity="0.35"/>
  <line x1="405" y1="370" x2="470" y2="430" stroke="#f43f5e" stroke-width="1" opacity="0.35"/>
  <line x1="195" y1="510" x2="130" y2="570" stroke="#fb7185" stroke-width="1" opacity="0.30"/>
  <line x1="405" y1="510" x2="470" y2="570" stroke="#fb7185" stroke-width="1" opacity="0.30"/>
  <line x1="195" y1="370" x2="240" y2="315" stroke="#f43f5e" stroke-width="0.8" opacity="0.25"/>
  <line x1="405" y1="370" x2="360" y2="315" stroke="#f43f5e" stroke-width="0.8" opacity="0.25"/>
  <line x1="300" y1="555" x2="240" y2="610" stroke="#fb7185" stroke-width="0.8" opacity="0.25"/>
  <line x1="300" y1="555" x2="360" y2="610" stroke="#fb7185" stroke-width="0.8" opacity="0.25"/>
  <!-- Cross edges -->
  <line x1="195" y1="370" x2="405" y2="510" stroke="#f43f5e" stroke-width="0.8" opacity="0.18" stroke-dasharray="4,3"/>
  <line x1="405" y1="370" x2="195" y2="510" stroke="#f43f5e" stroke-width="0.8" opacity="0.18" stroke-dasharray="4,3"/>

  <!-- Central hub node (largest) -->
  <circle cx="300" cy="430" r="42" fill="#1a0814" stroke="#f43f5e" stroke-width="2.5"/>
  <circle cx="300" cy="430" r="34" fill="#2a0a1a" stroke="#f43f5e" stroke-width="1" opacity="0.5"/>
  <text x="300" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="700" fill="#fb7185" text-anchor="middle" letter-spacing="1">KNOWLEDGE</text>
  <text x="300" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="700" fill="#fb7185" text-anchor="middle" letter-spacing="1">GRAPH</text>
  <circle cx="300" cy="430" r="50" fill="none" stroke="#f43f5e" stroke-width="0.8" opacity="0.25"/>
  <circle cx="300" cy="430" r="62" fill="none" stroke="#f43f5e" stroke-width="0.5" opacity="0.12"/>

  <!-- Secondary nodes -->
  <!-- Top-left: Entity -->
  <circle cx="195" cy="370" r="26" fill="#1a0814" stroke="#f43f5e" stroke-width="1.8"/>
  <text x="195" y="368" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="700" fill="#fb7185" text-anchor="middle">ENTITY</text>
  <text x="195" y="380" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#f43f5e" text-anchor="middle" opacity="0.7">:Person</text>

  <!-- Top-right: Relationship -->
  <circle cx="405" cy="370" r="26" fill="#1a0814" stroke="#f43f5e" stroke-width="1.8"/>
  <text x="405" y="368" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" font-weight="700" fill="#fb7185" text-anchor="middle">RELATES</text>
  <text x="405" y="380" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#f43f5e" text-anchor="middle" opacity="0.7">:KNOWS</text>

  <!-- Left: Property -->
  <circle cx="130" cy="430" r="20" fill="#1a0814" stroke="#fb7185" stroke-width="1.2"/>
  <text x="130" cy="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#fb7185" text-anchor="middle">
    <tspan x="130" y="427">PROP</tspan>
    <tspan x="130" dy="10">ERTY</tspan>
  </text>

  <!-- Right: Index -->
  <circle cx="470" cy="430" r="20" fill="#1a0814" stroke="#fb7185" stroke-width="1.2"/>
  <text x="470" y="434" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#fb7185" text-anchor="middle">INDEX</text>

  <!-- Bottom-left: Cypher -->
  <circle cx="195" cy="510" r="22" fill="#1a0814" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="195" y="507" font-family="'Courier New', monospace" font-size="8" fill="#fb7185" text-anchor="middle">MATCH</text>
  <text x="195" y="518" font-family="'Courier New', monospace" font-size="7" fill="#f43f5e" text-anchor="middle" opacity="0.7">(n)--&gt;(m)</text>

  <!-- Bottom-right: Vector -->
  <circle cx="405" cy="510" r="22" fill="#1a0814" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="405" y="507" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="700" fill="#fb7185" text-anchor="middle">VECTOR</text>
  <text x="405" y="518" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#f43f5e" text-anchor="middle" opacity="0.7">GraphRAG</text>

  <!-- Bottom center: Traversal -->
  <circle cx="300" cy="555" r="24" fill="#1a0814" stroke="#f43f5e" stroke-width="1.8"/>
  <text x="300" y="552" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="700" fill="#fb7185" text-anchor="middle">TRAVERSE</text>
  <text x="300" y="563" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#f43f5e" text-anchor="middle" opacity="0.7">multi-hop</text>

  <!-- Outer small nodes -->
  <circle cx="130" cy="570" r="12" fill="#1a0814" stroke="#f43f5e" stroke-width="1" opacity="0.8"/>
  <text x="130" y="574" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#fb7185" text-anchor="middle" opacity="0.8">SQL</text>
  <circle cx="470" cy="570" r="12" fill="#1a0814" stroke="#f43f5e" stroke-width="1" opacity="0.8"/>
  <text x="470" y="574" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#fb7185" text-anchor="middle" opacity="0.8">Neo4j</text>
  <circle cx="240" cy="315" r="10" fill="#1a0814" stroke="#fb7185" stroke-width="1" opacity="0.6"/>
  <circle cx="360" cy="315" r="10" fill="#1a0814" stroke="#fb7185" stroke-width="1" opacity="0.6"/>
  <circle cx="240" cy="610" r="10" fill="#1a0814" stroke="#fb7185" stroke-width="1" opacity="0.5"/>
  <circle cx="360" cy="610" r="10" fill="#1a0814" stroke="#fb7185" stroke-width="1" opacity="0.5"/>

  <!-- SQL → Graph arrow (bottom-left corner decoration) -->
  <g transform="translate(58, 610)" opacity="0.5">
    <rect x="0" y="10" width="44" height="34" rx="2" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <rect x="0" y="10" width="44" height="10" rx="2" fill="#334155" opacity="0.8"/>
    <rect x="4" y="24" width="20" height="4" rx="1" fill="#475569" opacity="0.6"/>
    <rect x="4" y="32" width="30" height="4" rx="1" fill="#475569" opacity="0.4"/>
    <line x1="48" y1="27" x2="62" y2="27" stroke="#f43f5e" stroke-width="1.5"/>
    <polygon points="60,23 68,27 60,31" fill="#f43f5e"/>
  </g>

  <!-- Footer -->
  <line x1="60" y1="690" x2="540" y2="690" stroke="#1e3a5f" stroke-width="1"/>
  <text x="300" y="722" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#cbd5e1" text-anchor="middle" letter-spacing="1">By: Samira &amp; Rajesh Verma</text>
  <text x="300" y="752" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.2em">THE LEGACYFORWARD.AI SERIES · BOOK 7 OF 7</text>
</svg>
