<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">

  <!-- Background -->
  <rect width="600" height="800" fill="#0f172a"/>

  <!-- Graph network decoration (nodes + edges) -->
  <!-- Edges -->
  <line x1="480" y1="220" x2="540" y2="300" stroke="#f43f5e" stroke-width="1.2" opacity="0.15"/>
  <line x1="480" y1="220" x2="420" y2="300" stroke="#f43f5e" stroke-width="1.2" opacity="0.15"/>
  <line x1="540" y1="300" x2="500" y2="380" stroke="#f43f5e" stroke-width="1.2" opacity="0.15"/>
  <line x1="420" y1="300" x2="500" y2="380" stroke="#f43f5e" stroke-width="1.2" opacity="0.15"/>
  <line x1="420" y1="300" x2="360" y2="240" stroke="#f43f5e" stroke-width="1.2" opacity="0.10"/>
  <!-- Nodes -->
  <circle cx="480" cy="220" r="7" fill="#f43f5e" opacity="0.20"/>
  <circle cx="540" cy="300" r="5" fill="#f43f5e" opacity="0.18"/>
  <circle cx="420" cy="300" r="6" fill="#f43f5e" opacity="0.18"/>
  <circle cx="500" cy="380" r="8" fill="#f43f5e" opacity="0.16"/>
  <circle cx="360" cy="240" r="4" fill="#f43f5e" opacity="0.12"/>

  <!-- Lower network -->
  <line x1="100" y1="560" x2="60" y2="630" stroke="#f43f5e" stroke-width="1.2" opacity="0.13"/>
  <line x1="100" y1="560" x2="160" y2="620" stroke="#f43f5e" stroke-width="1.2" opacity="0.13"/>
  <line x1="160" y1="620" x2="200" y2="560" stroke="#f43f5e" stroke-width="1.2" opacity="0.10"/>
  <circle cx="100" cy="560" r="6" fill="#f43f5e" opacity="0.16"/>
  <circle cx="60" cy="630" r="4" fill="#f43f5e" opacity="0.14"/>
  <circle cx="160" cy="620" r="5" fill="#f43f5e" opacity="0.14"/>
  <circle cx="200" cy="560" r="4" fill="#f43f5e" opacity="0.12"/>

  <!-- Corner accent -->
  <polygon points="0,0 200,0 0,150" fill="#f43f5e" opacity="0.10"/>

  <!-- ── SERIES BRANDING ── -->
  <text x="300" y="18" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" letter-spacing="0.3em">THE LEGACYFORWARD.AI FRAMEWORK</text>
  <line x1="260" y1="26" x2="340" y2="26" stroke="#f43f5e" stroke-width="2"/>

  <!-- ── HEADER ── -->
  <g transform="translate(276,36) scale(1.5)">
    <rect width="32" height="32" rx="6" fill="#1e293b"/>
    <circle cx="16" cy="16" r="10" fill="none" stroke="#334155" stroke-width="1.5"/>
    <line x1="16" y1="5" x2="16" y2="7.5" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="24.5" x2="16" y2="27" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="16" x2="7.5" y2="16" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24.5" y1="16" x2="27" y2="16" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="13" y1="19" x2="22" y2="10" stroke="#f43f5e" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="22" cy="10" r="2" fill="#f43f5e"/>
    <circle cx="16" cy="16" r="2" fill="white"/>
    <circle cx="13" cy="19" r="1.5" fill="#475569"/>
  </g>

  <text x="300" y="116" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="3" fill="white" text-anchor="middle" opacity="0.9">CAREERALIGN</text>

  <!-- ── ACCENT STRIPE ── -->
  <rect x="0" y="150" width="600" height="8" fill="#f43f5e"/>

  <!-- ── MAIN CONTENT ── -->

  <rect x="60" y="210" width="4" height="240" fill="#f43f5e" rx="2"/>

  <!-- Title line 1 -->
  <text x="88" y="268" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="white" letter-spacing="-1">Graph Databases</text>
  <!-- Title line 2 -->
  <text x="88" y="322" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="white" letter-spacing="-1">for AI</text>

  <!-- Subtitle -->
  <text x="88" y="364" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" font-weight="600" fill="#f43f5e" letter-spacing="0.3">From SQL to Knowledge Graphs</text>

  <!-- Divider -->
  <line x1="88" y1="386" x2="320" y2="386" stroke="#f43f5e" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text x="88" y="408" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="0.3">19 chapters from relational to graph-powered AI</text>

  <!-- SQL to Graph visual -->
  <g opacity="0.20">
    <!-- SQL table left -->
    <rect x="88" y="438" width="120" height="80" rx="4" fill="#334155"/>
    <rect x="88" y="438" width="120" height="20" rx="4" fill="#f43f5e"/>
    <rect x="88" y="458" width="120" height="1" fill="#475569"/>
    <rect x="92" y="464" width="80" height="6" rx="2" fill="#475569"/>
    <rect x="92" y="476" width="60" height="6" rx="2" fill="#475569"/>
    <rect x="92" y="488" width="70" height="6" rx="2" fill="#475569"/>
    <!-- Arrow -->
    <line x1="218" y1="478" x2="258" y2="478" stroke="#f43f5e" stroke-width="2"/>
    <polygon points="258,474 266,478 258,482" fill="#f43f5e"/>
    <!-- Graph right -->
    <circle cx="310" cy="460" r="14" fill="#f43f5e" opacity="0.6"/>
    <circle cx="350" cy="490" r="10" fill="#f43f5e" opacity="0.5"/>
    <circle cx="290" cy="498" r="10" fill="#f43f5e" opacity="0.5"/>
    <line x1="310" y1="460" x2="350" y2="490" stroke="#f43f5e" stroke-width="1.5"/>
    <line x1="310" y1="460" x2="290" y2="498" stroke="#f43f5e" stroke-width="1.5"/>
    <line x1="350" y1="490" x2="290" y2="498" stroke="#f43f5e" stroke-width="1.5"/>
  </g>

  <!-- ── FOOTER ── -->
  <rect x="0" y="640" width="600" height="1" fill="#f43f5e" opacity="0.4"/>
  <rect x="0" y="641" width="600" height="1" fill="#f43f5e" opacity="0.15"/>

  <text x="300" y="680" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.85">CareerAlign</text>
  <text x="300" y="725" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" letter-spacing="0.2em">THE CHAOS TO CLARITY AI SERIES · BOOK 6 OF 6</text>
  <text x="300" y="760" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle" letter-spacing="1">careeralign.com</text>

</svg>
