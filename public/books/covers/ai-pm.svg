<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bgGlow-pm" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="heroGlow-pm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rocketGlow-pm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bgGlow-pm)"/>
  <rect width="600" height="200" fill="#060d1a" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="190" y="52" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="-0.5">Legacy</text>
  <text x="280" y="52" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#2dd4bf" letter-spacing="-0.5">Forward</text>
  <rect x="385" y="34" width="32" height="20" rx="4" fill="#14b8a6"/>
  <text x="394" y="49" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="white">AI</text>

  <!-- Title -->
  <text x="300" y="118" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">AI PRODUCT</text>
  <text x="300" y="180" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="58" font-weight="900" fill="#2dd4bf" text-anchor="middle" letter-spacing="-1">MANAGEMENT</text>
  <line x1="140" y1="195" x2="460" y2="195" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="300" y="225" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#93c5fd" text-anchor="middle" letter-spacing="0.5">From Value Hypothesis to Shipped Feature</text>
  <text x="300" y="248" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="0.3">The PM's guide to building AI products that stick</text>

  <!-- Hero glow -->
  <ellipse cx="300" cy="490" rx="240" ry="150" fill="url(#heroGlow-pm)"/>
  <ellipse cx="420" cy="560" rx="100" ry="80" fill="url(#rocketGlow-pm)"/>

  <!-- Swimlane background -->
  <rect x="60" y="285" width="480" height="36" rx="5" fill="#0f1e35" opacity="0.8"/>
  <rect x="60" y="331" width="480" height="36" rx="5" fill="#0f1e35" opacity="0.8"/>
  <rect x="60" y="377" width="480" height="36" rx="5" fill="#0f1e35" opacity="0.8"/>

  <!-- Lane labels -->
  <text x="78" y="308" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="700" fill="#64748b" letter-spacing="1.5">DISCOVER</text>
  <text x="78" y="354" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="700" fill="#64748b" letter-spacing="1.5">BUILD</text>
  <text x="78" y="400" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="700" fill="#64748b" letter-spacing="1.5">SHIP</text>

  <!-- DISCOVER lane bars -->
  <rect x="160" y="291" width="140" height="24" rx="3" fill="#3b82f6" opacity="0.8"/>
  <text x="230" y="307" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">User Research</text>
  <rect x="308" y="291" width="100" height="24" rx="3" fill="#3b82f6" opacity="0.55"/>
  <text x="358" y="307" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">Value Hyp.</text>
  <rect x="416" y="291" width="80" height="24" rx="3" fill="#3b82f6" opacity="0.35"/>
  <text x="456" y="307" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#93c5fd" text-anchor="middle">Prioritize</text>

  <!-- BUILD lane bars -->
  <rect x="160" y="337" width="80" height="24" rx="3" fill="#6366f1" opacity="0.5"/>
  <text x="200" y="353" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">Sprint 1</text>
  <rect x="248" y="337" width="160" height="24" rx="3" fill="#6366f1" opacity="0.9"/>
  <text x="328" y="353" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">ML Dev + Evaluation</text>
  <rect x="416" y="337" width="80" height="24" rx="3" fill="#6366f1" opacity="0.5"/>
  <text x="456" y="353" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">Review</text>

  <!-- SHIP lane bars -->
  <rect x="160" y="383" width="60" height="24" rx="3" fill="#14b8a6" opacity="0.4"/>
  <rect x="228" y="383" width="60" height="24" rx="3" fill="#14b8a6" opacity="0.4"/>
  <rect x="296" y="383" width="180" height="24" rx="3" fill="#14b8a6" opacity="0.95"/>
  <text x="386" y="399" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">Production Launch 🚀</text>

  <!-- Rocket illustration -->
  <g transform="translate(390, 430)">
    <!-- Rocket glow -->
    <ellipse cx="50" cy="100" rx="40" ry="55" fill="#14b8a6" opacity="0.08"/>
    <!-- Flame trail -->
    <ellipse cx="50" cy="155" rx="12" ry="22" fill="#f59e0b" opacity="0.5"/>
    <ellipse cx="50" cy="160" rx="7" ry="14" fill="#fbbf24" opacity="0.7"/>
    <ellipse cx="42" cy="162" rx="4" ry="10" fill="#f59e0b" opacity="0.4"/>
    <ellipse cx="58" cy="162" rx="4" ry="10" fill="#f59e0b" opacity="0.4"/>
    <!-- Body -->
    <ellipse cx="50" cy="90" rx="18" ry="55" fill="#1e3a5c" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Nose cone -->
    <ellipse cx="50" cy="38" rx="18" ry="22" fill="#2563eb"/>
    <polygon points="32,48 50,10 68,48" fill="#1d4ed8"/>
    <!-- Window -->
    <circle cx="50" cy="75" r="10" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5"/>
    <circle cx="50" cy="75" r="6" fill="#14b8a6" opacity="0.4"/>
    <circle cx="47" cy="72" r="2" fill="white" opacity="0.6"/>
    <!-- Fins -->
    <polygon points="32,120 20,145 32,135" fill="#1e3a8a"/>
    <polygon points="68,120 80,145 68,135" fill="#1e3a8a"/>
    <!-- Glow rings -->
    <circle cx="50" cy="75" r="22" fill="none" stroke="#14b8a6" stroke-width="0.8" opacity="0.3"/>
    <circle cx="50" cy="75" r="32" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- Sprint dots timeline -->
  <g opacity="0.5">
    <circle cx="160" cy="465" r="4" fill="#3b82f6"/>
    <circle cx="220" cy="465" r="4" fill="#3b82f6"/>
    <circle cx="280" cy="465" r="4" fill="#6366f1"/>
    <circle cx="340" cy="465" r="4" fill="#6366f1"/>
    <line x1="164" y1="465" x2="216" y2="465" stroke="#3b82f6" stroke-width="1"/>
    <line x1="224" y1="465" x2="276" y2="465" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="284" y1="465" x2="336" y2="465" stroke="#6366f1" stroke-width="1"/>
    <text x="160" y="480" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#64748b" text-anchor="middle">S1</text>
    <text x="220" y="480" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#64748b" text-anchor="middle">S2</text>
    <text x="280" y="480" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#64748b" text-anchor="middle">S3</text>
    <text x="340" y="480" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#64748b" text-anchor="middle">S4</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="690" x2="540" y2="690" stroke="#1e3a5f" stroke-width="1"/>
  <text x="300" y="722" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#cbd5e1" text-anchor="middle" letter-spacing="1">By: Samira &amp; Rajesh Verma</text>
  <text x="300" y="752" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.2em">THE LEGACYFORWARD.AI SERIES · BOOK 3 OF 7</text>
</svg>
