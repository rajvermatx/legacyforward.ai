<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">

  <!-- Background -->
  <rect width="600" height="800" fill="#0f172a"/>

  <!-- Top geometric accent: teal corner triangle -->
  <polygon points="0,0 160,0 0,120" fill="#14b8a6" opacity="0.18"/>

  <!-- Bottom geometric accent: teal corner triangle -->
  <polygon points="600,800 440,800 600,680" fill="#14b8a6" opacity="0.18"/>

  <!-- ── SERIES BRANDING ── -->
  <text x="300" y="18" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" letter-spacing="0.3em">THE LEGACYFORWARD.AI FRAMEWORK</text>
  <line x1="260" y1="26" x2="340" y2="26" stroke="#14b8a6" stroke-width="2"/>

  <!-- ── HEADER (top 20%) ── -->
  <!-- Compass logo, centered, scaled to 48x48 at (276,36) -->
  <g transform="translate(276,36) scale(1.5)">
    <!-- Rounded square background -->
    <rect width="32" height="32" rx="6" fill="#1e293b"/>
    <!-- Compass circle -->
    <circle cx="16" cy="16" r="10" fill="none" stroke="#334155" stroke-width="1.5"/>
    <!-- Cardinal marks -->
    <line x1="16" y1="5" x2="16" y2="7.5" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="24.5" x2="16" y2="27" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="16" x2="7.5" y2="16" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24.5" y1="16" x2="27" y2="16" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Needle NE -->
    <line x1="13" y1="19" x2="22" y2="10" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Nodes -->
    <circle cx="22" cy="10" r="2" fill="#14b8a6"/>
    <circle cx="16" cy="16" r="2" fill="white"/>
    <circle cx="13" cy="19" r="1.5" fill="#475569"/>
  </g>

  <!-- CareerAlign wordmark -->
  <text x="300" y="116" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="3" fill="white" text-anchor="middle" opacity="0.9">CAREERALIGN</text>

  <!-- ── ACCENT STRIPE ── -->
  <rect x="0" y="150" width="600" height="8" fill="#14b8a6"/>

  <!-- ── MAIN CONTENT (center 50%) ── -->

  <!-- Decorative left accent bar -->
  <rect x="60" y="220" width="4" height="220" fill="#14b8a6" rx="2"/>

  <!-- Title -->
  <text x="88" y="278" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">Agentic AI</text>

  <!-- Subtitle -->
  <text x="88" y="328" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#14b8a6" letter-spacing="0.5">Build, Ship, Portfolio</text>

  <!-- Divider dot row -->
  <circle cx="88" cy="360" r="3" fill="#14b8a6"/>
  <circle cx="104" cy="360" r="2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="116" cy="360" r="2" fill="#14b8a6" opacity="0.3"/>

  <!-- Tagline -->
  <text x="88" y="400" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="0.3">19 chapters from first agent to production</text>

  <!-- Chapter grid decoration -->
  <g opacity="0.12">
    <rect x="88" y="430" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="116" y="430" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="144" y="430" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="172" y="430" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="200" y="430" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="228" y="430" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="88" y="458" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="116" y="458" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="144" y="458" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="172" y="458" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="200" y="458" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="228" y="458" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="88" y="486" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="116" y="486" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="144" y="486" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="172" y="486" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="200" y="486" width="22" height="22" rx="3" fill="#14b8a6"/>
    <rect x="228" y="486" width="22" height="22" rx="3" fill="#14b8a6" opacity="0.5"/>
  </g>

  <!-- ── FOOTER (bottom 20%) ── -->
  <rect x="0" y="640" width="600" height="1" fill="#14b8a6" opacity="0.4"/>
  <rect x="0" y="641" width="600" height="1" fill="#14b8a6" opacity="0.15"/>

  <!-- Author -->
  <text x="300" y="680" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.85">CareerAlign</text>

  <!-- Book number -->
  <text x="300" y="725" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" letter-spacing="0.2em">THE CHAOS TO CLARITY AI SERIES · BOOK 4 OF 6</text>

  <!-- URL -->
  <text x="300" y="760" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle" letter-spacing="1">careeralign.com</text>

</svg>
