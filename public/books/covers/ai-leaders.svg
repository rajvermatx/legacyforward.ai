    <rect x="95"  y="40"  width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="125" y="40"  width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <rect x="155" y="40"  width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="185" y="40"  width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <rect x="215" y="40"  width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="245" y="40"  width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <!-- Row 2 -->
