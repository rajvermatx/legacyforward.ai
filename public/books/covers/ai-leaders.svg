<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">

  <!-- ── BACKGROUND ── -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="heroGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e6fa8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="handGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bgGlow)"/>
  <rect width="600" height="200" fill="#060d1a" opacity="0.35"/>

  <!-- ── WORDMARK TOP CENTER ── -->
  <!-- Centered group: Legacy + Forward + AI badge, total ~260px wide, centered at x=300 -->
  <text x="190" y="52" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="-0.5">Legacy</text>
  <text x="280" y="52" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#2dd4bf" letter-spacing="-0.5">Forward</text>
  <!-- AI badge, immediately after Forward -->
  <rect x="385" y="34" width="32" height="20" rx="4" fill="#14b8a6"/>
  <text x="394" y="49" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="white">AI</text>

  <!-- ── TITLE ── -->
  <text x="300" y="118" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">AI FOR</text>
  <text x="300" y="180" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">BUSINESS</text>
  <text x="300" y="242" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">LEADERS</text>

  <!-- Title underline accent -->
  <line x1="180" y1="255" x2="420" y2="255" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round"/>

