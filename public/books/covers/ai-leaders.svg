  <!-- Floating network nodes -->
  <circle cx="200" cy="370" r="4" fill="#14b8a6" opacity="0.7"/>
  <circle cx="300" cy="355" r="6" fill="#14b8a6" opacity="0.9"/>
  <circle cx="400" cy="370" r="4" fill="#14b8a6" opacity="0.7"/>
  <circle cx="155" cy="395" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="445" cy="395" r="3" fill="#93c5fd" opacity="0.5"/>
  <line x1="200" y1="370" x2="300" y2="355" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
  <line x1="300" y1="355" x2="400" y2="370" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
  <line x1="155" y1="395" x2="200" y2="370" stroke="#93c5fd" stroke-width="0.8" opacity="0.3"/>
  <line x1="400" y1="370" x2="445" y2="395" stroke="#93c5fd" stroke-width="0.8" opacity="0.3"/>
  <circle cx="300" cy="355" r="12" fill="none" stroke="#14b8a6" stroke-width="0.8" opacity="0.4"/>
  <circle cx="300" cy="355" r="20" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.2"/>

  <!-- ── FOOTER ── -->
  <line x1="60" y1="690" x2="540" y2="690" stroke="#1e3a5f" stroke-width="1"/>

  <text x="300" y="722" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#cbd5e1" text-anchor="middle" letter-spacing="1">By: Samira &amp; Rajesh Verma</text>

  <text x="300" y="752" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.2em">THE LEGACYFORWARD.AI SERIES · BOOK 1 OF 7</text>

