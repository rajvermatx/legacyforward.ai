    <rect x="95"  y="70"  width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <rect x="125" y="70"  width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="155" y="70"  width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <rect x="185" y="70"  width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="215" y="70"  width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <rect x="245" y="70"  width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <!-- Row 3 -->
    <rect x="35"  y="100" width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="65"  y="100" width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <rect x="95"  y="100" width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="125" y="100" width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <rect x="155" y="100" width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="185" y="100" width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <rect x="215" y="100" width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="245" y="100" width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <!-- Row 4 -->
    <rect x="35"  y="130" width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <rect x="65"  y="130" width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="95"  y="130" width="30" height="30" fill="#0f2239" opacity="0.9"/>
    <rect x="125" y="130" width="30" height="30" fill="#1e3a5c" opacity="0.9"/>
    <rect x="155" y="130" width="30" height="30" fill="#0f2239" opacity="0.9"/>
