  <rect x="180" y="374" width="240" height="138" rx="6" fill="#1a0a2e" stroke="#a855f7" stroke-width="2" opacity="0.95"/>
  <rect x="180" y="374" width="240" height="138" rx="6" fill="#a855f7" opacity="0.08"/>
  <text x="300" y="398" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="700" fill="#c084fc" text-anchor="middle" letter-spacing="2">AI CORE</text>

  <!-- AI components inside core -->
  <rect x="196" y="406" width="64" height="28" rx="4" fill="#2d1a4a" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
  <text x="228" y="424" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">LLM / FM</text>

  <rect x="268" y="406" width="64" height="28" rx="4" fill="#2d1a4a" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
  <text x="300" y="424" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">Agents</text>

  <rect x="340" y="406" width="64" height="28" rx="4" fill="#2d1a4a" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
  <text x="372" y="424" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#c084fc" text-anchor="middle">RAG / KB</text>

  <!-- Vector store bottom row -->
  <rect x="232" y="442" width="64" height="28" rx="4" fill="#2d1a4a" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
  <text x="264" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#818cf8" text-anchor="middle">Vector DB</text>
  <rect x="304" y="442" width="64" height="28" rx="4" fill="#2d1a4a" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
  <text x="336" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" fill="#818cf8" text-anchor="middle">MLOps</text>

  <!-- Glow pulse on AI core center -->
  <circle cx="300" cy="456" r="16" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <circle cx="300" cy="456" r="28" fill="none" stroke="#a855f7" stroke-width="0.6" opacity="0.15"/>

  <!-- Connector lines outward -->
  <line x1="300" y1="374" x2="300" y2="342" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="180" y1="443" x2="140" y2="443" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="420" y1="443" x2="460" y2="443" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="300" y1="512" x2="300" y2="548" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- Side component nodes -->
  <rect x="68" y="430" width="64" height="26" rx="4" fill="#0f1a2e" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="100" y="447" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7.5" fill="#60a5fa" text-anchor="middle">Legacy ERP</text>
  <rect x="468" y="430" width="64" height="26" rx="4" fill="#0f1a2e" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="500" y="447" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7.5" fill="#60a5fa" text-anchor="middle">Data Lake</text>
  <rect x="240" y="556" width="120" height="26" rx="4" fill="#0f1a2e" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
  <text x="300" y="573" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7.5" fill="#818cf8" text-anchor="middle">Governance / MLOps</text>

  <!-- Footer -->
  <line x1="60" y1="690" x2="540" y2="690" stroke="#1e3a5f" stroke-width="1"/>
  <text x="300" y="722" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#cbd5e1" text-anchor="middle" letter-spacing="1">By: Samira &amp; Rajesh Verma</text>
  <text x="300" y="752" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.2em">THE LEGACYFORWARD.AI SERIES · BOOK 4 OF 7</text>
</svg>
