<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bgGlow-ea" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#1a1a3e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="heroGlow-ea" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bgGlow-ea)"/>
  <rect width="600" height="200" fill="#060d1a" opacity="0.35"/>

  <!-- Blueprint grid (subtle) -->
  <line x1="0" y1="300" x2="600" y2="300" stroke="#1e1e4a" stroke-width="0.8"/>
  <line x1="0" y1="400" x2="600" y2="400" stroke="#1e1e4a" stroke-width="0.8"/>
  <line x1="0" y1="500" x2="600" y2="500" stroke="#1e1e4a" stroke-width="0.8"/>
  <line x1="0" y1="600" x2="600" y2="600" stroke="#1e1e4a" stroke-width="0.8"/>
  <line x1="150" y1="270" x2="150" y2="680" stroke="#1e1e4a" stroke-width="0.8"/>
  <line x1="300" y1="270" x2="300" y2="680" stroke="#1e1e4a" stroke-width="0.8"/>
  <line x1="450" y1="270" x2="450" y2="680" stroke="#1e1e4a" stroke-width="0.8"/>

  <!-- Wordmark -->
  <text x="190" y="52" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="-0.5">Legacy</text>
  <text x="280" y="52" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#2dd4bf" letter-spacing="-0.5">Forward</text>
  <rect x="385" y="34" width="32" height="20" rx="4" fill="#14b8a6"/>
  <text x="394" y="49" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="white">AI</text>

  <!-- Title -->
  <text x="300" y="118" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">THE AI-FIRST</text>
  <text x="300" y="180" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="58" font-weight="900" fill="#c084fc" text-anchor="middle" letter-spacing="-1">ENTERPRISE</text>
  <line x1="160" y1="193" x2="440" y2="193" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="300" y="222" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#93c5fd" text-anchor="middle" letter-spacing="0.5">An Architect's Guide to AI Transformation</text>
  <text x="300" y="245" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="0.3">Design the systems AI will run on</text>

  <!-- Hero glow -->
  <ellipse cx="300" cy="490" rx="250" ry="170" fill="url(#heroGlow-ea)"/>

  <!-- Architecture diagram: nested tier boxes -->

  <!-- Tier 4: Cloud Platform (outermost) -->
  <rect x="70" y="280" width="460" height="340" rx="8" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="86" y="298" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="700" fill="#a855f7" letter-spacing="1.5" opacity="0.8">CLOUD PLATFORM</text>
  <!-- Hex corner marks -->
  <polygon points="70,280 82,280 76,291" fill="#a855f7" opacity="0.4"/>
  <polygon points="530,280 518,280 524,291" fill="#a855f7" opacity="0.4"/>
  <polygon points="70,620 82,620 76,609" fill="#a855f7" opacity="0.4"/>
  <polygon points="530,620 518,620 524,609" fill="#a855f7" opacity="0.4"/>

  <!-- Tier 3: Integration -->
  <rect x="105" y="310" width="390" height="274" rx="6" fill="none" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="120" y="328" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="700" fill="#818cf8" letter-spacing="1.5" opacity="0.8">INTEGRATION &amp; DATA</text>

  <!-- Tier 2: Application -->
  <rect x="140" y="342" width="320" height="206" rx="5" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="155" y="360" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="700" fill="#60a5fa" letter-spacing="1.5" opacity="0.8">APPLICATION LAYER</text>

