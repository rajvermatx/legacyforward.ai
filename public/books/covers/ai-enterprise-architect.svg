<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">

  <!-- Background -->
  <rect width="600" height="800" fill="#0f172a"/>

  <!-- Geometric accent: purple hexagon-inspired background shapes -->
  <polygon points="600,0 600,200 460,0" fill="#a855f7" opacity="0.12"/>
  <polygon points="0,800 0,600 140,800" fill="#a855f7" opacity="0.12"/>

  <!-- Subtle grid lines (architectural feel) -->
  <line x1="0" y1="200" x2="600" y2="200" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="400" x2="600" y2="400" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="600" x2="600" y2="600" stroke="#1e293b" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="800" stroke="#1e293b" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="800" stroke="#1e293b" stroke-width="1"/>

  <!-- ── SERIES BRANDING ── -->
  <text x="300" y="18" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" letter-spacing="0.3em">THE LEGACYFORWARD.AI FRAMEWORK</text>
  <line x1="260" y1="26" x2="340" y2="26" stroke="#a855f7" stroke-width="2"/>

  <!-- ── HEADER (top 20%) ── -->
  <g transform="translate(276,36) scale(1.5)">
    <rect width="32" height="32" rx="6" fill="#1e293b"/>
    <circle cx="16" cy="16" r="10" fill="none" stroke="#334155" stroke-width="1.5"/>
    <line x1="16" y1="5" x2="16" y2="7.5" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="24.5" x2="16" y2="27" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="16" x2="7.5" y2="16" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24.5" y1="16" x2="27" y2="16" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Needle with purple tint for this cover, base stays teal -->
    <line x1="13" y1="19" x2="22" y2="10" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="22" cy="10" r="2" fill="#a855f7"/>
    <circle cx="16" cy="16" r="2" fill="white"/>
    <circle cx="13" cy="19" r="1.5" fill="#475569"/>
  </g>

  <text x="300" y="116" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="3" fill="white" text-anchor="middle" opacity="0.9">CAREERALIGN</text>

  <!-- ── ACCENT STRIPE ── -->
  <rect x="0" y="150" width="600" height="8" fill="#a855f7"/>

  <!-- ── MAIN CONTENT ── -->

  <!-- Decorative left accent bar -->
  <rect x="60" y="210" width="4" height="240" fill="#a855f7" rx="2"/>

  <!-- Title line 1 -->
  <text x="88" y="268" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="white" letter-spacing="-1">The AI-First</text>
  <!-- Title line 2 -->
  <text x="88" y="322" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="46" font-weight="800" fill="white" letter-spacing="-1">Enterprise</text>

  <!-- Subtitle -->
  <text x="88" y="366" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="19" font-weight="600" fill="#a855f7" letter-spacing="0.3">An Architect's Transition Guide</text>

  <!-- Divider -->
  <line x1="88" y1="388" x2="320" y2="388" stroke="#a855f7" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text x="88" y="410" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="0.3">17 chapters from strategy to operations</text>

  <!-- Architecture diagram accent (layered rectangles) -->
  <g opacity="0.15">
    <rect x="88" y="440" width="400" height="28" rx="4" fill="#a855f7"/>
    <rect x="108" y="476" width="360" height="22" rx="4" fill="#a855f7"/>
    <rect x="128" y="506" width="320" height="18" rx="4" fill="#a855f7"/>
    <rect x="148" y="532" width="280" height="14" rx="4" fill="#a855f7"/>
  </g>

  <!-- ── FOOTER ── -->
  <rect x="0" y="640" width="600" height="1" fill="#a855f7" opacity="0.4"/>
  <rect x="0" y="641" width="600" height="1" fill="#a855f7" opacity="0.15"/>

  <text x="300" y="680" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.85">CareerAlign</text>
  <text x="300" y="725" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" letter-spacing="0.2em">THE CHAOS TO CLARITY AI SERIES · BOOK 3 OF 6</text>
  <text x="300" y="760" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle" letter-spacing="1">careeralign.com</text>

</svg>
