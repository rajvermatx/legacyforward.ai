<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>LegacyForward Wordmark Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 400px;
    overflow: hidden;
  }
  body {
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .wordmark {
    display: inline-flex;
    align-items: center;
    gap: 16px;
  }
  .text {
    font-size: 80px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    white-space: nowrap;
  }
  .text .legacy {
    color: #ffffff;
  }
  .text .forward {
    color: #2dd4bf;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #14b8a6;
    color: #ffffff;
    font-size: 28px;
    font-weight: 800;
    padding: 6px 14px;
    border-radius: 8px;
    letter-spacing: 0.5px;
    line-height: 1;
  }
</style>
</head>
<body>
  <div class="wordmark">
    <span class="text"><span class="legacy">Legacy</span><span class="forward">Forward</span></span>
    <span class="badge">AI</span>
  </div>
</body>
</html>
