<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=512">
<title>LegacyForward Icon Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 512px;
    height: 512px;
    overflow: hidden;
  }
  body {
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .lf {
    font-size: 140px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -4px;
    line-height: 1;
  }
  .ai-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #14b8a6;
    color: #ffffff;
    font-size: 72px;
    font-weight: 700;
    padding: 14px 48px;
    border-radius: 24px;
    letter-spacing: 2px;
    line-height: 1;
  }
</style>
</head>
<body>
  <div class="icon">
    <span class="lf">LF</span>
    <span class="ai-badge">AI</span>
  </div>
</body>
</html>
