<svg viewBox="0 0 860 220" width="100%" xmlns="http://www.w3.org/2000/svg" aria-label="HTTP request-response cycle">
          
          <rect x="20" y="60" width="160" height="100" rx="10" fill="#f1f5f9" stroke="#2e3554"></rect>
          <text x="100" y="105" text-anchor="middle" fill="#0f172a" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="600">Your Python</text>
          <text x="100" y="122" text-anchor="middle" fill="#475569" font-family="'Nunito',sans-serif" font-size="12">Script / Service</text>
          
          <line x1="180" y1="95" x2="380" y2="95" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)"></line>
          <text x="280" y="85" text-anchor="middle" fill="#06b6d4" font-family="'Nunito',sans-serif" font-size="11">POST /v1/messages</text>
          <text x="280" y="108" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono',monospace" font-size="10">Authorization: Bearer sk-…</text>
          
          <line x1="380" y1="140" x2="180" y2="140" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr)"></line>
          <text x="280" y="157" text-anchor="middle" fill="#22d3ee" font-family="'Nunito',sans-serif" font-size="11">200 OK + JSON body</text>
          
          <rect x="390" y="60" width="180" height="100" rx="10" fill="#f1f5f9" stroke="#06b6d4"></rect>
          <text x="480" y="105" text-anchor="middle" fill="#06b6d4" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="600">LLM API</text>
          <text x="480" y="122" text-anchor="middle" fill="#475569" font-family="'Nunito',sans-serif" font-size="12">anthropic.com / openai.com</text>
          
          <line x1="570" y1="110" x2="680" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"></line>
          
          <rect x="690" y="75" width="150" height="70" rx="10" fill="#f8fafc" stroke="#2e3554"></rect>
          <text x="765" y="107" text-anchor="middle" fill="#a855f7" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600">LLM Model</text>
          <text x="765" y="122" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="11">inference</text>
          
          <text x="20" y="195" fill="#64748b" font-family="'Nunito',sans-serif" font-size="11">Headers carry auth; body carries the prompt; response carries generated text and token usage</text>
        </svg>