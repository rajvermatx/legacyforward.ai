<svg viewBox="0 0 920 190" width="100%" xmlns="http://www.w3.org/2000/svg" aria-label="API lifecycle: Code to SDK to HTTPS to Provider to Model to Response">
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#06b6d4"></polygon></marker>
      <marker id="arr-back" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto"><polygon points="8 0, 0 3, 8 6" fill="#22d3ee"></polygon></marker>
    </defs>
    <rect x="10" y="50" width="120" height="58" rx="10" fill="#f1f5f9" stroke="#2e3554"></rect>
    <text x="70" y="76" text-anchor="middle" fill="#0f172a" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600">Your Code</text>
    <text x="70" y="93" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">messages + config</text>
    <line x1="130" y1="79" x2="158" y2="79" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)"></line>
    <rect x="162" y="50" width="110" height="58" rx="10" fill="#f1f5f9" stroke="#06b6d4"></rect>
    <text x="217" y="76" text-anchor="middle" fill="#06b6d4" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600">SDK</text>
    <text x="217" y="93" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">auth + serialize</text>
    <line x1="272" y1="79" x2="300" y2="79" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)"></line>
    <rect x="304" y="50" width="120" height="58" rx="10" fill="#f1f5f9" stroke="#2e3554"></rect>
    <text x="364" y="76" text-anchor="middle" fill="#0f172a" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600">HTTPS</text>
    <text x="364" y="93" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">POST + Bearer token</text>
    <line x1="424" y1="79" x2="452" y2="79" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)"></line>
    <rect x="456" y="50" width="130" height="58" rx="10" fill="#f1f5f9" stroke="#06b6d4"></rect>
    <text x="521" y="76" text-anchor="middle" fill="#06b6d4" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600">Provider API</text>
    <text x="521" y="93" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">validate + route</text>
    <line x1="586" y1="79" x2="614" y2="79" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)"></line>
    <rect x="618" y="50" width="120" height="58" rx="10" fill="#e2e8f0" stroke="#a855f7"></rect>
    <text x="678" y="76" text-anchor="middle" fill="#a855f7" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600">LLM Model</text>
    <text x="678" y="93" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">inference</text>
    <line x1="738" y1="79" x2="766" y2="79" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)"></line>
    <rect x="770" y="50" width="130" height="58" rx="10" fill="#f1f5f9" stroke="#22c55e"></rect>
    <text x="835" y="76" text-anchor="middle" fill="#22c55e" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600">Response</text>
    <text x="835" y="93" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">text + usage + id</text>
    <path d="M 770 124 L 70 124" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr-back)"></path>
    <text x="420" y="144" text-anchor="middle" fill="#22d3ee" font-family="'Nunito',sans-serif" font-size="11">parsed response object returned to your code</text>
    <text x="10" y="178" fill="#64748b" font-family="'Nunito',sans-serif" font-size="11">Full lifecycle: application code &#8594; SDK serialization &#8594; HTTPS transport &#8594; provider routing &#8594; model inference &#8594; response</text>
  </svg>