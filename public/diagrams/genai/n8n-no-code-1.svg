<svg viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
          
          <rect x="30" y="120" width="120" height="60" rx="8" fill="#f1f5f9" stroke="#06b6d4" stroke-width="1.5"></rect>
