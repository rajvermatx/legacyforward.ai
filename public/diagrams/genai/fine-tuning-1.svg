<svg width="100%" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" style="max-width:800px;margin:0 auto;">
          
          <rect width="800" height="340" fill="#f8fafc" rx="12"></rect>

          
          <text x="400" y="32" text-anchor="middle" fill="#475569" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600" letter-spacing="0.06em">LoRA ARCHITECTURE</text>

          
          <rect x="30" y="140" width="80" height="60" rx="8" fill="#f1f5f9" stroke="#2e3554" stroke-width="1.5"></rect>
          <text x="70" y="165" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600">Input</text>
          <text x="70" y="183" text-anchor="middle" fill="#67e8f9" font-family="JetBrains Mono, monospace" font-size="12">x</text>

          
          <line x1="110" y1="170" x2="185" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowgray)"></line>
          <line x1="110" y1="170" x2="185" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowgray)"></line>

          
          <rect x="185" y="95" width="160" height="70" rx="8" fill="#e2e8f0" stroke="#2e3554" stroke-width="1.5" stroke-dasharray="5,3"></rect>
          <text x="265" y="123" text-anchor="middle" fill="#64748b" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">W&#x2080; (frozen)</text>
          <text x="265" y="143" text-anchor="middle" fill="#64748b" font-family="Space Grotesk, sans-serif" font-size="11">pretrained weights</text>
          <text x="265" y="158" text-anchor="middle" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="11">d × k</text>

          
          <text x="335" y="108" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="16">&#x1F512;</text>

          
          <rect x="185" y="200" width="80" height="70" rx="8" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1.5"></rect>
          <text x="225" y="228" text-anchor="middle" fill="#22d3ee" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">A</text>
          <text x="225" y="248" text-anchor="middle" fill="#475569" font-family="JetBrains Mono, monospace" font-size="11">r × k</text>
          <text x="225" y="263" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="10">trained</text>

          
          <line x1="265" y1="235" x2="325" y2="235" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrowcyan)"></line>

          
          <rect x="325" y="200" width="80" height="70" rx="8" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1.5"></rect>
          <text x="365" y="228" text-anchor="middle" fill="#22d3ee" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">B</text>
          <text x="365" y="248" text-anchor="middle" fill="#475569" font-family="JetBrains Mono, monospace" font-size="11">d × r</text>
          <text x="365" y="263" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="10">trained</text>

          
          <text x="296" y="225" text-anchor="middle" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="11">α/r</text>

          
          <line x1="345" y1="130" x2="530" y2="155" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowgray)"></line>

          
          <line x1="405" y1="235" x2="520" y2="185" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrowcyan)"></line>

          
          <circle cx="545" cy="170" r="24" fill="#e2e8f0" stroke="#2e3554" stroke-width="1.5"></circle>
          <text x="545" y="176" text-anchor="middle" fill="#0f172a" font-family="sans-serif" font-size="22">+</text>

          
          <line x1="569" y1="170" x2="645" y2="170" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowcyan)"></line>

          
          <rect x="645" y="140" width="80" height="60" rx="8" fill="#f1f5f9" stroke="#06b6d4" stroke-width="1.5"></rect>
          <text x="685" y="165" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600">Output</text>
          <text x="685" y="183" text-anchor="middle" fill="#67e8f9" font-family="JetBrains Mono, monospace" font-size="12">h</text>

          
          <text x="400" y="302" text-anchor="middle" fill="#475569" font-family="JetBrains Mono, monospace" font-size="12">h = W&#x2080;x + (α/r) · BAx</text>
          <text x="400" y="322" text-anchor="middle" fill="#64748b" font-family="Space Grotesk, sans-serif" font-size="11">r &lt;&lt; min(d, k) — typically r = 8 or 16</text>

          
          <text x="296" y="193" text-anchor="middle" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="10">rank r</text>
          <line x1="265" y1="198" x2="327" y2="198" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2,2"></line>

          
          <defs>
            <marker id="arrowgray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#64748b"></path>
            </marker>
            <marker id="arrowcyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"></path>
            </marker>
          </defs>
        </svg>