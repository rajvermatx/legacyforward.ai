          <text x="440" y="128" text-anchor="middle" fill="#475569" font-family="JetBrains Mono,monospace" font-size="9">web_search("query")</text>

          <line x1="510" y1="115" x2="570" y2="115" stroke="#2e3554" stroke-width="1.5" marker-end="url(#aA)"></line>

          
          <rect x="570" y="80" width="140" height="70" rx="10" fill="#f1f5f9" stroke="#f97316" stroke-width="1.5"></rect>
