<svg viewBox="0 0 900 480" width="100%" xmlns="http://www.w3.org/2000/svg" aria-label="Multi-server MCP agent setup showing agent orchestrator connected to multiple specialized MCP servers">
          <defs>
            <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#64748b"></polygon>
            </marker>
            <marker id="arr2-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#ef4444"></polygon>
            </marker>
          </defs>

          
          <rect x="300" y="20" width="300" height="100" rx="14" fill="#f8fafc" stroke="#ef4444" stroke-width="2"></rect>
          <text x="450" y="52" text-anchor="middle" fill="#ef4444" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="700">LangGraph Agent</text>
          <text x="450" y="72" text-anchor="middle" fill="#475569" font-family="'Nunito',sans-serif" font-size="11">LLM + ReAct loop</text>
          <text x="450" y="89" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">MultiServerMCPClient</text>
          <text x="450" y="105" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono',monospace" font-size="10">tools: [fs__*, db__*, search__*, browser__*]</text>

          
          <line x1="360" y1="120" x2="120" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"></line>
          <line x1="410" y1="120" x2="290" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"></line>
          <line x1="490" y1="120" x2="490" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"></line>
          <line x1="540" y1="120" x2="650" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"></line>
          <line x1="570" y1="120" x2="820" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"></line>

          
          <rect x="20" y="200" width="200" height="110" rx="11" fill="#f1f5f9" stroke="#22d3ee" stroke-width="1.5"></rect>
          <text x="120" y="225" text-anchor="middle" fill="#22d3ee" font-family="'Space Grotesk',sans-serif" font-size="12" font-weight="700">Filesystem Server</text>
          <text x="120" y="241" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">transport: stdio</text>
          <text x="120" y="258" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">fs__read_file</text>
          <text x="120" y="272" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">fs__write_file</text>
          <text x="120" y="286" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">fs__list_directory</text>
          <text x="120" y="302" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">access: /workspace only</text>

          
          <rect x="240" y="200" width="200" height="110" rx="11" fill="#f1f5f9" stroke="#f97316" stroke-width="1.5"></rect>
          <text x="340" y="225" text-anchor="middle" fill="#f97316" font-family="'Space Grotesk',sans-serif" font-size="12" font-weight="700">Postgres Server</text>
          <text x="340" y="241" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">transport: stdio</text>
          <text x="340" y="258" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">db__query</text>
          <text x="340" y="272" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">db__list_tables</text>
          <text x="340" y="286" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">db__describe_table</text>
          <text x="340" y="302" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">read-only credentials</text>

          
          <rect x="390" y="200" width="200" height="110" rx="11" fill="#f1f5f9" stroke="#6366f1" stroke-width="1.5"></rect>
          <text x="490" y="225" text-anchor="middle" fill="#6366f1" font-family="'Space Grotesk',sans-serif" font-size="12" font-weight="700">Web Search Server</text>
          <text x="490" y="241" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">transport: SSE (remote)</text>
          <text x="490" y="258" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">search__web</text>
          <text x="490" y="272" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">search__news</text>
          <text x="490" y="286" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">search__fetch_url</text>
          <text x="490" y="302" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">rate-limited: 100/hour</text>

          
          <rect x="560" y="200" width="200" height="110" rx="11" fill="#f1f5f9" stroke="#a855f7" stroke-width="1.5"></rect>
          <text x="660" y="225" text-anchor="middle" fill="#a855f7" font-family="'Space Grotesk',sans-serif" font-size="12" font-weight="700">Puppeteer Server</text>
          <text x="660" y="241" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">transport: stdio</text>
          <text x="660" y="258" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">browser__navigate</text>
          <text x="660" y="272" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">browser__screenshot</text>
          <text x="660" y="286" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">browser__click</text>
          <text x="660" y="302" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">sandboxed browser</text>

          
          <rect x="730" y="200" width="150" height="110" rx="11" fill="#f1f5f9" stroke="#22c55e" stroke-width="1.5"></rect>
          <text x="805" y="225" text-anchor="middle" fill="#22c55e" font-family="'Space Grotesk',sans-serif" font-size="12" font-weight="700">Slack Server</text>
          <text x="805" y="241" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">transport: SSE</text>
          <text x="805" y="258" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">slack__send</text>
          <text x="805" y="272" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">slack__read</text>
          <text x="805" y="286" text-anchor="middle" fill="#475569" font-family="'JetBrains Mono',monospace" font-size="10">slack__search</text>
          <text x="805" y="302" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">OAuth 2.1 auth</text>

          
          <rect x="355" y="340" width="190" height="34" rx="8" fill="#e2e8f0" stroke="#ef4444" stroke-width="1"></rect>
          <text x="450" y="358" text-anchor="middle" fill="#ef4444" font-family="'Space Grotesk',sans-serif" font-size="12" font-weight="600">Agent sees ~14 tools total</text>
          <text x="450" y="370" text-anchor="middle" fill="#475569" font-family="'Nunito',sans-serif" font-size="10">namespaced, deduplicated, schema-described</text>

          
          <text x="450" y="420" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="11">Each server is independently deployable and testable</text>
          <text x="450" y="438" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="11">Adding a new server does not require changing agent code</text>
          <text x="450" y="456" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="11">Each server can enforce its own auth, rate limits, and permissions</text>
        </svg>