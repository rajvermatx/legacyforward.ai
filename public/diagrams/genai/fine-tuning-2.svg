<svg width="100%" viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" style="max-width:820px;margin:0 auto;">
          <rect width="820" height="380" fill="#f8fafc" rx="12"></rect>
          <text x="410" y="32" text-anchor="middle" fill="#475569" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600" letter-spacing="0.06em">RLHF THREE-STAGE PIPELINE</text>

          
          <text x="130" y="60" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em">STAGE 1</text>
          <text x="410" y="60" text-anchor="middle" fill="#a855f7" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em">STAGE 2</text>
          <text x="690" y="60" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em">STAGE 3</text>

          
          <rect x="30" y="72" width="200" height="200" rx="10" fill="#f1f5f9" stroke="#06b6d4" stroke-width="1.5"></rect>
          <text x="130" y="100" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">Supervised Fine-Tuning</text>

          <rect x="55" y="115" width="150" height="36" rx="6" fill="#e2e8f0" stroke="#2e3554" stroke-width="1"></rect>
          <text x="130" y="138" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12">Pretrained Base Model</text>

          <text x="130" y="170" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="16">&#8595;</text>
          <text x="130" y="188" text-anchor="middle" fill="#475569" font-family="Space Grotesk, sans-serif" font-size="11">Human-written (prompt, response)</text>
          <text x="130" y="204" text-anchor="middle" fill="#475569" font-family="Space Grotesk, sans-serif" font-size="11">high-quality pairs</text>
          <text x="130" y="222" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="16">&#8595;</text>

          <rect x="55" y="230" width="150" height="36" rx="6" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1.5"></rect>
          <text x="130" y="253" text-anchor="middle" fill="#22d3ee" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">SFT Model (&#x03C0;_ref)</text>

          
          <line x1="230" y1="248" x2="287" y2="248" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr1)"></line>

          
          <rect x="288" y="72" width="244" height="200" rx="10" fill="#f1f5f9" stroke="#a855f7" stroke-width="1.5"></rect>
          <text x="410" y="100" text-anchor="middle" fill="#a855f7" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">Reward Model Training</text>

          <rect x="310" y="115" width="200" height="36" rx="6" fill="#e2e8f0" stroke="#2e3554" stroke-width="1"></rect>
          <text x="410" y="133" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12">SFT Model generates</text>
          <text x="410" y="148" text-anchor="middle" fill="#475569" font-family="Space Grotesk, sans-serif" font-size="11">N responses per prompt</text>

          <text x="410" y="170" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="16">&#8595;</text>
          <text x="410" y="188" text-anchor="middle" fill="#475569" font-family="Space Grotesk, sans-serif" font-size="11">Humans rank responses</text>
          <text x="410" y="204" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="16">&#8595;</text>

          <rect x="310" y="214" width="200" height="50" rx="6" fill="rgba(168,85,247,0.15)" stroke="#a855f7" stroke-width="1.5"></rect>
          <text x="410" y="235" text-anchor="middle" fill="#c084fc" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Reward Model (RM)</text>
          <text x="410" y="254" text-anchor="middle" fill="#475569" font-family="Space Grotesk, sans-serif" font-size="10">outputs scalar reward score</text>

          
          <line x1="532" y1="248" x2="584" y2="248" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr1)"></line>

          
          <rect x="585" y="72" width="205" height="200" rx="10" fill="#f1f5f9" stroke="#f59e0b" stroke-width="1.5"></rect>
          <text x="688" y="100" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">PPO Optimization</text>

          <rect x="610" y="115" width="155" height="36" rx="6" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="1"></rect>
          <text x="688" y="133" text-anchor="middle" fill="#22d3ee" font-family="Space Grotesk, sans-serif" font-size="12">Policy (SFT init)</text>
          <text x="688" y="148" text-anchor="middle" fill="#475569" font-family="Space Grotesk, sans-serif" font-size="10">generates responses</text>

          <text x="688" y="170" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="16">&#8595;</text>
          <text x="688" y="185" text-anchor="middle" fill="#475569" font-family="Space Grotesk, sans-serif" font-size="10">RM scores + KL penalty</text>
          <text x="688" y="200" text-anchor="middle" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="10">r = r_RM - &#946; KL(&#x03C0;||&#x03C0;_ref)</text>
          <text x="688" y="218" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="16">&#8595;</text>

          <rect x="610" y="228" width="155" height="36" rx="6" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"></rect>
          <text x="688" y="251" text-anchor="middle" fill="#fcd34d" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">RLHF-tuned Model</text>

          
          <path d="M 688 264 Q 688 310 620 310 Q 200 330 130 278" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr1)"></path>
          <text x="400" y="326" text-anchor="middle" fill="#64748b" font-family="Space Grotesk, sans-serif" font-size="10">KL divergence penalty keeps policy close to reference model</text>

          <defs>
            <marker id="arr1" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L7,3 z" fill="#64748b"></path>
            </marker>
          </defs>
        </svg>