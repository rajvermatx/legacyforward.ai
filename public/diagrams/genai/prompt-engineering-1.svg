<svg viewBox="0 0 760 340" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
          <defs>
            <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#f97316"></path>
            </marker>
          </defs>

          
          <text x="380" y="28" text-anchor="middle" fill="#0f172a" font-size="14" font-weight="700" font-family="'Space Grotesk', sans-serif">Few-Shot Prompt Structure</text>

          
          <rect x="30" y="50" width="700" height="52" rx="8" fill="#f1f5f9" stroke="#f97316" stroke-width="1.5"></rect>
          <text x="50" y="72" fill="#f97316" font-size="11" font-weight="700" letter-spacing="1" font-family="'Space Grotesk', sans-serif">SYSTEM</text>
          <text x="50" y="90" fill="#475569" font-size="12">You are a sentiment classifier. Respond with exactly one word: Positive, Negative, or Neutral.</text>

          
          <rect x="30" y="118" width="700" height="52" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"></rect>
          <text x="50" y="138" fill="#67e8f9" font-size="11" font-weight="700" letter-spacing="1" font-family="'Space Grotesk', sans-serif">EXAMPLE 1 · USER</text>
          <text x="50" y="156" fill="#475569" font-size="12">The product exceeded my expectations in every way.</text>
          <rect x="30" y="176" width="700" height="36" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"></rect>
          <text x="50" y="190" fill="#a855f7" font-size="11" font-weight="700" letter-spacing="1" font-family="'Space Grotesk', sans-serif">EXAMPLE 1 · ASSISTANT</text>
          <text x="50" y="206" fill="#86efac" font-size="12">Positive</text>

          
          <rect x="30" y="222" width="700" height="36" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"></rect>
          <text x="50" y="237" fill="#67e8f9" font-size="11" font-weight="700" letter-spacing="1" font-family="'Space Grotesk', sans-serif">EXAMPLE 2 · USER</text>
          <text x="50" y="252" fill="#475569" font-size="12">Took forever to arrive and the packaging was damaged.</text>
          <rect x="30" y="264" width="700" height="36" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"></rect>
          <text x="50" y="278" fill="#a855f7" font-size="11" font-weight="700" letter-spacing="1" font-family="'Space Grotesk', sans-serif">EXAMPLE 2 · ASSISTANT</text>
          <text x="50" y="294" fill="#86efac" font-size="12">Negative</text>

          
          <rect x="30" y="308" width="700" height="24" rx="8" fill="rgba(249,115,22,0.12)" stroke="#f97316" stroke-width="1.5"></rect>
          <text x="50" y="324" fill="#f97316" font-size="11" font-weight="700" letter-spacing="1" font-family="'Space Grotesk', sans-serif">LIVE USER QUERY  →  "It was okay, nothing special."   &lt;model predicts&gt;   Neutral</text>
        </svg>