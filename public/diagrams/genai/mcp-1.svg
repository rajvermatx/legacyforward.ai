<svg viewBox="0 0 900 420" width="100%" xmlns="http://www.w3.org/2000/svg" aria-label="MCP Architecture diagram showing Host, Client, and Server layers with transport options">
          <defs>
            <marker id="arr-mcp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#64748b"></polygon>
            </marker>
            <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#ef4444"></polygon>
            </marker>
            <marker id="arr-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"></polygon>
            </marker>
          </defs>

          
          <rect x="20" y="40" width="280" height="340" rx="14" fill="#f8fafc" stroke="#2e3554" stroke-width="1.5"></rect>
          <text x="160" y="68" text-anchor="middle" fill="#0f172a" font-family="'Space Grotesk',sans-serif" font-size="14" font-weight="700">MCP HOST</text>
          <text x="160" y="86" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="11">e.g. Claude Desktop, LangGraph App</text>

          
          <rect x="44" y="100" width="232" height="56" rx="9" fill="#e2e8f0" stroke="#6366f1" stroke-width="1.5"></rect>
          <text x="160" y="124" text-anchor="middle" fill="#6366f1" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600">Language Model</text>
          <text x="160" y="140" text-anchor="middle" fill="#475569" font-family="'Nunito',sans-serif" font-size="11">reads tool list, decides to call tools</text>

          
          <rect x="44" y="178" width="232" height="56" rx="9" fill="#f1f5f9" stroke="#ef4444" stroke-width="1.5"></rect>
          <text x="160" y="203" text-anchor="middle" fill="#ef4444" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="600">MCP Client</text>
          <text x="160" y="219" text-anchor="middle" fill="#475569" font-family="'Nunito',sans-serif" font-size="11">manages connections, translates calls</text>

          
          <line x1="160" y1="156" x2="160" y2="176" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-mcp)"></line>

          
          <rect x="44" y="256" width="104" height="36" rx="7" fill="#0b0d14" stroke="#cbd5e1"></rect>
          <text x="96" y="274" text-anchor="middle" fill="#22d3ee" font-family="'Space Grotesk',sans-serif" font-size="12" font-weight="600">stdio</text>
          <text x="96" y="286" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">local process</text>

          <rect x="172" y="256" width="104" height="36" rx="7" fill="#0b0d14" stroke="#cbd5e1"></rect>
          <text x="224" y="274" text-anchor="middle" fill="#a855f7" font-family="'Space Grotesk',sans-serif" font-size="12" font-weight="600">SSE / HTTP</text>
          <text x="224" y="286" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="10">remote server</text>

          
          <text x="160" y="325" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="11">JSON-RPC 2.0 framing</text>
          <rect x="60" y="332" width="200" height="24" rx="5" fill="#0b0d14" stroke="#1a1f34"></rect>
          <text x="160" y="348" text-anchor="middle" fill="#64748b" font-family="'JetBrains Mono',monospace" font-size="10">tools/list · tools/call · resources/read</text>

          
          <line x1="300" y1="206" x2="370" y2="140" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-cyan)"></line>
          <line x1="300" y1="206" x2="370" y2="240" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-cyan)"></line>
          <line x1="300" y1="206" x2="370" y2="340" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"></line>

          
          <rect x="372" y="100" width="240" height="90" rx="11" fill="#f8fafc" stroke="#22d3ee" stroke-width="1.5"></rect>
          <text x="492" y="126" text-anchor="middle" fill="#22d3ee" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="700">MCP Server (local)</text>
          <text x="492" y="143" text-anchor="middle" fill="#475569" font-family="'Nunito',sans-serif" font-size="11">e.g. filesystem, sqlite, git</text>
          
          <rect x="388" y="154" width="60" height="22" rx="5" fill="#e2e8f0" stroke="#cbd5e1"></rect>
          <text x="418" y="169" text-anchor="middle" fill="#67e8f9" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="600">Tools</text>
          <rect x="456" y="154" width="68" height="22" rx="5" fill="#e2e8f0" stroke="#cbd5e1"></rect>
          <text x="490" y="169" text-anchor="middle" fill="#86efac" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="600">Resources</text>
          <rect x="532" y="154" width="64" height="22" rx="5" fill="#e2e8f0" stroke="#cbd5e1"></rect>
          <text x="564" y="169" text-anchor="middle" fill="#fca5a5" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="600">Prompts</text>

          
          <rect x="372" y="210" width="240" height="72" rx="11" fill="#f8fafc" stroke="#22d3ee" stroke-width="1.5"></rect>
          <text x="492" y="234" text-anchor="middle" fill="#22d3ee" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="700">MCP Server (local)</text>
          <text x="492" y="251" text-anchor="middle" fill="#475569" font-family="'Nunito',sans-serif" font-size="11">e.g. puppeteer browser automation</text>
          <rect x="388" y="259" width="60" height="18" rx="4" fill="#e2e8f0" stroke="#cbd5e1"></rect>
          <text x="418" y="271" text-anchor="middle" fill="#67e8f9" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="600">Tools</text>

          
          <rect x="372" y="302" width="240" height="72" rx="11" fill="#f8fafc" stroke="#a855f7" stroke-width="1.5"></rect>
          <text x="492" y="326" text-anchor="middle" fill="#a855f7" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="700">MCP Server (remote)</text>
          <text x="492" y="343" text-anchor="middle" fill="#475569" font-family="'Nunito',sans-serif" font-size="11">e.g. Stripe API, Slack, Notion</text>
          <rect x="388" y="351" width="60" height="18" rx="4" fill="#e2e8f0" stroke="#cbd5e1"></rect>
          <text x="418" y="363" text-anchor="middle" fill="#67e8f9" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="600">Tools</text>
          <rect x="456" y="351" width="68" height="18" rx="4" fill="#e2e8f0" stroke="#cbd5e1"></rect>
          <text x="490" y="363" text-anchor="middle" fill="#86efac" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="600">Resources</text>

          
          <line x1="640" y1="130" x2="680" y2="130" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"></line>
          <text x="688" y="134" fill="#22d3ee" font-family="'Nunito',sans-serif" font-size="11">stdio (local)</text>
          <line x1="640" y1="150" x2="680" y2="150" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3"></line>
          <text x="688" y="154" fill="#a855f7" font-family="'Nunito',sans-serif" font-size="11">SSE (remote)</text>

          
          <text x="450" y="408" text-anchor="middle" fill="#64748b" font-family="'Nunito',sans-serif" font-size="11">One MCP Client can simultaneously connect to multiple MCP Servers</text>
        </svg>