          <text x="230" y="112" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="600">Engineering</text>

          <line x1="292" y1="100" x2="318" y2="100" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"></line>

