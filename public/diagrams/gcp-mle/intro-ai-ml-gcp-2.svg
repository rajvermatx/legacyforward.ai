          <line x1="442" y1="100" x2="468" y2="100" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"></line>

          <rect x="470" y="60" width="120" height="80" rx="10" fill="#f1f5f9" stroke="#f59e0b" stroke-width="1.5"></rect>
