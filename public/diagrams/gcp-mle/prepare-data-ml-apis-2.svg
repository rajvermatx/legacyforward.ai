<svg viewBox="0 0 800 220" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', sans-serif">
          <rect width="800" height="220" fill="#f8fafc" rx="12"></rect>

          
          <rect x="280" y="15" width="240" height="38" rx="18" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1.5"></rect>
          <text x="400" y="39" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">Need to process data for ML?</text>

          
          <line x1="320" y1="55" x2="160" y2="85" stroke="#94a3b8" stroke-width="1"></line>
          <text x="220" y="72" fill="#475569" font-size="10">Existing Spark code?</text>

          <line x1="400" y1="55" x2="400" y2="85" stroke="#94a3b8" stroke-width="1"></line>
          <text x="420" y="72" fill="#475569" font-size="10">No code preference?</text>

          <line x1="480" y1="55" x2="640" y2="85" stroke="#94a3b8" stroke-width="1"></line>
          <text x="580" y="72" fill="#475569" font-size="10">Non-technical users?</text>

          
          <rect x="70" y="85" width="180" height="70" rx="10" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.5"></rect>
          <text x="160" y="112" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="600">Dataproc</text>
          <text x="160" y="130" text-anchor="middle" fill="#475569" font-size="10">Managed Spark/Hadoop</text>
          <text x="160" y="145" text-anchor="middle" fill="#64748b" font-size="9">Lift-and-shift, Spark MLlib</text>

          
          <rect x="310" y="85" width="180" height="70" rx="10" fill="rgba(59,130,246,0.12)" stroke="#3b82f6" stroke-width="1.5"></rect>
          <text x="400" y="112" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="600">Dataflow</text>
          <text x="400" y="130" text-anchor="middle" fill="#475569" font-size="10">Serverless Beam</text>
          <text x="400" y="145" text-anchor="middle" fill="#64748b" font-size="9">Default choice, batch + streaming</text>

          
          <rect x="550" y="85" width="180" height="70" rx="10" fill="rgba(168,85,247,0.12)" stroke="#a855f7" stroke-width="1.5"></rect>
          <text x="640" y="112" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="600">Dataprep</text>
          <text x="640" y="130" text-anchor="middle" fill="#475569" font-size="10">Visual UI (Trifacta)</text>
          <text x="640" y="145" text-anchor="middle" fill="#64748b" font-size="9">Ad-hoc wrangling, no code</text>

          
          <text x="400" y="185" text-anchor="middle" fill="#64748b" font-size="11">Also consider: <tspan fill="#f59e0b">BigQuery SQL</tspan> for in-warehouse transforms, <tspan fill="#22c55e">Vertex AI Pipelines</tspan> for ML orchestration</text>
          <text x="400" y="205" text-anchor="middle" fill="#64748b" font-size="10">When streaming is needed: Dataflow (preferred) or Dataproc with Spark Structured Streaming</text>
        </svg>