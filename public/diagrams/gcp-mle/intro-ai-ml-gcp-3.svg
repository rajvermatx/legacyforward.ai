          <text x="400" y="120" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="500">Is it a common task (vision, NLP, speech)?</text>

          
          <line x1="270" y1="115" x2="130" y2="115" stroke="#22c55e" stroke-width="1.2"></line>
