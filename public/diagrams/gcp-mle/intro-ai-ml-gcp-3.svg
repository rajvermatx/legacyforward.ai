          <text x="650" y="323" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="600">Custom Training</text>
          <text x="650" y="341" text-anchor="middle" fill="#475569" font-size="10">Vertex AI + TF/PyTorch</text>

          
          <line x1="280" y1="188" x2="130" y2="188" stroke="#ef4444" stroke-width="1.2"></line>
          <text x="200" y="182" fill="#ef4444" font-size="10">No data</text>

          
          <rect x="320" y="310" width="160" height="55" rx="8" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1.5"></rect>
          <text x="400" y="333" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">BigQuery ML</text>
          <text x="400" y="351" text-anchor="middle" fill="#475569" font-size="10">SQL-based ML</text>
          <line x1="400" y1="278" x2="400" y2="310" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr2)"></line>
          <text x="415" y="295" fill="#64748b" font-size="10">Tabular + SQL</text>

          
          <rect x="590" y="115" width="160" height="55" rx="8" fill="rgba(168,85,247,0.12)" stroke="#a855f7" stroke-width="1.5"></rect>
          <text x="670" y="138" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="600">GenAI / Foundation</text>
          <text x="670" y="156" text-anchor="middle" fill="#475569" font-size="10">Gemini, Model Garden</text>
        </svg>