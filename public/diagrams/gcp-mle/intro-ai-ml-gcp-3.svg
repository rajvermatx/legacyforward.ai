          <text x="400" y="193" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="500">Do you have labeled training data?</text>

          
          <line x1="400" y1="208" x2="400" y2="238" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr2)"></line>
