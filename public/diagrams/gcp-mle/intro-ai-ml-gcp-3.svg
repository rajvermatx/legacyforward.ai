<svg viewBox="0 0 800 400" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', sans-serif">
          <rect width="800" height="400" fill="#f8fafc" rx="12"></rect>
          <defs>
            <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#64748b"></path>
            </marker>
          </defs>

          
          <rect x="300" y="20" width="200" height="45" rx="22" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1.5"></rect>
