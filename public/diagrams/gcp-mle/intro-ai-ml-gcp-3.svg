          <text x="195" y="108" fill="#22c55e" font-size="10">Yes</text>
          <rect x="50" y="155" width="160" height="55" rx="8" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1.5"></rect>
          <text x="130" y="178" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">Pre-trained API</text>
          <text x="130" y="196" text-anchor="middle" fill="#475569" font-size="10">Vision, NLP, Speech, Translation</text>

          
          <rect x="50" y="220" width="160" height="35" rx="6" fill="#f1f5f9" stroke="#f59e0b" stroke-width="1"></rect>
