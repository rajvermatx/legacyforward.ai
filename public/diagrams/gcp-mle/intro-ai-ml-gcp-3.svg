          <line x1="130" y1="210" x2="130" y2="220" stroke="#94a3b8" stroke-width="1"></line>

          
          <line x1="530" y1="115" x2="650" y2="115" stroke="#ef4444" stroke-width="1.2"></line>
          <text x="580" y="108" fill="#ef4444" font-size="10">No</text>

          
          <line x1="400" y1="135" x2="400" y2="168" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr2)"></line>
          <text x="415" y="155" fill="#ef4444" font-size="10">No</text>
