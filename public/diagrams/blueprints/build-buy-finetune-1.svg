<svg viewBox="0 0 900 550" class="learning-path-svg" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow9" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"></polygon>
            </marker>
            <marker id="arrow9g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"></polygon>
            </marker>
            <marker id="arrow9y" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"></polygon>
            </marker>
            <marker id="arrow9c" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"></polygon>
            </marker>
          </defs>

          
          <rect x="320" y="15" width="260" height="55" rx="27" fill="#f8fafc" stroke="#a855f7" stroke-width="2.5"></rect>
          <text x="450" y="48" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="15" font-weight="700">Is AI your core product?</text>

          
          <line x1="580" y1="42" x2="700" y2="42" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow9)"></line>
          <text x="640" y="35" text-anchor="middle" fill="#22c55e" font-family="JetBrains Mono" font-size="11" font-weight="600">Yes</text>

          
          <rect x="705" y="15" width="170" height="90" rx="10" fill="#f8fafc" stroke="#ef4444" stroke-width="2.5"></rect>
          <text x="790" y="42" text-anchor="middle" fill="#ef4444" font-family="Space Grotesk" font-size="15" font-weight="700">BUILD</text>
          <text x="790" y="62" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">6-18 months</text>
          <text x="790" y="78" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">$500K-$5M+</text>
          <text x="790" y="94" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">10-50 ML engineers</text>

          
          <line x1="450" y1="70" x2="450" y2="120" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow9)"></line>
          <text x="465" y="98" fill="#ef4444" font-family="JetBrains Mono" font-size="11" font-weight="600">No</text>

          
          <rect x="270" y="125" width="360" height="55" rx="27" fill="#f8fafc" stroke="#a855f7" stroke-width="2"></rect>
          <text x="450" y="148" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="14" font-weight="600">Does a commercial API meet accuracy?</text>
          <text x="450" y="168" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11">(Test with your actual use cases first)</text>

          
          <line x1="630" y1="152" x2="700" y2="152" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow9g)"></line>
          <text x="665" y="145" text-anchor="middle" fill="#22c55e" font-family="JetBrains Mono" font-size="11" font-weight="600">Yes</text>

          
          <rect x="705" y="125" width="170" height="90" rx="10" fill="#f8fafc" stroke="#22c55e" stroke-width="2.5"></rect>
          <text x="790" y="152" text-anchor="middle" fill="#22c55e" font-family="Space Grotesk" font-size="15" font-weight="700">BUY (API)</text>
          <text x="790" y="172" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">Days to weeks</text>
          <text x="790" y="188" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">Near zero upfront</text>
          <text x="790" y="204" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">1-3 developers</text>

          
          <line x1="450" y1="180" x2="450" y2="235" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow9)"></line>
          <text x="465" y="210" fill="#ef4444" font-family="JetBrains Mono" font-size="11" font-weight="600">No</text>

          
          <rect x="270" y="240" width="360" height="55" rx="27" fill="#f8fafc" stroke="#a855f7" stroke-width="2"></rect>
          <text x="450" y="262" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="14" font-weight="600">Do you have domain-specific training data?</text>
          <text x="450" y="282" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11">(1K-100K labeled examples)</text>

          
          <line x1="630" y1="267" x2="700" y2="267" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow9y)"></line>
          <text x="665" y="260" text-anchor="middle" fill="#22c55e" font-family="JetBrains Mono" font-size="11" font-weight="600">Yes</text>

          
          <rect x="705" y="240" width="170" height="90" rx="10" fill="#f8fafc" stroke="#f59e0b" stroke-width="2.5"></rect>
          <text x="790" y="267" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk" font-size="15" font-weight="700">FINE-TUNE</text>
          <text x="790" y="287" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">2-8 weeks</text>
          <text x="790" y="303" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">$10K-$100K</text>
          <text x="790" y="319" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">3-8 ML engineers</text>

          
          <line x1="450" y1="295" x2="450" y2="348" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow9)"></line>
          <text x="465" y="325" fill="#ef4444" font-family="JetBrains Mono" font-size="11" font-weight="600">No</text>

          
          <rect x="270" y="353" width="360" height="55" rx="27" fill="#f8fafc" stroke="#a855f7" stroke-width="2"></rect>
          <text x="450" y="375" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="14" font-weight="600">Can you create / label training data?</text>
          <text x="450" y="395" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11">(From historical records, SME annotation, etc.)</text>

          
          <line x1="630" y1="380" x2="700" y2="310" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow9y)"></line>
          <text x="680" y="345" text-anchor="middle" fill="#22c55e" font-family="JetBrains Mono" font-size="11" font-weight="600">Yes</text>

          
          <line x1="450" y1="408" x2="450" y2="455" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow9)"></line>
          <text x="465" y="435" fill="#ef4444" font-family="JetBrains Mono" font-size="11" font-weight="600">No</text>

          
          <rect x="320" y="460" width="260" height="75" rx="10" fill="#f8fafc" stroke="#22d3ee" stroke-width="2.5"></rect>
          <text x="450" y="488" text-anchor="middle" fill="#22d3ee" font-family="Space Grotesk" font-size="14" font-weight="700">BUY + PROMPT ENG.</text>
          <text x="450" y="508" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">API + advanced prompting + RAG</text>
          <text x="450" y="524" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">Iterate until data becomes available</text>

          
          <rect x="25" y="125" width="210" height="100" rx="8" fill="#f8fafc" stroke="#a855f7" stroke-width="1" stroke-dasharray="5,3" opacity="0.8"></rect>
          <text x="130" y="150" text-anchor="middle" fill="#a855f7" font-family="Space Grotesk" font-size="12" font-weight="600">Typical Enterprise Path</text>
          <text x="130" y="170" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11">1. Start with Buy (API)</text>
          <text x="130" y="188" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11">2. Prove value, collect data</text>
          <text x="130" y="206" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11">3. Fine-tune where API falls short</text>
        </svg>