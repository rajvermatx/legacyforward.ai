<svg viewBox="0 0 900 340" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif;background:#fff;border-radius:8px;border:1px solid #e0e0e0">
        <text x="450" y="32" text-anchor="middle" fill="#334155" font-size="16" font-weight="700">Validation Framework</text>
        <text x="450" y="52" text-anchor="middle" fill="#64748b" font-size="12">Three layers of validation, from automated to human judgment</text>
        
        <rect x="100" y="230" width="700" height="80" rx="6" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="450" y="255" text-anchor="middle" fill="#334155" font-size="14" font-weight="700">Layer 1: Automated Checks</text>
        <rect x="130" y="268" width="120" height="30" rx="4" fill="#fff" stroke="#14b8a6" stroke-width="1"></rect>
        <text x="190" y="288" text-anchor="middle" fill="#334155" font-size="11">Format valid?</text>
        <rect x="270" y="268" width="120" height="30" rx="4" fill="#fff" stroke="#14b8a6" stroke-width="1"></rect>
        <text x="330" y="288" text-anchor="middle" fill="#334155" font-size="11">Length in range?</text>
        <rect x="410" y="268" width="120" height="30" rx="4" fill="#fff" stroke="#14b8a6" stroke-width="1"></rect>
        <text x="470" y="288" text-anchor="middle" fill="#334155" font-size="11">Valid JSON?</text>
        <rect x="550" y="268" width="120" height="30" rx="4" fill="#fff" stroke="#14b8a6" stroke-width="1"></rect>
        <text x="610" y="288" text-anchor="middle" fill="#334155" font-size="11">Schema match?</text>
        
        <rect x="100" y="140" width="700" height="80" rx="6" fill="#f5f5f5" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="450" y="165" text-anchor="middle" fill="#334155" font-size="14" font-weight="700">Layer 2: LLM-as-Judge</text>
        <rect x="150" y="178" width="130" height="30" rx="4" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1"></rect>
        <text x="215" y="198" text-anchor="middle" fill="#334155" font-size="11">Relevance check</text>
        <rect x="310" y="178" width="130" height="30" rx="4" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1"></rect>
        <text x="375" y="198" text-anchor="middle" fill="#334155" font-size="11">Coherence check</text>
        <rect x="470" y="178" width="130" height="30" rx="4" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1"></rect>
        <text x="535" y="198" text-anchor="middle" fill="#334155" font-size="11">Factuality check</text>
        <rect x="630" y="178" width="130" height="30" rx="4" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1"></rect>
        <text x="695" y="198" text-anchor="middle" fill="#334155" font-size="11">Completeness</text>
        
        <rect x="100" y="65" width="700" height="65" rx="6" fill="#14b8a6" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="450" y="90" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Layer 3: Human Review</text>
        <text x="280" y="115" text-anchor="middle" fill="#fff" font-size="11">Edge cases</text>
        <text x="450" y="115" text-anchor="middle" fill="#fff" font-size="11">Critical decisions</text>
        <text x="620" y="115" text-anchor="middle" fill="#fff" font-size="11">Ambiguous outputs</text>
        
        <text x="60" y="175" text-anchor="middle" fill="#64748b" font-size="10" transform="rotate(-90 60 175)">Escalation</text>
        <line x1="75" y1="230" x2="75" y2="130" stroke="#666" stroke-width="1.5" marker-end="url(#arrowCh15)"></line>
        <text x="840" y="175" text-anchor="middle" fill="#64748b" font-size="10" transform="rotate(90 840 175)">Volume</text>
        <line x1="825" y1="130" x2="825" y2="230" stroke="#666" stroke-width="1.5" marker-end="url(#arrowCh15)"></line>
        <defs>
          <marker id="arrowCh15" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"></path>
          </marker>
        </defs>
      </svg>