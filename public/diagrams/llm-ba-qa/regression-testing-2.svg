<svg viewBox="0 0 860 320" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family:Nunito,sans-serif;max-width:860px;">
        <rect width="860" height="320" fill="#f1f5f9" rx="12"></rect>
        <text x="430" y="28" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700">Self-Healing Selectors: Before and After</text>


        <rect x="20" y="50" width="390" height="240" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"></rect>
        <rect x="20" y="50" width="390" height="35" rx="8" fill="#ef4444"></rect>
        <rect x="20" y="73" width="390" height="12" fill="#ef4444"></rect>
        <text x="215" y="73" text-anchor="middle" fill="#ffffff" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">BEFORE: Selector Fails</text>

        <text x="40" y="110" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="600">Test selector:</text>
        <rect x="140" y="95" width="250" height="22" rx="3" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"></rect>
        <text x="155" y="111" fill="#ef4444" font-family="JetBrains Mono, monospace" font-size="11">#checkout-btn</text>

        <text x="370" y="112" fill="#ef4444" font-size="16" font-weight="700">X</text>

        <text x="40" y="145" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="600">Actual DOM (changed):</text>
        <rect x="40" y="155" width="350" height="22" rx="3" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"></rect>
        <text x="55" y="170" fill="#475569" font-family="JetBrains Mono, monospace" font-size="10">&lt;div class="actions"&gt;</text>
        <rect x="60" y="182" width="310" height="22" rx="3" fill="#f8fafc" stroke="#ef4444" stroke-width="1.5"></rect>
        <text x="75" y="197" fill="#ef4444" font-family="JetBrains Mono, monospace" font-size="10">&lt;button data-action="proceed-checkout"&gt;</text>
        <rect x="40" y="210" width="350" height="22" rx="3" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"></rect>
        <text x="55" y="225" fill="#475569" font-family="JetBrains Mono, monospace" font-size="10">&lt;/div&gt;</text>

        <rect x="60" y="245" width="310" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"></rect>
        <text x="215" y="265" text-anchor="middle" fill="#ef4444" font-family="Nunito, sans-serif" font-size="11">Element not found: #checkout-btn</text>


        <text x="430" y="170" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="600">LLM</text>
        <text x="430" y="185" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="600">analyzes</text>
        <text x="430" y="200" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="600">DOM</text>
        <line x1="415" y1="210" x2="445" y2="210" stroke="#475569" stroke-width="2"></line>
        <line x1="430" y1="210" x2="430" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrowCh12b)"></line>
        <path d="M410,155 Q410,140 430,140 Q450,140 450,155" stroke="#06b6d4" stroke-width="2" fill="none"></path>


        <rect x="460" y="50" width="380" height="240" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"></rect>
        <rect x="460" y="50" width="380" height="35" rx="8" fill="#22c55e"></rect>
        <rect x="460" y="73" width="380" height="12" fill="#22c55e"></rect>
        <text x="650" y="73" text-anchor="middle" fill="#ffffff" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700">AFTER: Selector Healed</text>

        <text x="480" y="110" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="600">New selector:</text>
        <rect x="570" y="95" width="250" height="22" rx="3" fill="#dcfce7" stroke="#22c55e" stroke-width="1"></rect>
        <text x="585" y="111" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="11">[data-action="proceed-checkout"]</text>

        <text x="805" y="112" fill="#22c55e" font-size="16" font-weight="700">&#10003;</text>

        <text x="480" y="145" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="600">Change detected:</text>
        <text x="480" y="163" fill="#475569" font-family="Nunito, sans-serif" font-size="10">ID removed, data-action attribute added</text>
        <text x="480" y="185" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="600">Confidence: 94%</text>
        <text x="480" y="210" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="600">Backup selectors:</text>
        <text x="495" y="228" fill="#475569" font-family="JetBrains Mono, monospace" font-size="10">1. button.checkout-action</text>
        <text x="495" y="244" fill="#475569" font-family="JetBrains Mono, monospace" font-size="10">2. .actions button[type="submit"]</text>
        <text x="495" y="260" fill="#475569" font-family="JetBrains Mono, monospace" font-size="10">3. //button[contains(text(),"Checkout")]</text>


        <rect x="460" y="270" width="380" height="16" rx="2" fill="#dcfce7"></rect>
        <text x="650" y="282" text-anchor="middle" fill="#22c55e" font-family="Nunito, sans-serif" font-size="9">Logged for permanent selector update</text>

        <defs>
          <marker id="arrowCh12b" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
            <path d="M0,0 L4,6 L8,0" fill="#475569"></path>
          </marker>
        </defs>
      </svg>