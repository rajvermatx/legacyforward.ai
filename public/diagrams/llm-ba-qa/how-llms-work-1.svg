<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 180" width="100%" role="img" aria-label="How an LLM processes your prompt — from text through tokens to response">

        <defs>
          <marker id="proc-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#06b6d4"></polygon>
          </marker>
        </defs>

        <rect x="5" y="35" width="110" height="100" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"></rect>
        <text x="60" y="62" text-anchor="middle" font-size="20">&#128221;</text>
        <text x="60" y="88" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Your Text</text>
        <text x="60" y="105" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">"Analyze this</text>
        <text x="60" y="118" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">requirement..."</text>
        <line x1="115" y1="85" x2="140" y2="85" stroke="#06b6d4" stroke-width="2" marker-end="url(#proc-arrow)"></line>


        <rect x="140" y="50" width="95" height="70" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"></rect>
        <text x="187" y="78" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Tokenizer</text>
        <text x="187" y="96" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#475569">Splits into chunks</text>
        <line x1="235" y1="85" x2="260" y2="85" stroke="#06b6d4" stroke-width="2" marker-end="url(#proc-arrow)"></line>


        <rect x="260" y="50" width="95" height="70" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"></rect>
        <text x="307" y="78" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Tokens</text>
        <text x="307" y="96" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">[481, 29, 1038...]</text>
        <line x1="355" y1="85" x2="380" y2="85" stroke="#06b6d4" stroke-width="2" marker-end="url(#proc-arrow)"></line>


        <rect x="380" y="35" width="120" height="100" rx="8" fill="#06b6d4" stroke="#06b6d4" stroke-width="1.5"></rect>
        <text x="440" y="62" text-anchor="middle" font-size="20" fill="#ffffff">&#9881;</text>
        <text x="440" y="88" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Transformer</text>
        <text x="440" y="105" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#e0f7fa">Attention +</text>
        <text x="440" y="118" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#e0f7fa">pattern matching</text>
        <line x1="500" y1="85" x2="525" y2="85" stroke="#06b6d4" stroke-width="2" marker-end="url(#proc-arrow)"></line>


        <rect x="525" y="50" width="105" height="70" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"></rect>
        <text x="577" y="78" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Probabilities</text>
        <text x="577" y="96" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#475569">Next-token scores</text>
        <line x1="630" y1="85" x2="655" y2="85" stroke="#06b6d4" stroke-width="2" marker-end="url(#proc-arrow)"></line>


        <rect x="655" y="35" width="115" height="100" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"></rect>
        <text x="712" y="62" text-anchor="middle" font-size="20">&#128196;</text>
        <text x="712" y="88" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Response</text>
        <text x="712" y="105" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#475569">Generated text</text>
        <text x="712" y="118" text-anchor="middle" font-family="Nunito, sans-serif" font-size="10" fill="#475569">token by token</text>


        <text x="390" y="170" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#475569" font-style="italic">Each token is predicted one at a time based on everything that came before it.</text>
      </svg>