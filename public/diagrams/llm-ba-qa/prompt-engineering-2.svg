<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="100%" role="img" aria-label="Decision tree for choosing between zero-shot, few-shot, and chain-of-thought prompting">

        <defs>
          <marker id="dt-arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
            <polygon points="0 0, 7 2.5, 0 5" fill="#06b6d4"></polygon>
          </marker>
        </defs>


        <polygon points="340,15 480,60 340,105 200,60" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"></polygon>
        <text x="340" y="55" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" fill="#0f172a">Is the task simple</text>
        <text x="340" y="70" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" fill="#0f172a">and well-defined?</text>


        <line x1="480" y1="60" x2="580" y2="60" stroke="#06b6d4" stroke-width="2" marker-end="url(#dt-arr)"></line>
        <text x="530" y="52" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" fill="#22c55e">YES</text>
        <rect x="580" y="30" width="90" height="60" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"></rect>
        <text x="625" y="55" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#166534">Zero-Shot</text>
        <text x="625" y="72" text-anchor="middle" font-family="Nunito, sans-serif" font-size="9" fill="#475569">Just give clear</text>
        <text x="625" y="83" text-anchor="middle" font-family="Nunito, sans-serif" font-size="9" fill="#475569">instructions</text>


        <line x1="340" y1="105" x2="340" y2="150" stroke="#06b6d4" stroke-width="2" marker-end="url(#dt-arr)"></line>
        <text x="355" y="130" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" fill="#ef4444">NO</text>


        <polygon points="340,150 480,195 340,240 200,195" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"></polygon>
        <text x="340" y="190" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" fill="#0f172a">Do you have good</text>
        <text x="340" y="205" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" fill="#0f172a">examples of desired output?</text>


        <line x1="480" y1="195" x2="580" y2="195" stroke="#06b6d4" stroke-width="2" marker-end="url(#dt-arr)"></line>
        <text x="530" y="187" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" fill="#22c55e">YES</text>
        <rect x="580" y="165" width="90" height="60" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"></rect>
        <text x="625" y="190" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="700" fill="#1e40af">Few-Shot</text>
        <text x="625" y="207" text-anchor="middle" font-family="Nunito, sans-serif" font-size="9" fill="#475569">Include 2-3</text>
        <text x="625" y="218" text-anchor="middle" font-family="Nunito, sans-serif" font-size="9" fill="#475569">examples in prompt</text>


        <line x1="200" y1="195" x2="100" y2="195" stroke="#06b6d4" stroke-width="2" marker-end="url(#dt-arr)"></line>
        <text x="150" y="187" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" fill="#ef4444">NO</text>
        <rect x="5" y="165" width="100" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"></rect>
        <text x="55" y="186" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="10.5" font-weight="700" fill="#92400e">Chain-of-</text>
        <text x="55" y="200" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="10.5" font-weight="700" fill="#92400e">Thought</text>
        <text x="55" y="217" text-anchor="middle" font-family="Nunito, sans-serif" font-size="9" fill="#475569">Ask model to</text>
        <text x="55" y="228" text-anchor="middle" font-family="Nunito, sans-serif" font-size="9" fill="#475569">reason step-by-step</text>


        <text x="340" y="285" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#475569" font-style="italic">When in doubt, start with zero-shot. If quality is insufficient, add examples (few-shot).</text>
        <text x="340" y="302" text-anchor="middle" font-family="Nunito, sans-serif" font-size="11" fill="#475569" font-style="italic">For complex analytical tasks, use chain-of-thought to make reasoning transparent.</text>
      </svg>