<svg viewBox="0 0 900 250" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif;background:#fff;border-radius:8px;border:1px solid #e0e0e0">
        <text x="450" y="30" text-anchor="middle" fill="#334155" font-size="16" font-weight="700">Multi-Step Reasoning Chain</text>
        
        <rect x="15" y="60" width="100" height="55" rx="6" fill="#14b8a6" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="65" y="82" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">1. Understand</text>
        <text x="65" y="98" text-anchor="middle" fill="#fff" font-size="10">Parse request</text>
        <line x1="115" y1="88" x2="140" y2="88" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowCh14)"></line>

        <rect x="140" y="60" width="100" height="55" rx="6" fill="#f5f5f5" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="190" y="82" text-anchor="middle" fill="#334155" font-size="11" font-weight="600">2. Gather</text>
        <text x="190" y="98" text-anchor="middle" fill="#64748b" font-size="10">Fetch context</text>
        <line x1="240" y1="88" x2="265" y2="88" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowCh14)"></line>

        <rect x="265" y="60" width="100" height="55" rx="6" fill="#f5f5f5" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="315" y="82" text-anchor="middle" fill="#334155" font-size="11" font-weight="600">3. Analyze</text>
        <text x="315" y="98" text-anchor="middle" fill="#64748b" font-size="10">Evaluate options</text>
        <line x1="365" y1="88" x2="390" y2="88" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowCh14)"></line>

        <rect x="390" y="60" width="100" height="55" rx="6" fill="#f5f5f5" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="440" y="82" text-anchor="middle" fill="#334155" font-size="11" font-weight="600">4. Plan</text>
        <text x="440" y="98" text-anchor="middle" fill="#64748b" font-size="10">Choose action</text>
        <line x1="490" y1="88" x2="515" y2="88" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowCh14)"></line>

        <rect x="515" y="60" width="100" height="55" rx="6" fill="#14b8a6" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="565" y="82" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">5. Execute</text>
        <text x="565" y="98" text-anchor="middle" fill="#fff" font-size="10">Call tools/APIs</text>
        <line x1="615" y1="88" x2="640" y2="88" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowCh14)"></line>

        <rect x="640" y="60" width="100" height="55" rx="6" fill="#f5f5f5" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="690" y="82" text-anchor="middle" fill="#334155" font-size="11" font-weight="600">6. Verify</text>
        <text x="690" y="98" text-anchor="middle" fill="#64748b" font-size="10">Check result</text>
        <line x1="740" y1="88" x2="765" y2="88" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowCh14)"></line>

        <rect x="765" y="60" width="110" height="55" rx="6" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="820" y="82" text-anchor="middle" fill="#334155" font-size="11" font-weight="600">7. Respond</text>
        <text x="820" y="98" text-anchor="middle" fill="#64748b" font-size="10">Deliver answer</text>

        
        <path d="M 690 115 L 690 170 L 315 170 L 315 115" fill="none" stroke="#14b8a6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowCh14)"></path>
        <rect x="430" y="158" width="120" height="24" rx="4" fill="#fff" stroke="#14b8a6" stroke-width="1"></rect>
        <text x="490" y="174" text-anchor="middle" fill="#14b8a6" font-size="10" font-weight="600">Retry if verification fails</text>

        <text x="450" y="225" text-anchor="middle" fill="#64748b" font-size="11">Each step produces structured output that feeds into the next step. The verify-to-analyze loop handles self-correction.</text>
      </svg>