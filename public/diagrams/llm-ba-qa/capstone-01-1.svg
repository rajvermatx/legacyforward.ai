<svg viewBox="0 0 900 200" width="100%" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif;background:#fff;border-radius:8px;border:1px solid #e0e0e0">
        <text x="450" y="28" text-anchor="middle" fill="#334155" font-size="16" font-weight="700">Requirements-to-Test-Cases Pipeline</text>
        <defs>
          <marker id="arrowC1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6"></path>
          </marker>
        </defs>
        
        <rect x="30" y="60" width="170" height="80" rx="6" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="115" y="85" text-anchor="middle" fill="#334155" font-size="13" font-weight="700">1. Ingest &amp; Parse</text>
        <text x="115" y="105" text-anchor="middle" fill="#64748b" font-size="11">Requirements.md</text>
        <text x="115" y="120" text-anchor="middle" fill="#64748b" font-size="11">.docx / .txt</text>
        <line x1="200" y1="100" x2="240" y2="100" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowC1)"></line>
        
        <rect x="240" y="60" width="170" height="80" rx="6" fill="#f5f5f5" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="325" y="85" text-anchor="middle" fill="#334155" font-size="13" font-weight="700">2. Classify &amp; Enrich</text>
        <text x="325" y="105" text-anchor="middle" fill="#64748b" font-size="11">Type, priority,</text>
        <text x="325" y="120" text-anchor="middle" fill="#64748b" font-size="11">testability, ambiguity</text>
        <line x1="410" y1="100" x2="450" y2="100" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowC1)"></line>
        
        <rect x="450" y="60" width="170" height="80" rx="6" fill="#14b8a6" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="535" y="85" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3. Generate Tests</text>
        <text x="535" y="105" text-anchor="middle" fill="#fff" font-size="11">Positive, negative,</text>
        <text x="535" y="120" text-anchor="middle" fill="#fff" font-size="11">boundary + traceability</text>
        <line x1="620" y1="100" x2="660" y2="100" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowC1)"></line>
        
        <rect x="660" y="60" width="210" height="80" rx="6" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"></rect>
        <text x="765" y="85" text-anchor="middle" fill="#334155" font-size="13" font-weight="700">4. Prioritize &amp; Report</text>
        <text x="765" y="105" text-anchor="middle" fill="#64748b" font-size="11">Risk-ranked test suite</text>
        <text x="765" y="120" text-anchor="middle" fill="#64748b" font-size="11">+ coverage matrix</text>
        
        <text x="450" y="175" text-anchor="middle" fill="#64748b" font-size="11">Each stage communicates through Pydantic data models. The LLM receives structured prompts and returns structured JSON.</text>
      </svg>