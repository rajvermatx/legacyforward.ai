        <text x="556" y="290" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="10" font-weight="500" fill="#64748b" dominant-baseline="central" text-anchor="middle">an</text>

        
        <rect x="584" y="252.5" width="36" height="22.5" rx="3" fill="#9c9a92" opacity="0.4" ></rect>
