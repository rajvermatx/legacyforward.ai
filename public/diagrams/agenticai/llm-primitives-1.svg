        <text x="464" y="290" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="10" font-weight="500" fill="#1a1a1a" dominant-baseline="central" text-anchor="middle">a</text>

        
        <rect x="492" y="234.3" width="36" height="40.7" rx="3" fill="#854F0B" opacity="0.6" ></rect>
