<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" role="img" aria-label="Token prediction probability distribution showing how temperature affects sampling">
        <title>Token Prediction as Probability Distribution</title>
        
        <defs>
          <marker id="arrow-2" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#64748b" ></path>
          </marker>
        </defs>

        
        <rect x="0" y="0" width="680" height="420" rx="4" fill="#F8F7F4" ></rect>

        
        <text x="340" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1a1a1a" dominant-baseline="central" text-anchor="middle">Next-Token Probability Distribution</text>

        
        <text x="185" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#534AB7" dominant-baseline="central" text-anchor="middle">Temperature = 0.2 (Focused)</text>

        
        <text x="510" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#854F0B" dominant-baseline="central" text-anchor="middle">Temperature = 1.2 (Creative)</text>

        
        
