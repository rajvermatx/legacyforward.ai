        <text x="185" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#64748b" dominant-baseline="central" text-anchor="middle">Candidate Tokens</text>
        <text x="510" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#64748b" dominant-baseline="central" text-anchor="middle">Candidate Tokens</text>

        
        <line x1="340" y1="340" x2="340" y2="340" stroke="none" ></line>

        
        <rect x="80" y="330" width="520" height="72" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1" opacity="0.6" ></rect>
        <text x="340" y="354" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#854F0B" dominant-baseline="central" text-anchor="middle">Low temperature: model picks the obvious token almost every time.</text>
        <text x="340" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#854F0B" dominant-baseline="central" text-anchor="middle">High temperature: probability spreads across many candidates, increasing variety.</text>
        <text x="340" y="394" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#64748b" dominant-baseline="central" text-anchor="middle">Context: "The patient was admitted to ___"</text>
