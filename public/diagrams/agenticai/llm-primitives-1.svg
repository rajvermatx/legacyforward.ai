        <text x="510" y="290" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="10" font-weight="500" fill="#1a1a1a" dominant-baseline="central" text-anchor="middle">this</text>

        
        <rect x="538" y="243.4" width="36" height="31.6" rx="3" fill="#9c9a92" opacity="0.5" ></rect>
