        <text x="340" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1a1a1a" dominant-baseline="central" text-anchor="middle">Agent Anatomy: The Core Loop</text>

        
        <rect x="250" y="190" width="180" height="80" rx="12" fill="#F8F7F4" stroke="#D3D1C7" stroke-width="2" ></rect>
