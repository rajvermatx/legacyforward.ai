        <text x="340" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#64748b" dominant-baseline="central" text-anchor="middle">Reasoning engine</text>

        
        <rect x="235" y="56" width="210" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2" ></rect>
