<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diag-title-1 diag-desc-1">
        <title id="diag-title-1">Deployment Topology</title>
        <desc id="diag-desc-1">Pipeline from code commit through CI/CD, container registry, orchestrator, running service, and monitoring feedback loop.</desc>

        <defs>
          <marker id="arrow-1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#888"></path>
          </marker>
        </defs>

        
        <rect width="680" height="520" rx="8" fill="#1a1a2e"></rect>

        
        <text x="340" y="32" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" fill="#c8d6e5">Deployment Topology: Code to Running Service</text>

        
        <rect x="30" y="55" width="180" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"></rect>
        <text x="120" y="80" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="600" fill="#93c5fd">Code Push</text>

        <line x1="120" y1="95" x2="120" y2="115" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        <rect x="30" y="118" width="180" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"></rect>
        <text x="120" y="139" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" fill="#93c5fd">CI Pipeline</text>
        <text x="120" y="156" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7da8d4">Lint + Unit + Prompt Tests</text>

        <line x1="120" y1="168" x2="120" y2="188" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        <rect x="30" y="191" width="180" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"></rect>
        <text x="120" y="212" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" fill="#93c5fd">Build &amp; Push Image</text>
        <text x="120" y="229" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7da8d4">Tag: commit SHA</text>

        
        <text x="120" y="260" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#3b82f6" letter-spacing="0.08em">CI / CD</text>

        
        <line x1="210" y1="216" x2="260" y2="216" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        
        <rect x="265" y="55" width="180" height="50" rx="6" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1.5"></rect>
        <text x="355" y="76" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd">Container Registry</text>
        <text x="355" y="93" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#a78bfa">Immutable images</text>

        <line x1="355" y1="105" x2="355" y2="125" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        <rect x="265" y="128" width="180" height="50" rx="6" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1.5"></rect>
        <text x="355" y="149" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd">Staging Deploy</text>
        <text x="355" y="166" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#a78bfa">Smoke tests + approval gate</text>

        <line x1="355" y1="178" x2="355" y2="198" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        <rect x="265" y="201" width="180" height="50" rx="6" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1.5"></rect>
        <text x="355" y="222" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" fill="#c4b5fd">Production Canary</text>
        <text x="355" y="239" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#a78bfa">5% traffic → 100% rollout</text>

        
        <text x="355" y="270" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#a78bfa" letter-spacing="0.08em">ORCHESTRATOR</text>

        
        <line x1="445" y1="226" x2="475" y2="226" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        
        <rect x="480" y="70" width="170" height="195" rx="8" fill="#252540" stroke="#6b7280" stroke-width="1"></rect>
        <text x="565" y="92" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#9ca3af" letter-spacing="0.06em">RUNNING SERVICE</text>

        
        <rect x="498" y="104" width="56" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"></rect>
        <text x="526" y="126" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#93c5fd">Pod 1</text>

        <rect x="564" y="104" width="56" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"></rect>
        <text x="592" y="126" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#93c5fd">Pod 2</text>

        <rect x="530" y="150" width="56" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"></rect>
        <text x="558" y="172" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#93c5fd">Pod N</text>

        
        <rect x="500" y="200" width="130" height="30" rx="5" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1"></rect>
        <text x="565" y="220" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" fill="#c4b5fd">Load Balancer</text>

        <line x1="526" y1="186" x2="545" y2="200" stroke="#6b7280" stroke-width="1" fill="none"></line>
        <line x1="592" y1="140" x2="580" y2="200" stroke="#6b7280" stroke-width="1" fill="none"></line>
        <line x1="558" y1="186" x2="560" y2="200" stroke="#6b7280" stroke-width="1" fill="none"></line>

        
        <rect x="500" y="240" width="130" height="20" rx="3" fill="none" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"></rect>
        <text x="565" y="254" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#9ca3af">HPA: 2..20 replicas</text>

        
        <rect x="80" y="310" width="520" height="90" rx="8" fill="#0d3b3b" stroke="#2dd4bf" stroke-width="1.5"></rect>
        <text x="340" y="334" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#5eead4" letter-spacing="0.06em">MONITORING &amp; OBSERVABILITY</text>

        
        <rect x="100" y="348" width="110" height="36" rx="4" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"></rect>
        <text x="155" y="362" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#5eead4">Metrics</text>
        <text x="155" y="376" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#2dd4bf">Prometheus/Grafana</text>

        <rect x="225" y="348" width="110" height="36" rx="4" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"></rect>
        <text x="280" y="362" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#5eead4">Logs</text>
        <text x="280" y="376" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#2dd4bf">Structured / ELK</text>

        <rect x="350" y="348" width="110" height="36" rx="4" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"></rect>
        <text x="405" y="362" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#5eead4">Traces</text>
        <text x="405" y="376" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#2dd4bf">OpenTelemetry</text>

        <rect x="475" y="348" width="110" height="36" rx="4" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"></rect>
        <text x="530" y="362" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#5eead4">Alerts</text>
        <text x="530" y="376" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#2dd4bf">PagerDuty / Slack</text>

        
        <line x1="565" y1="265" x2="565" y2="308" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        
        <path d="M 80 355 L 30 355 L 30 80 L 28 80" stroke="#2dd4bf" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrow-1)" fill="none"></path>
        <text x="18" y="220" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#2dd4bf" transform="rotate(-90, 18, 220)">Feedback Loop</text>

        
        <rect x="130" y="430" width="420" height="60" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"></rect>
        <text x="340" y="454" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#fbbf24" letter-spacing="0.06em">COST CONTROLS</text>
        <text x="340" y="474" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#d4a017">Per-request budgets | Daily limits | Model tiering | Semantic cache</text>

        
        <line x1="340" y1="400" x2="340" y2="428" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-1)" fill="none"></line>
      </svg>