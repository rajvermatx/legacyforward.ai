<svg viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flowchart showing state transitions with interrupt points for human-in-the-loop review">
        <defs>
          <marker id="arrow-2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"></path>
          </marker>
        </defs>

        <rect width="680" height="460" rx="12" fill="#f8fafc"></rect>
        <text x="340" y="30" text-anchor="middle" font-family="Space Grotesk, system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f172a">State Transitions with Interrupts &amp; Checkpointing</text>

        <rect x="280" y="50" width="120" height="34" rx="8" ry="8" fill="#475569"></rect>
        <text x="340" y="72" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">START</text>
        <line x1="340" y1="84" x2="340" y2="114" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-2)"></line>

        <rect x="255" y="114" width="170" height="38" rx="8" ry="8" fill="#3b82f6"></rect>
        <text x="340" y="138" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Process Input</text>
        <line x1="340" y1="152" x2="340" y2="182" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-2)"></line>

        <rect x="440" y="120" width="90" height="26" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"></rect>
        <text x="485" y="137" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="9" font-weight="600" fill="#64748b">CHECKPOINT 1</text>
        <line x1="425" y1="133" x2="440" y2="133" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2" fill="none"></line>

        <rect x="255" y="182" width="170" height="38" rx="8" ry="8" fill="#3b82f6"></rect>
        <text x="340" y="206" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Analyze &amp; Score</text>
        <line x1="340" y1="220" x2="340" y2="250" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-2)"></line>

        <rect x="440" y="188" width="90" height="26" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"></rect>
        <text x="485" y="205" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="9" font-weight="600" fill="#64748b">CHECKPOINT 2</text>
        <line x1="425" y1="201" x2="440" y2="201" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 2" fill="none"></line>

        <rect x="230" y="250" width="220" height="42" rx="8" ry="8" fill="#f59e0b"></rect>
        <text x="340" y="267" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">INTERRUPT</text>
        <text x="340" y="282" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="11" fill="#ffffff">Human Review Required</text>

        <rect x="470" y="252" width="150" height="36" rx="4" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 2"></rect>
        <text x="545" y="266" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="9" fill="#f59e0b">State persisted to store</text>
        <text x="545" y="280" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="9" fill="#f59e0b">Awaiting human input</text>
        <line x1="450" y1="271" x2="470" y2="271" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2" fill="none"></line>

        <line x1="290" y1="292" x2="160" y2="340" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-2)"></line>
        <text x="205" y="310" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="10" fill="#64748b">approved</text>
        <rect x="80" y="340" width="160" height="38" rx="8" ry="8" fill="#3b82f6"></rect>
        <text x="160" y="364" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Execute Action</text>

        <line x1="390" y1="292" x2="510" y2="340" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-2)"></line>
        <text x="465" y="310" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="10" fill="#64748b">rejected</text>
        <rect x="445" y="340" width="140" height="38" rx="8" ry="8" fill="#f59e0b"></rect>
        <text x="515" y="364" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Revise &amp; Retry</text>

        <path d="M585,359 Q640,359 640,206 Q640,182 425,200" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-2)"></path>
        <text x="648" y="280" text-anchor="start" font-family="Nunito, system-ui, sans-serif" font-size="10" fill="#64748b" transform="rotate(90,648,280)">retry loop</text>

        <line x1="160" y1="378" x2="280" y2="420" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-2)"></line>
        <rect x="280" y="410" width="120" height="34" rx="8" ry="8" fill="#475569"></rect>
        <text x="340" y="432" text-anchor="middle" font-family="Nunito, system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">END</text>

        <rect x="30" y="428" width="12" height="12" rx="3" fill="#3b82f6"></rect>
        <text x="48" y="439" font-family="Nunito, system-ui, sans-serif" font-size="10" fill="#64748b">State Node</text>
        <rect x="110" y="428" width="12" height="12" rx="3" fill="#f59e0b"></rect>
        <text x="128" y="439" font-family="Nunito, system-ui, sans-serif" font-size="10" fill="#64748b">Interrupt</text>
        <rect x="180" y="428" width="12" height="12" rx="3" fill="#475569"></rect>
        <text x="198" y="439" font-family="Nunito, system-ui, sans-serif" font-size="10" fill="#64748b">Structural</text>
      </svg>