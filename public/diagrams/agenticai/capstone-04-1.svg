<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Data pipeline flowchart: ingest, schema inference, validate, transform, quality check, load, and heal stages">
        <defs>
          <marker id="arrow-1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="none">
            <path d="M0,0 L8,3 L0,6" stroke="#4A90D9" stroke-width="1.2" fill="none"></path>
          </marker>
          <marker id="arrow-1-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="none">
            <path d="M0,0 L8,3 L0,6" stroke="#7B68AE" stroke-width="1.2" fill="none"></path>
          </marker>
          <marker id="arrow-1-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="none">
            <path d="M0,0 L8,3 L0,6" stroke="#2D9B83" stroke-width="1.2" fill="none"></path>
          </marker>
          <marker id="arrow-1-coral" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="none">
            <path d="M0,0 L8,3 L0,6" stroke="#D9654A" stroke-width="1.2" fill="none"></path>
          </marker>
        </defs>
        <rect width="680" height="520" rx="8" fill="#1a1a2e"></rect>
        <text x="340" y="32" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#E0E0E0">Data Pipeline Orchestrator — Agent Flow</text>
        
        <rect x="50" y="56" width="150" height="44" rx="6" fill="#333340" stroke="#888" stroke-width="1"></rect>
        <text x="125" y="75" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#CCCCCC">Pipeline Supervisor</text>
        <text x="125" y="91" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#999999">Orchestrates all stages</text>
        <line x1="200" y1="78" x2="258" y2="70" stroke="#888" stroke-width="1" stroke-dasharray="3,3" fill="none"></line>
        <line x1="125" y1="100" x2="125" y2="140" stroke="#888" stroke-width="1" stroke-dasharray="3,3" fill="none"></line>
        <line x1="125" y1="140" x2="238" y2="140" stroke="#888" stroke-width="1" stroke-dasharray="3,3" fill="none"></line>
        
        <rect x="260" y="50" width="160" height="40" rx="6" fill="#2A3A5C" stroke="#4A90D9" stroke-width="1.5"></rect>
        <text x="340" y="75" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="600" fill="#A8C8F0">Ingest Data Sources</text>
        <line x1="340" y1="90" x2="340" y2="120" stroke="#4A90D9" stroke-width="1.5" fill="none" marker-end="url(#arrow-1)"></line>
        
        <rect x="240" y="122" width="200" height="44" rx="6" fill="#2E2650" stroke="#7B68AE" stroke-width="1.5"></rect>
        <text x="340" y="141" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#C4B5E3">Schema Analyzer Agent</text>
        <text x="340" y="157" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#9B8DC4">Infer types • Detect drift • Map columns</text>
        <line x1="340" y1="166" x2="340" y2="196" stroke="#7B68AE" stroke-width="1.5" fill="none" marker-end="url(#arrow-1-purple)"></line>
        
        <rect x="240" y="198" width="200" height="44" rx="6" fill="#1A3A36" stroke="#2D9B83" stroke-width="1.5"></rect>
        <text x="340" y="217" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#7DD4BF">Quality Checker Agent</text>
        <text x="340" y="233" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#5DBFA5">Rules engine • Anomaly detection • Stats</text>
        <line x1="340" y1="242" x2="340" y2="272" stroke="#2D9B83" stroke-width="1.5" fill="none" marker-end="url(#arrow-1-teal)"></line>
        
        <rect x="240" y="274" width="200" height="44" rx="6" fill="#2E2650" stroke="#7B68AE" stroke-width="1.5"></rect>
        <text x="340" y="293" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#C4B5E3">Transformer Agent</text>
        <text x="340" y="309" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#9B8DC4">Normalize • Enrich • Deduplicate</text>
        <line x1="340" y1="318" x2="340" y2="348" stroke="#7B68AE" stroke-width="1.5" fill="none" marker-end="url(#arrow-1-purple)"></line>
        
        <polygon points="340,350 405,382 340,414 275,382" fill="#1A3A36" stroke="#2D9B83" stroke-width="1.5"></polygon>
        <text x="340" y="379" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#7DD4BF">Quality</text>
        <text x="340" y="392" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#7DD4BF">Gate</text>
        
        <line x1="405" y1="382" x2="530" y2="382" stroke="#2D9B83" stroke-width="1.5" fill="none" marker-end="url(#arrow-1-teal)"></line>
        <text x="460" y="374" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="600" fill="#7DD4BF">PASS</text>
        <rect x="532" y="362" width="120" height="40" rx="6" fill="#2A3A5C" stroke="#4A90D9" stroke-width="1.5"></rect>
        <text x="592" y="387" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="600" fill="#A8C8F0">Load to Target</text>
        
        <line x1="275" y1="382" x2="148" y2="382" stroke="#D9654A" stroke-width="1.5" fill="none" marker-end="url(#arrow-1-coral)"></line>
        <text x="218" y="374" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="600" fill="#D9654A">FAIL</text>
        <rect x="28" y="358" width="120" height="48" rx="6" fill="#3A2020" stroke="#D9654A" stroke-width="1.5"></rect>
        <text x="88" y="379" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#E8A090">Healer Agent</text>
        <text x="88" y="395" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#D9654A">Diagnose • Fix • Retry</text>
        
        <line x1="88" y1="358" x2="88" y2="296" stroke="#D9654A" stroke-width="1.5" stroke-dasharray="5,3" fill="none"></line>
        <line x1="88" y1="296" x2="238" y2="296" stroke="#D9654A" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-1-coral)"></line>
        <text x="155" y="288" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#D9654A">RETRY</text>
        
        <rect x="30" y="440" width="620" height="55" rx="6" fill="#222233" stroke="#444" stroke-width="1"></rect>
        <rect x="50" y="460" width="24" height="8" rx="2" fill="#2A3A5C" stroke="#4A90D9" stroke-width="1"></rect>
        <text x="82" y="468" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#A8C8F0">Data Flow</text>
        <rect x="155" y="460" width="24" height="8" rx="2" fill="#2E2650" stroke="#7B68AE" stroke-width="1"></rect>
        <text x="187" y="468" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#C4B5E3">Agent Processing</text>
        <rect x="300" y="460" width="24" height="8" rx="2" fill="#1A3A36" stroke="#2D9B83" stroke-width="1"></rect>
        <text x="332" y="468" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7DD4BF">Validation</text>
        <rect x="410" y="460" width="24" height="8" rx="2" fill="#3A2020" stroke="#D9654A" stroke-width="1"></rect>
        <text x="442" y="468" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#E8A090">Error / Healing</text>
        <rect x="545" y="460" width="24" height="8" rx="2" fill="#333340" stroke="#888" stroke-width="1"></rect>
        <text x="577" y="468" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#CCCCCC">Structural</text>
      </svg>