        <rect x="310" y="470" width="12" height="12" rx="2" fill="#e05533" opacity="0.9"></rect>
        <text x="328" y="481" fill="#94a3b8" font-size="10">Output / Posting</text>
        <rect x="420" y="470" width="12" height="12" rx="2" fill="#6b7280" opacity="0.9"></rect>
        <text x="438" y="481" fill="#94a3b8" font-size="10">Structural</text>
      </svg>