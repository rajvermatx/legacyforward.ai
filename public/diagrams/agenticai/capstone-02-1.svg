<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Code review pipeline flowchart showing PR webhook through diff extraction, parallel analysis, merge findings, generate review, and post comments">
        <defs>
          <marker id="arrow-1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"></path>
          </marker>
          
        </defs>
        <rect width="680" height="520" rx="8" fill="#1a1a2e"></rect>
        
        <rect x="260" y="20" width="160" height="44" rx="6" fill="#2563eb" opacity="0.9"></rect>
        <text x="340" y="47" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">PR Webhook</text>
        <line x1="340" y1="64" x2="340" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        
        <rect x="230" y="90" width="220" height="44" rx="6" fill="#2563eb" opacity="0.85"></rect>
        <text x="340" y="117" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Diff Extraction &amp; Parsing</text>
        <line x1="340" y1="134" x2="340" y2="165" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        
        <polygon points="340,165 358,180 340,195 322,180" fill="#6b7280" opacity="0.9"></polygon>
        <line x1="322" y1="180" x2="115" y2="225" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="340" y1="195" x2="340" y2="225" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="358" y1="180" x2="565" y2="225" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        
        <rect x="30" y="225" width="170" height="56" rx="6" fill="#0d9488" opacity="0.9"></rect>
        <text x="115" y="249" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Security Scanner</text>
        <text x="115" y="268" text-anchor="middle" fill="#e0f2f1" font-size="10">CVEs, injections, secrets</text>
        
        <rect x="240" y="225" width="200" height="56" rx="6" fill="#7c3aed" opacity="0.9"></rect>
        <text x="340" y="249" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Logic Analyzer (LLM)</text>
        <text x="340" y="268" text-anchor="middle" fill="#ede9fe" font-size="10">Bugs, edge cases, complexity</text>
        
        <rect x="480" y="225" width="170" height="56" rx="6" fill="#0d9488" opacity="0.9"></rect>
        <text x="565" y="249" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Style Checker</text>
        <text x="565" y="268" text-anchor="middle" fill="#e0f2f1" font-size="10">Lint rules, naming, format</text>
        
        <line x1="115" y1="281" x2="322" y2="320" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="340" y1="281" x2="340" y2="315" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="565" y1="281" x2="358" y2="320" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        
        <polygon points="340,315 358,330 340,345 322,330" fill="#6b7280" opacity="0.9"></polygon>
        <line x1="340" y1="345" x2="340" y2="370" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        
        <rect x="210" y="370" width="260" height="44" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="340" y="397" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Merge Findings &amp; Score Confidence</text>
        <line x1="340" y1="414" x2="340" y2="440" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        
        <rect x="225" y="440" width="230" height="44" rx="6" fill="#7c3aed" opacity="0.8"></rect>
        <text x="340" y="467" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Generate Review Comments</text>
        <line x1="455" y1="462" x2="495" y2="462" stroke="#666" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        
        <rect x="495" y="440" width="155" height="44" rx="6" fill="#e05533" opacity="0.9"></rect>
        <text x="572" y="467" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Post to PR</text>
        
        <rect x="20" y="470" width="12" height="12" rx="2" fill="#2563eb" opacity="0.9"></rect>
        <text x="38" y="481" fill="#94a3b8" font-size="10">Data / Input</text>
        <rect x="110" y="470" width="12" height="12" rx="2" fill="#7c3aed" opacity="0.9"></rect>
        <text x="128" y="481" fill="#94a3b8" font-size="10">LLM Analysis</text>
        <rect x="205" y="470" width="12" height="12" rx="2" fill="#0d9488" opacity="0.9"></rect>
