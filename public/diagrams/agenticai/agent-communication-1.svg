<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agent communication patterns: broadcast, request/reply, and pub/sub topologies">
        <defs>
          <marker id="arrow-1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <path d="M0,0 L8,3 L0,6 Z" fill="#0F6E56"></path>
          </marker>
        </defs>
        

        
        <rect width="680" height="340" rx="8" fill="#1a1a2e"></rect>

        
        <text x="113" y="28" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="700" letter-spacing="0.08em">BROADCAST</text>
        <text x="340" y="28" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="700" letter-spacing="0.08em">REQUEST / REPLY</text>
        <text x="567" y="28" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="700" letter-spacing="0.08em">PUB / SUB</text>

        
        <line x1="226" y1="14" x2="226" y2="330" stroke="#333" stroke-width="1" stroke-dasharray="4,4"></line>
        <line x1="453" y1="14" x2="453" y2="330" stroke="#333" stroke-width="1" stroke-dasharray="4,4"></line>

        
        
        <rect x="78" y="60" width="70" height="36" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="113" y="83" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Agent A</text>

        
        <rect x="58" y="130" width="110" height="28" rx="4" fill="#0F6E56" opacity="0.8"></rect>
        <text x="113" y="149" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Broadcast Bus</text>

        
        <line x1="113" y1="96" x2="113" y2="128" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        
        <rect x="28" y="195" width="56" height="36" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="56" y="218" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">B</text>

        <rect x="96" y="195" width="56" height="36" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="124" y="218" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">C</text>

        <rect x="164" y="195" width="56" height="36" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="192" y="218" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">D</text>

        
        <line x1="80" y1="158" x2="56" y2="193" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="113" y1="158" x2="124" y2="193" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="146" y1="158" x2="192" y2="193" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        <text x="113" y="260" text-anchor="middle" fill="#6b7280" font-size="9" font-style="italic">All agents receive</text>
        <text x="113" y="274" text-anchor="middle" fill="#6b7280" font-size="9" font-style="italic">every message</text>

        
        
        <rect x="262" y="80" width="70" height="36" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="297" y="103" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Agent A</text>

        
        <rect x="392" y="80" width="70" height="36" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="427" y="103" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Agent B</text>

        
        <line x1="332" y1="90" x2="390" y2="90" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <text x="361" y="83" text-anchor="middle" fill="#0F6E56" font-size="9" font-weight="600">request</text>

        
        <line x1="390" y1="108" x2="332" y2="108" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <text x="361" y="123" text-anchor="middle" fill="#185FA5" font-size="9" font-weight="600">reply</text>

        
        <rect x="300" y="175" width="100" height="36" rx="4" fill="#185FA5" opacity="0.7"></rect>
        <text x="350" y="198" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Shared State</text>

        
        <line x1="297" y1="116" x2="330" y2="173" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="427" y1="116" x2="380" y2="173" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-1)" fill="none"></line>

        <text x="340" y="238" text-anchor="middle" fill="#6b7280" font-size="9" font-style="italic">Directed, synchronous</text>
        <text x="340" y="252" text-anchor="middle" fill="#6b7280" font-size="9" font-style="italic">with optional shared state</text>

        
        
        <rect x="532" y="55" width="70" height="36" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="567" y="78" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Pub</text>

        
        <rect x="496" y="130" width="60" height="26" rx="4" fill="#0F6E56" opacity="0.8"></rect>
        <text x="526" y="148" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Topic X</text>

        <rect x="571" y="130" width="60" height="26" rx="4" fill="#0F6E56" opacity="0.8"></rect>
        <text x="601" y="148" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Topic Y</text>

        
        <line x1="548" y1="91" x2="526" y2="128" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="586" y1="91" x2="601" y2="128" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        
        <rect x="475" y="200" width="50" height="32" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="500" y="220" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">S1</text>

        <rect x="540" y="200" width="50" height="32" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="565" y="220" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">S2</text>

        <rect x="605" y="200" width="50" height="32" rx="6" fill="#7c3aed" opacity="0.85"></rect>
        <text x="630" y="220" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">S3</text>

        
        <line x1="516" y1="156" x2="500" y2="198" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="536" y1="156" x2="556" y2="198" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="601" y1="156" x2="565" y2="198" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>
        <line x1="617" y1="156" x2="630" y2="198" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-1)" fill="none"></line>

        <text x="567" y="260" text-anchor="middle" fill="#6b7280" font-size="9" font-style="italic">Decoupled: publishers</text>
        <text x="567" y="274" text-anchor="middle" fill="#6b7280" font-size="9" font-style="italic">don&apos;t know subscribers</text>

        
        <rect x="180" y="300" width="12" height="12" rx="3" fill="#7c3aed" opacity="0.85"></rect>
        <text x="198" y="311" fill="#9ca3af" font-size="9">Agent</text>
        <rect x="260" y="300" width="12" height="12" rx="3" fill="#0F6E56" opacity="0.8"></rect>
        <text x="278" y="311" fill="#9ca3af" font-size="9">Channel / Topic</text>
        <rect x="375" y="300" width="12" height="12" rx="3" fill="#185FA5" opacity="0.7"></rect>
        <text x="393" y="311" fill="#9ca3af" font-size="9">Shared State</text>
        <line x1="470" y1="306" x2="495" y2="306" stroke="#555" stroke-width="1" stroke-dasharray="4,3"></line>
        <text x="503" y="311" fill="#9ca3af" font-size="9">Optional link</text>
      </svg>