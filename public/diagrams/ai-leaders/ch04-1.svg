  <text x="450" y="30" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk" font-size="16" font-weight="700">AI Total Cost of Ownership — Iceberg</text>
  <line x1="60" y1="145" x2="840" y2="145" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="870" y="148" text-anchor="start" fill="#3b82f6" font-family="Nunito" font-size="10" font-weight="400">Waterline</text>
  <rect x="250" y="55" width="400" height="75" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" fill="#3b82f6" font-family="Space Grotesk" font-size="13" font-weight="700">Visible Costs</text>
  <text x="450" y="98" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">License fees, API costs, cloud compute</text>
  <text x="450" y="113" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">Hardware, consulting, initial build</text>
