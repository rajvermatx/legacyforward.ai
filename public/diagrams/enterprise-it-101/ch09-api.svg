<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="800" height="300" fill="#f8fafc" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.3">HOW APIS WORK</text>
  <text x="400" y="54" text-anchor="middle" font-size="13" fill="#64748b">A defined contract between two systems — what to ask, what to expect back</text>

  <!-- System A -->
  <rect x="40" y="100" width="160" height="100" rx="10" fill="#0f172a"/>
  <text x="120" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="white">System A</text>
  <text x="120" y="158" text-anchor="middle" font-size="11" fill="#94a3b8">e.g. CRM</text>
  <text x="120" y="176" text-anchor="middle" font-size="10" fill="#64748b">"Get me customer</text>
  <text x="120" y="188" text-anchor="middle" font-size="10" fill="#64748b">account #12345"</text>

  <!-- Request arrow -->
  <line x1="200" y1="135" x2="300" y2="135" stroke="#14b8a6" stroke-width="2"/>
  <polygon points="296,130 308,135 296,140" fill="#14b8a6"/>
  <text x="254" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#14b8a6">REQUEST</text>
  <text x="254" y="110" text-anchor="middle" font-size="10" fill="#64748b">structured format</text>

  <!-- API box -->
  <rect x="300" y="90" width="200" height="120" rx="10" fill="#134e4a"/>
  <text x="400" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#14b8a6">API</text>
  <text x="400" y="143" text-anchor="middle" font-size="11" fill="white">Validates request</text>
  <text x="400" y="159" text-anchor="middle" font-size="11" fill="white">Fetches data</text>
  <text x="400" y="175" text-anchor="middle" font-size="11" fill="white">Formats response</text>
  <text x="400" y="198" text-anchor="middle" font-size="10" fill="#64748b">The "waiter" between systems</text>

  <!-- Response arrow -->
  <line x1="500" y1="165" x2="600" y2="165" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="596,160 608,165 596,170" fill="#f59e0b"/>
  <text x="554" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">RESPONSE</text>
  <text x="554" y="140" text-anchor="middle" font-size="10" fill="#64748b">structured data</text>

  <!-- System B -->
  <rect x="600" y="100" width="160" height="100" rx="10" fill="#0f172a"/>
  <text x="680" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="white">System B</text>
  <text x="680" y="158" text-anchor="middle" font-size="11" fill="#94a3b8">e.g. Billing</text>
  <text x="680" y="176" text-anchor="middle" font-size="10" fill="#64748b">Returns account</text>
  <text x="680" y="188" text-anchor="middle" font-size="10" fill="#64748b">balance + history</text>

  <!-- Key callout -->
  <rect x="160" y="240" width="480" height="40" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="400" y="256" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">The API is the contract:</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#78350f">what requests are valid, what format they must be in, what the response will look like</text>
</svg>
