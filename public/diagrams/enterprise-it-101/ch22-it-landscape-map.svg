<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="900" height="520" fill="#f8fafc" rx="12"/>
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.3">THE ENTERPRISE IT LANDSCAPE AT A GLANCE</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#64748b">How the layers, categories, and roles fit together</text>

  <!-- Band 1: Infrastructure (bottom) -->
  <rect x="30" y="390" width="700" height="74" rx="8" fill="#1e293b"/>
  <text x="380" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">INFRASTRUCTURE</text>
  <text x="380" y="436" text-anchor="middle" font-size="11" fill="#475569">Cloud · On-Prem · Edge · Networking</text>
  <!-- Items -->
  <rect x="50" y="448" width="90" height="12" rx="3" fill="#334155"/>
  <text x="95" y="458" text-anchor="middle" font-size="9" fill="#94a3b8">Cloud Compute</text>
  <rect x="160" y="448" width="90" height="12" rx="3" fill="#334155"/>
  <text x="205" y="458" text-anchor="middle" font-size="9" fill="#94a3b8">On-Prem Servers</text>
  <rect x="270" y="448" width="70" height="12" rx="3" fill="#334155"/>
  <text x="305" y="458" text-anchor="middle" font-size="9" fill="#94a3b8">Edge / IoT</text>
  <rect x="360" y="448" width="80" height="12" rx="3" fill="#334155"/>
  <text x="400" y="458" text-anchor="middle" font-size="9" fill="#94a3b8">Networking</text>

  <!-- Band 2: Core Systems -->
  <rect x="30" y="308" width="700" height="74" rx="8" fill="#0f172a"/>
  <text x="380" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1">CORE SYSTEMS</text>
  <text x="380" y="348" text-anchor="middle" font-size="10" fill="#64748b">ERP · Core Banking · HR · Mainframe</text>
  <text x="380" y="364" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">Systems of Record — authoritative source of truth</text>
  <!-- Item pills -->
  <rect x="50" y="370" width="60" height="10" rx="3" fill="#1e293b"/>
  <text x="80" y="379" text-anchor="middle" font-size="9" fill="#64748b">ERP</text>
  <rect x="122" y="370" width="90" height="10" rx="3" fill="#1e293b"/>
  <text x="167" y="379" text-anchor="middle" font-size="9" fill="#64748b">Core Banking</text>
  <rect x="224" y="370" width="50" height="10" rx="3" fill="#1e293b"/>
  <text x="249" y="379" text-anchor="middle" font-size="9" fill="#64748b">HR</text>
  <rect x="286" y="370" width="80" height="10" rx="3" fill="#1e293b"/>
  <text x="326" y="379" text-anchor="middle" font-size="9" fill="#64748b">Mainframe</text>

  <!-- Band 3: Engagement Layer -->
  <rect x="30" y="226" width="700" height="74" rx="8" fill="#1e3a5f"/>
  <text x="380" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="#93c5fd" letter-spacing="1">ENGAGEMENT LAYER</text>
  <text x="380" y="266" text-anchor="middle" font-size="10" fill="#bfdbfe">CRM · Portals · Collaboration · Workflow</text>
  <text x="380" y="282" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Systems of Engagement — where people interact</text>
  <rect x="50" y="288" width="50" height="10" rx="3" fill="#172554"/>
  <text x="75" y="297" text-anchor="middle" font-size="9" fill="#93c5fd">CRM</text>
  <rect x="114" y="288" width="60" height="10" rx="3" fill="#172554"/>
  <text x="144" y="297" text-anchor="middle" font-size="9" fill="#93c5fd">Portals</text>
  <rect x="186" y="288" width="100" height="10" rx="3" fill="#172554"/>
  <text x="236" y="297" text-anchor="middle" font-size="9" fill="#93c5fd">Collaboration</text>
  <rect x="298" y="288" width="80" height="10" rx="3" fill="#172554"/>
  <text x="338" y="297" text-anchor="middle" font-size="9" fill="#93c5fd">Workflow</text>

  <!-- Band 4: Integration Layer -->
  <rect x="30" y="144" width="700" height="74" rx="8" fill="#134e4a"/>
  <text x="380" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#6ee7b7" letter-spacing="1">INTEGRATION LAYER</text>
  <text x="380" y="184" text-anchor="middle" font-size="10" fill="#99f6e4">APIs · ETL · Event Streams · iPaaS</text>
  <text x="380" y="200" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">The Connective Tissue — moves data between layers</text>
  <rect x="50" y="206" width="50" height="10" rx="3" fill="#0d3d38"/>
  <text x="75" y="215" text-anchor="middle" font-size="9" fill="#6ee7b7">APIs</text>
  <rect x="114" y="206" width="50" height="10" rx="3" fill="#0d3d38"/>
  <text x="139" y="215" text-anchor="middle" font-size="9" fill="#6ee7b7">ETL</text>
  <rect x="178" y="206" width="100" height="10" rx="3" fill="#0d3d38"/>
  <text x="228" y="215" text-anchor="middle" font-size="9" fill="#6ee7b7">Event Streams</text>
  <rect x="290" y="206" width="60" height="10" rx="3" fill="#0d3d38"/>
  <text x="320" y="215" text-anchor="middle" font-size="9" fill="#6ee7b7">iPaaS</text>

  <!-- Band 5: AI & Intelligence (top) -->
  <rect x="30" y="68" width="700" height="68" rx="8" fill="#14b8a6"/>
  <text x="380" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="white" letter-spacing="1">AI &amp; INTELLIGENCE</text>
  <text x="380" y="110" text-anchor="middle" font-size="11" fill="#ccfbf1">Models · Predictions · Automation · Recommendations</text>
  <rect x="50" y="118" width="60" height="10" rx="3" fill="#0d9488"/>
  <text x="80" y="127" text-anchor="middle" font-size="9" fill="white">LLMs</text>
  <rect x="124" y="118" width="80" height="10" rx="3" fill="#0d9488"/>
  <text x="164" y="127" text-anchor="middle" font-size="9" fill="white">Predictions</text>
  <rect x="218" y="118" width="80" height="10" rx="3" fill="#0d9488"/>
  <text x="258" y="127" text-anchor="middle" font-size="9" fill="white">Automation</text>
  <rect x="312" y="118" width="110" height="10" rx="3" fill="#0d9488"/>
  <text x="367" y="127" text-anchor="middle" font-size="9" fill="white">Recommendations</text>

  <!-- Right side: Sprawl risk labels -->
  <text x="750" y="105" font-size="10" fill="#0d9488" font-weight="600">Emerging —</text>
  <text x="750" y="118" font-size="10" fill="#0d9488">governance needed</text>

  <text x="750" y="188" font-size="10" fill="#6ee7b7" font-weight="600">HIGH —</text>
  <text x="750" y="200" font-size="10" fill="#6ee7b7">spaghetti risk</text>

  <text x="750" y="268" font-size="10" fill="#93c5fd" font-weight="600">HIGH —</text>
  <text x="750" y="280" font-size="10" fill="#93c5fd">most sprawl here</text>

  <text x="750" y="350" font-size="10" fill="#94a3b8" font-weight="600">Medium —</text>
  <text x="750" y="362" font-size="10" fill="#94a3b8">consolidation needed</text>

  <text x="750" y="428" font-size="10" fill="#64748b" font-weight="600">Low</text>
  <text x="750" y="440" font-size="10" fill="#64748b">sprawl risk</text>

  <!-- Right bracket line -->
  <line x1="738" y1="70" x2="738" y2="462" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom callouts -->
  <rect x="30" y="476" width="340" height="36" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="200" y="492" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">Governance gap lives between</text>
  <text x="200" y="506" text-anchor="middle" font-size="11" fill="#78350f">Core Systems and Engagement</text>

  <rect x="390" y="476" width="340" height="36" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="560" y="492" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">The integration layer is where</text>
  <text x="560" y="506" text-anchor="middle" font-size="11" fill="#991b1b">most AI projects stall</text>
</svg>
