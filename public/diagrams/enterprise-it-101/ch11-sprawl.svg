<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="800" height="340" fill="#f8fafc" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.3">THREE PATHS TO IT SPRAWL</text>
  <text x="400" y="54" text-anchor="middle" font-size="13" fill="#64748b">No one plans for sprawl. It accumulates through three predictable mechanisms.</text>

  <!-- M&A -->
  <rect x="30" y="76" width="210" height="170" rx="10" fill="#1e3a5f"/>
  <text x="135" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#60a5fa">M&amp;A</text>
  <text x="135" y="122" text-anchor="middle" font-size="11" fill="#94a3b8">Every acquisition brings</text>
  <text x="135" y="138" text-anchor="middle" font-size="11" fill="#94a3b8">its full tech stack.</text>
  <text x="135" y="162" text-anchor="middle" font-size="11" fill="white">5 ERP instances</text>
  <text x="135" y="178" text-anchor="middle" font-size="11" fill="white">3 HR systems</text>
  <text x="135" y="194" text-anchor="middle" font-size="11" fill="white">4 CRMs</text>
  <text x="135" y="218" text-anchor="middle" font-size="10" fill="#64748b">Consolidation always takes</text>
  <text x="135" y="232" text-anchor="middle" font-size="10" fill="#64748b">longer than planned</text>

  <!-- Shadow IT -->
  <rect x="295" y="76" width="210" height="170" rx="10" fill="#1e3a5f"/>
  <text x="400" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#c084fc">SHADOW IT</text>
  <text x="400" y="122" text-anchor="middle" font-size="11" fill="#94a3b8">Teams solve problems</text>
  <text x="400" y="138" text-anchor="middle" font-size="11" fill="#94a3b8">without IT involvement.</text>
  <text x="400" y="162" text-anchor="middle" font-size="11" fill="white">Personal Dropbox</text>
  <text x="400" y="178" text-anchor="middle" font-size="11" fill="white">Rogue SaaS signups</text>
  <text x="400" y="194" text-anchor="middle" font-size="11" fill="white">Excel "systems"</text>
  <text x="400" y="218" text-anchor="middle" font-size="10" fill="#64748b">IT doesn't know it exists</text>
  <text x="400" y="232" text-anchor="middle" font-size="10" fill="#64748b">until something breaks</text>

  <!-- Organic -->
  <rect x="560" y="76" width="210" height="170" rx="10" fill="#1e3a5f"/>
  <text x="665" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#34d399">ORGANIC GROWTH</text>
  <text x="665" y="122" text-anchor="middle" font-size="11" fill="#94a3b8">Teams add tools one</text>
  <text x="665" y="138" text-anchor="middle" font-size="11" fill="#94a3b8">at a time over years.</text>
  <text x="665" y="162" text-anchor="middle" font-size="11" fill="white">Tool A → Tool B added</text>
  <text x="665" y="178" text-anchor="middle" font-size="11" fill="white">Tool C preferred by</text>
  <text x="665" y="194" text-anchor="middle" font-size="11" fill="white">new hire → 3 tools</text>
  <text x="665" y="218" text-anchor="middle" font-size="10" fill="#64748b">Each decision reasonable.</text>
  <text x="665" y="232" text-anchor="middle" font-size="10" fill="#64748b">Aggregate is chaos.</text>

  <!-- Arrows converging -->
  <line x1="135" y1="246" x2="340" y2="290" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="400" y1="246" x2="400" y2="290" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="665" y1="246" x2="460" y2="290" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>

  <rect x="250" y="288" width="300" height="34" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">IT SPRAWL</text>
  <text x="400" y="316" text-anchor="middle" font-size="10" fill="#7f1d1d">Overlapping systems · Fragmented data · Maintenance burden</text>
</svg>
