<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="800" height="380" fill="#f8fafc" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.3">RIP-AND-REPLACE VS. COEXISTENCE</text>
  <text x="400" y="52" text-anchor="middle" font-size="13" fill="#64748b">Most enterprises cannot afford a full replacement — coexistence is the strategy</text>

  <!-- LEFT panel: Rip and Replace -->
  <rect x="30" y="68" width="340" height="288" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="200" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b" letter-spacing="0.5">RIP AND REPLACE</text>
  <line x1="50" y1="108" x2="350" y2="108" stroke="#fca5a5" stroke-width="1"/>

  <!-- Stats -->
  <text x="200" y="132" text-anchor="middle" font-size="11" fill="#7f1d1d">Risk: <tspan font-weight="700">HIGH</tspan>   ·   Timeline: <tspan font-weight="700">3–7 years</tspan>   ·   Cost: <tspan font-weight="700">$10M–$100M+</tspan></text>
  <line x1="50" y1="142" x2="350" y2="142" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>

  <!-- Bullets -->
  <text x="62" y="166" font-size="11" fill="#991b1b">✕  Full migration required before value</text>
  <text x="62" y="190" font-size="11" fill="#991b1b">✕  High failure rate (70%+ go over budget)</text>
  <text x="62" y="214" font-size="11" fill="#991b1b">✕  Business disruption during cutover</text>
  <text x="62" y="238" font-size="11" fill="#991b1b">✕  Sunk cost if project stalls</text>

  <!-- RIGHT panel: Coexistence -->
  <rect x="430" y="68" width="340" height="288" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="600" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#166534" letter-spacing="0.5">COEXISTENCE STRATEGY</text>
  <line x1="450" y1="108" x2="750" y2="108" stroke="#86efac" stroke-width="1"/>

  <!-- Stats -->
  <text x="600" y="132" text-anchor="middle" font-size="11" fill="#14532d">Risk: <tspan font-weight="700">LOWER</tspan>   ·   Timeline: <tspan font-weight="700">Iterative</tspan>   ·   Cost: <tspan font-weight="700">Incremental</tspan></text>
  <line x1="450" y1="142" x2="750" y2="142" stroke="#86efac" stroke-width="1" opacity="0.5"/>

  <!-- Bullets -->
  <text x="462" y="166" font-size="11" fill="#166534">✓  Extract data layer alongside legacy</text>
  <text x="462" y="190" font-size="11" fill="#166534">✓  AI consumes APIs — not raw system</text>
  <text x="462" y="214" font-size="11" fill="#166534">✓  Incremental value delivery</text>
  <text x="462" y="238" font-size="11" fill="#166534">✓  Legacy continues to run reliably</text>

  <!-- VS divider -->
  <circle cx="400" cy="212" r="22" fill="#1e293b" stroke="#f8fafc" stroke-width="2"/>
  <text x="400" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="white">vs.</text>

  <!-- Bottom callout -->
  <rect x="80" y="364" width="640" height="0" rx="5"/>
  <rect x="80" y="358" width="640" height="18" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="400" y="371" text-anchor="middle" font-size="11" fill="#78350f">The goal is not to replace the legacy system. The goal is to get value from what it knows.</text>
</svg>
