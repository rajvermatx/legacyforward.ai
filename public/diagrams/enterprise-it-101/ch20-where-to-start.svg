<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="800" height="440" fill="#f8fafc" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.3">THE AI STARTING POINT MATRIX</text>
  <text x="400" y="52" text-anchor="middle" font-size="13" fill="#64748b">Prioritize where data is accessible AND business value is high</text>

  <!-- Axes -->
  <!-- Y axis -->
  <line x1="110" y1="70" x2="110" y2="380" stroke="#94a3b8" stroke-width="2"/>
  <!-- X axis -->
  <line x1="110" y1="380" x2="770" y2="380" stroke="#94a3b8" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="28" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b" transform="rotate(-90 28 230)">BUSINESS VALUE</text>
  <text x="65" y="94" text-anchor="middle" font-size="10" fill="#94a3b8">High</text>
  <text x="65" y="374" text-anchor="middle" font-size="10" fill="#94a3b8">Low</text>
  <!-- X axis label -->
  <text x="440" y="418" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">DATA ACCESSIBILITY</text>
  <text x="128" y="400" font-size="10" fill="#94a3b8">Low</text>
  <text x="738" y="400" font-size="10" fill="#94a3b8">High</text>

  <!-- Quadrant: Top-left (Amber) - Fix Data First -->
  <rect x="110" y="70" width="330" height="310" rx="0" fill="#fffbeb" opacity="0.9"/>
  <rect x="112" y="72" width="326" height="306" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
  <text x="275" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">FIX DATA FIRST</text>
  <text x="275" y="122" text-anchor="middle" font-size="11" fill="#b45309">High value but data is locked.</text>
  <text x="275" y="138" text-anchor="middle" font-size="11" fill="#b45309">Worth the investment to unlock.</text>

  <!-- Quadrant: Top-right (Green) - Start Here -->
  <rect x="440" y="70" width="330" height="310" rx="0" fill="#f0fdf4" opacity="0.9"/>
  <rect x="442" y="72" width="326" height="306" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="605" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">START HERE</text>
  <text x="605" y="122" text-anchor="middle" font-size="11" fill="#15803d">High value, accessible data.</text>
  <text x="605" y="138" text-anchor="middle" font-size="11" fill="#15803d">Quick wins, executive visibility.</text>

  <!-- Quadrant: Bottom-left (Red) - Avoid -->
  <rect x="110" y="380" width="330" height="0" rx="0"/>
  <rect x="112" y="72" width="326" height="306" rx="6" fill="none"/>
  <!-- Actually bottom-left is below x-axis — let me redo geometry. The grid goes from y=70 to y=380 for the full plot area. Split at midpoint y=225 -->

  <!-- Redo: 4 quadrants centered at (440, 225) -->
  <!-- Clear previous and draw properly -->
  <rect x="0" y="0" width="800" height="440" fill="#f8fafc"/>
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.3">THE AI STARTING POINT MATRIX</text>
  <text x="400" y="52" text-anchor="middle" font-size="13" fill="#64748b">Prioritize where data is accessible AND business value is high</text>

  <!-- Plot area: x=110..770, y=68..390. Mid: x=440, y=229 -->

  <!-- Q: Bottom-left (Red) - Avoid -->
  <rect x="112" y="231" width="326" height="157" rx="0" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <!-- Q: Bottom-right (Blue) - Opportunistic -->
  <rect x="440" y="231" width="328" height="157" rx="0" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Q: Top-left (Amber) - Fix Data First -->
  <rect x="112" y="70" width="326" height="159" rx="0" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <!-- Q: Top-right (Green) - Start Here -->
  <rect x="440" y="70" width="328" height="159" rx="0" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>

  <!-- Axes on top of quadrants -->
  <line x1="110" y1="68" x2="110" y2="390" stroke="#475569" stroke-width="2"/>
  <line x1="110" y1="390" x2="770" y2="390" stroke="#475569" stroke-width="2"/>
  <!-- Center dividers -->
  <line x1="110" y1="229" x2="770" y2="229" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="440" y1="68" x2="440" y2="390" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Axis labels -->
  <text x="28" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#475569" transform="rotate(-90 28 230)">BUSINESS VALUE</text>
  <text x="75" y="84" text-anchor="middle" font-size="10" fill="#64748b">High ↑</text>
  <text x="75" y="388" text-anchor="middle" font-size="10" fill="#64748b">Low ↓</text>
  <text x="400" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">DATA ACCESSIBILITY</text>
  <text x="130" y="408" font-size="10" fill="#64748b">← Low</text>
  <text x="720" y="408" font-size="10" fill="#64748b">High →</text>

  <!-- Quadrant labels -->
  <!-- Top-left: Fix Data First -->
  <text x="275" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">FIX DATA FIRST</text>
  <text x="275" y="116" text-anchor="middle" font-size="11" fill="#b45309">High value but data is locked.</text>
  <text x="275" y="131" text-anchor="middle" font-size="11" fill="#b45309">Worth the investment to unlock.</text>

  <!-- Top-right: Start Here -->
  <text x="604" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">START HERE ★</text>
  <text x="604" y="116" text-anchor="middle" font-size="11" fill="#15803d">High value, accessible data.</text>
  <text x="604" y="131" text-anchor="middle" font-size="11" fill="#15803d">Quick wins, executive visibility.</text>

  <!-- Bottom-left: Avoid -->
  <text x="275" y="263" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">AVOID FOR NOW</text>
  <text x="275" y="279" text-anchor="middle" font-size="11" fill="#b91c1c">Low value AND data problems.</text>
  <text x="275" y="294" text-anchor="middle" font-size="11" fill="#b91c1c">Don't start here.</text>

  <!-- Bottom-right: Opportunistic -->
  <text x="604" y="263" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">OPPORTUNISTIC</text>
  <text x="604" y="279" text-anchor="middle" font-size="11" fill="#1d4ed8">Low stakes, data is ready.</text>
  <text x="604" y="294" text-anchor="middle" font-size="11" fill="#1d4ed8">Good for learning and experimentation.</text>

  <!-- Use case dots -->
  <!-- Document Q&A: top-right (high value, high accessibility) -->
  <circle cx="650" cy="155" r="8" fill="#166534"/>
  <text x="665" y="152" font-size="10" fill="#0f172a" font-weight="600">Document Q&amp;A</text>

  <!-- Predictive Maintenance: top-left (high value, low accessibility) -->
  <circle cx="180" cy="160" r="8" fill="#92400e"/>
  <text x="195" y="157" font-size="10" fill="#0f172a" font-weight="600">Predictive Maintenance</text>

  <!-- Email Drafting: bottom-right (low value, high accessibility) -->
  <circle cx="620" cy="330" r="8" fill="#1e40af"/>
  <text x="635" y="327" font-size="10" fill="#0f172a" font-weight="600">Email Drafting</text>

  <!-- Legacy Data Mining: bottom-left (low value, low accessibility) -->
  <circle cx="175" cy="345" r="8" fill="#991b1b"/>
  <text x="190" y="342" font-size="10" fill="#0f172a" font-weight="600">Legacy Data Mining</text>

  <!-- Bottom callout -->
  <rect x="140" y="420" width="520" height="16" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="400" y="432" text-anchor="middle" font-size="11" fill="#78350f">Start top-right. Move top-left next. Never start bottom-left.</text>
</svg>
