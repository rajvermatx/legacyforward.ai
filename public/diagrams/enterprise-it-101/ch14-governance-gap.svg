<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="800" height="320" fill="#f8fafc" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.3">THE GOVERNANCE GAP</text>
  <text x="400" y="54" text-anchor="middle" font-size="13" fill="#64748b">Nominal ownership vs. actual knowledge are rarely the same person</text>

  <!-- Nominal owner column -->
  <rect x="60" y="76" width="280" height="180" rx="10" fill="#1e3a5f"/>
  <text x="200" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#60a5fa">NOMINAL OWNER</text>
  <text x="200" y="120" text-anchor="middle" font-size="11" fill="#94a3b8">"Application Manager, Systems"</text>

  <text x="200" y="150" text-anchor="middle" font-size="30">👔</text>

  <text x="200" y="186" text-anchor="middle" font-size="11" fill="white">On the org chart</text>
  <text x="200" y="202" text-anchor="middle" font-size="11" fill="white">Has the title</text>
  <text x="200" y="218" text-anchor="middle" font-size="11" fill="white">Gets the incident page</text>
  <text x="200" y="234" text-anchor="middle" font-size="11" fill="#ef4444">Doesn't know how it works</text>

  <!-- Gap arrow -->
  <line x1="340" y1="166" x2="460" y2="166" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="156" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">THE GAP</text>

  <!-- Actual owner column -->
  <rect x="460" y="76" width="280" height="180" rx="10" fill="#1e3a5f"/>
  <text x="600" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#34d399">ACTUAL KNOWLEDGE</text>
  <text x="600" y="120" text-anchor="middle" font-size="11" fill="#94a3b8">"Janet in Finance / Dave in IT Ops"</text>

  <text x="600" y="150" text-anchor="middle" font-size="30">🧠</text>

  <text x="600" y="186" text-anchor="middle" font-size="11" fill="white">Knows every quirk</text>
  <text x="600" y="202" text-anchor="middle" font-size="11" fill="white">Fixes it when it breaks</text>
  <text x="600" y="218" text-anchor="middle" font-size="11" fill="white">No formal authority</text>
  <text x="600" y="234" text-anchor="middle" font-size="11" fill="#f59e0b">Retiring in 18 months</text>

  <!-- Warning callout -->
  <rect x="160" y="274" width="480" height="34" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="288" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">The retirement risk:</text>
  <text x="400" y="302" text-anchor="middle" font-size="11" fill="#7f1d1d">When the actual knowledge holder leaves, the gap becomes a crisis. Document before they go.</text>
</svg>
