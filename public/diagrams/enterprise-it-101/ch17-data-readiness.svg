<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="800" height="440" fill="#f8fafc" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.3">THE FOUR DIMENSIONS OF DATA READINESS</text>
  <text x="400" y="52" text-anchor="middle" font-size="13" fill="#64748b">AI is only as ready as the data it depends on</text>

  <!-- Top-left: Availability -->
  <rect x="30" y="68" width="360" height="160" rx="8" fill="#134e4a"/>
  <text x="210" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#6ee7b7" letter-spacing="0.5">AVAILABILITY</text>
  <text x="210" y="114" text-anchor="middle" font-size="11" fill="#99f6e4">Can AI access it?</text>
  <line x1="70" y1="124" x2="350" y2="124" stroke="#0d9488" stroke-width="1" opacity="0.5"/>
  <circle cx="70" cy="145" r="4" fill="#6ee7b7"/>
  <text x="84" y="149" font-size="12" fill="#ccfbf1">Structured and queryable</text>
  <circle cx="70" cy="169" r="4" fill="#6ee7b7"/>
  <text x="84" y="173" font-size="12" fill="#ccfbf1">Not locked in siloed systems</text>
  <circle cx="70" cy="193" r="4" fill="#6ee7b7"/>
  <text x="84" y="197" font-size="12" fill="#ccfbf1">Accessible via API or pipeline</text>

  <!-- Top-right: Quality -->
  <rect x="410" y="68" width="360" height="160" rx="8" fill="#1e3a5f"/>
  <text x="590" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#93c5fd" letter-spacing="0.5">QUALITY</text>
  <text x="590" y="114" text-anchor="middle" font-size="11" fill="#bfdbfe">Can AI trust it?</text>
  <line x1="450" y1="124" x2="730" y2="124" stroke="#1e40af" stroke-width="1" opacity="0.5"/>
  <circle cx="450" cy="145" r="4" fill="#93c5fd"/>
  <text x="464" y="149" font-size="12" fill="#dbeafe">Accurate and consistent</text>
  <circle cx="450" cy="169" r="4" fill="#93c5fd"/>
  <text x="464" y="173" font-size="12" fill="#dbeafe">No duplicate records</text>
  <circle cx="450" cy="193" r="4" fill="#93c5fd"/>
  <text x="464" y="197" font-size="12" fill="#dbeafe">Validated at the source</text>

  <!-- Bottom-left: Relevance -->
  <rect x="30" y="246" width="360" height="160" rx="8" fill="#1e3a5f"/>
  <text x="210" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#93c5fd" letter-spacing="0.5">RELEVANCE</text>
  <text x="210" y="292" text-anchor="middle" font-size="11" fill="#bfdbfe">Does AI need it?</text>
  <line x1="70" y1="302" x2="350" y2="302" stroke="#1e40af" stroke-width="1" opacity="0.5"/>
  <circle cx="70" cy="323" r="4" fill="#93c5fd"/>
  <text x="84" y="327" font-size="12" fill="#dbeafe">Domain-aligned</text>
  <circle cx="70" cy="347" r="4" fill="#93c5fd"/>
  <text x="84" y="351" font-size="12" fill="#dbeafe">Recent enough to be valid</text>
  <circle cx="70" cy="371" r="4" fill="#93c5fd"/>
  <text x="84" y="375" font-size="12" fill="#dbeafe">Sufficient volume for patterns</text>

  <!-- Bottom-right: Governance -->
  <rect x="410" y="246" width="360" height="160" rx="8" fill="#78350f"/>
  <text x="590" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#fcd34d" letter-spacing="0.5">GOVERNANCE</text>
  <text x="590" y="292" text-anchor="middle" font-size="11" fill="#fde68a">Is AI allowed to use it?</text>
  <line x1="450" y1="302" x2="730" y2="302" stroke="#92400e" stroke-width="1" opacity="0.5"/>
  <circle cx="450" cy="323" r="4" fill="#fcd34d"/>
  <text x="464" y="327" font-size="12" fill="#fef3c7">Data ownership clear</text>
  <circle cx="450" cy="347" r="4" fill="#fcd34d"/>
  <text x="464" y="351" font-size="12" fill="#fef3c7">Privacy and consent documented</text>
  <circle cx="450" cy="371" r="4" fill="#fcd34d"/>
  <text x="464" y="375" font-size="12" fill="#fef3c7">Retention policy enforced</text>

  <!-- Bottom callout -->
  <rect x="80" y="416" width="640" height="18" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="400" y="429" text-anchor="middle" font-size="11" fill="#78350f">Most organizations fail on governance — they have the data but can't legally or safely use it.</text>
</svg>
