<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="800" height="360" fill="#f8fafc" rx="12"/>
  <text x="400" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a" letter-spacing="0.3">SAAS SPRAWL: PLANNED VS. REALITY</text>

  <!-- PLANNED side -->
  <rect x="30" y="56" width="340" height="280" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="200" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">PLANNED LANDSCAPE</text>

  <rect x="90" y="100" width="220" height="36" rx="6" fill="#0f172a"/>
  <text x="200" y="123" text-anchor="middle" font-size="12" font-weight="600" fill="white">1 CRM (Salesforce)</text>

  <rect x="90" y="148" width="220" height="36" rx="6" fill="#0f172a"/>
  <text x="200" y="171" text-anchor="middle" font-size="12" font-weight="600" fill="white">1 HR System (Workday)</text>

  <rect x="90" y="196" width="220" height="36" rx="6" fill="#0f172a"/>
  <text x="200" y="219" text-anchor="middle" font-size="12" font-weight="600" fill="white">1 Project Tool (Jira)</text>

  <rect x="90" y="244" width="220" height="36" rx="6" fill="#0f172a"/>
  <text x="200" y="267" text-anchor="middle" font-size="12" font-weight="600" fill="white">1 Comms Tool (Slack)</text>

  <text x="200" y="310" text-anchor="middle" font-size="12" fill="#166534" font-weight="600">4 tools · coherent · governed</text>

  <!-- REALITY side -->
  <rect x="430" y="56" width="340" height="280" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">ACTUAL LANDSCAPE</text>

  <!-- Scattered overlapping tools -->
  <rect x="450" y="96" width="130" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="515" y="114" text-anchor="middle" font-size="10" fill="white">Salesforce (Sales)</text>

  <rect x="600" y="96" width="130" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="665" y="114" text-anchor="middle" font-size="10" fill="white">HubSpot (Marketing)</text>

  <rect x="450" y="134" width="130" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="515" y="152" text-anchor="middle" font-size="10" fill="white">Pipedrive (CS team)</text>

  <rect x="590" y="134" width="140" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="660" y="152" text-anchor="middle" font-size="10" fill="white">Workday (HR)</text>

  <rect x="450" y="172" width="110" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="505" y="190" text-anchor="middle" font-size="10" fill="white">BambooHR (Eng)</text>

  <rect x="570" y="172" width="90" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="615" y="190" text-anchor="middle" font-size="10" fill="white">Lattice</text>

  <rect x="670" y="172" width="90" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="715" y="190" text-anchor="middle" font-size="10" fill="white">Greenhouse</text>

  <rect x="450" y="210" width="100" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="500" y="228" text-anchor="middle" font-size="10" fill="white">Jira</text>

  <rect x="560" y="210" width="100" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="610" y="228" text-anchor="middle" font-size="10" fill="white">Asana</text>

  <rect x="670" y="210" width="100" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="720" y="228" text-anchor="middle" font-size="10" fill="white">Monday.com</text>

  <rect x="450" y="248" width="100" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="500" y="266" text-anchor="middle" font-size="10" fill="white">Slack</text>

  <rect x="560" y="248" width="100" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="610" y="266" text-anchor="middle" font-size="10" fill="white">Teams</text>

  <rect x="670" y="248" width="100" height="28" rx="5" fill="#7f1d1d" opacity="0.8"/>
  <text x="720" y="266" text-anchor="middle" font-size="10" fill="white">Zoom + Meet</text>

  <text x="600" y="310" text-anchor="middle" font-size="12" fill="#991b1b" font-weight="600">12+ tools · overlapping · fragmented data</text>
</svg>
