<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Participants -->
  <rect x="30" y="10" width="120" height="36" rx="4" fill="#f8fafc" stroke="#06b6d4" stroke-width="2"/>
  <text x="90" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Client App</text>

  <rect x="230" y="10" width="120" height="36" rx="4" fill="#f8fafc" stroke="#06b6d4" stroke-width="2"/>
  <text x="290" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">API Gateway</text>

  <rect x="430" y="10" width="120" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="490" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Chat Server</text>

  <rect x="630" y="10" width="120" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="690" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">LLM Provider</text>

  <rect x="810" y="10" width="80" height="36" rx="4" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="850" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Logs</text>

  <!-- Lifelines -->
  <line x1="90" y1="46" x2="90" y2="460" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="290" y1="46" x2="290" y2="460" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="490" y1="46" x2="490" y2="460" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="690" y1="46" x2="690" y2="460" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="850" y1="46" x2="850" y2="460" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Activation bars -->
  <rect x="85" y="70" width="10" height="50" fill="#06b6d4" opacity="0.2" rx="2"/>
  <rect x="285" y="85" width="10" height="45" fill="#06b6d4" opacity="0.2" rx="2"/>
  <rect x="485" y="155" width="10" height="130" fill="#a855f7" opacity="0.2" rx="2"/>
  <rect x="685" y="215" width="10" height="60" fill="#a855f7" opacity="0.2" rx="2"/>
  <rect x="845" y="385" width="10" height="40" fill="#f59e0b" opacity="0.2" rx="2"/>

  <!-- 1. Client sends request -->
  <text x="22" y="82" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">1</text>
  <line x1="95" y1="80" x2="280" y2="80" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="188" y="74" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">POST /v1/chat {messages, params}</text>

  <!-- 2. Gateway validates -->
  <text x="22" y="107" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">2</text>
  <rect x="270" y="100" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="290" y="114" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">auth</text>
  <text x="340" y="114" fill="#475569" font-family="Nunito, sans-serif" font-size="10">validate token, rate limit, input policy</text>

  <!-- 3. Forward to chat server -->
  <text x="22" y="152" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">3</text>
  <line x1="295" y1="145" x2="480" y2="145" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="388" y="139" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">forward validated request</text>

  <!-- 4. Prepend system prompt -->
  <text x="22" y="182" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">4</text>
  <rect x="470" y="170" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="490" y="184" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">build</text>
  <text x="540" y="184" fill="#475569" font-family="Nunito, sans-serif" font-size="10">prepend system prompt to messages[]</text>

  <!-- 5. Call LLM API -->
  <text x="22" y="222" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">5</text>
  <line x1="495" y1="215" x2="680" y2="215" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="588" y="209" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">messages[] + temperature + max_tokens</text>

  <!-- 6. LLM generates tokens -->
  <text x="22" y="252" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">6</text>
  <rect x="670" y="240" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="690" y="254" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">gen</text>
  <text x="720" y="254" fill="#475569" font-family="Nunito, sans-serif" font-size="10">autoregressive token generation</text>

  <!-- 7. Stream/return response -->
  <text x="22" y="292" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">7</text>
  <line x1="680" y1="285" x2="495" y2="285" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="588" y="279" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">completion / SSE stream chunks</text>

  <!-- 8. Return to gateway -->
  <text x="22" y="322" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">8</text>
  <line x1="480" y1="315" x2="295" y2="315" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="388" y="309" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">response with usage metadata</text>

  <!-- 9. Return to client -->
  <text x="22" y="352" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">9</text>
  <line x1="280" y1="345" x2="95" y2="345" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="188" y="339" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">HTTP 200 + streamed text</text>

  <!-- 10. Async logging -->
  <text x="22" y="397" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">10</text>
  <line x1="295" y1="390" x2="840" y2="390" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="568" y="384" text-anchor="middle" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="10">async: log request_id, latency, tokens, model, cost</text>

  <!-- Legend -->
  <line x1="30" y1="445" x2="60" y2="445" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="68" y="449" fill="#475569" font-family="Nunito, sans-serif" font-size="9">request</text>
  <line x1="160" y1="445" x2="130" y2="445" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="168" y="449" fill="#475569" font-family="Nunito, sans-serif" font-size="9">response</text>
  <line x1="240" y1="445" x2="270" y2="445" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="278" y="449" fill="#475569" font-family="Nunito, sans-serif" font-size="9">async</text>
</svg>
