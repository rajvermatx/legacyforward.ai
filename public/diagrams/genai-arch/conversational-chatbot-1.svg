<svg viewBox="0 0 800 400" class="learning-path-svg" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"></polygon>
            </marker>
          </defs>

          
          <rect x="30" y="130" width="130" height="70" rx="12" fill="#f8fafc" stroke="#22c55e" stroke-width="2"></rect>
          <text x="95" y="162" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="15" font-weight="600">User</text>
          <text x="95" y="182" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11">New message</text>

          
          <line x1="160" y1="165" x2="240" y2="165" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow2)"></line>

          
          <rect x="250" y="110" width="160" height="110" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"></rect>
          <text x="330" y="140" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="14" font-weight="600">Chat Server</text>
          <text x="330" y="160" text-anchor="middle" fill="#22c55e" font-family="JetBrains Mono" font-size="10">+ system prompt</text>
          <text x="330" y="178" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">Load history</text>
          <text x="330" y="194" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">Assemble messages[]</text>

          
          <rect x="240" y="280" width="180" height="70" rx="12" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"></rect>
          <text x="330" y="310" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="14" font-weight="600">Session Store</text>
          <text x="330" y="330" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11">Redis / DB / In-Memory</text>

          
          <line x1="300" y1="220" x2="300" y2="275" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow2)"></line>
          <text x="276" y="250" fill="#475569" font-family="JetBrains Mono" font-size="9">load</text>

          
          <line x1="360" y1="275" x2="360" y2="220" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow2)" stroke-dasharray="5,3"></line>
          <text x="384" y="250" fill="#475569" font-family="JetBrains Mono" font-size="9">history</text>

          
          <line x1="410" y1="165" x2="520" y2="165" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow2)"></line>
          <text x="465" y="155" text-anchor="middle" fill="#475569" font-family="JetBrains Mono" font-size="10">messages[]</text>

          
          <rect x="530" y="130" width="140" height="70" rx="12" fill="#f8fafc" stroke="#a855f7" stroke-width="2"></rect>
          <text x="600" y="162" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="15" font-weight="600">LLM</text>
          <text x="600" y="182" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11">Generate reply</text>

          
          <path d="M 600 200 L 600 240 L 330 240 L 330 220" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow2)" stroke-dasharray="6,4"></path>
          <text x="465" y="235" text-anchor="middle" fill="#475569" font-family="JetBrains Mono" font-size="9">response</text>

          
          <text x="465" y="260" text-anchor="middle" fill="#f59e0b" font-family="JetBrains Mono" font-size="9">save turn to store</text>

          
          <path d="M 250 175 L 160 175" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow2)" stroke-dasharray="6,4"></path>
          <text x="205" y="188" text-anchor="middle" fill="#475569" font-family="JetBrains Mono" font-size="9">reply</text>

          
          <rect x="620" y="40" width="140" height="50" rx="10" fill="#f8fafc" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3"></rect>
          <text x="690" y="62" text-anchor="middle" fill="#22c55e" font-family="Space Grotesk" font-size="11" font-weight="600">Conversation Loop</text>
          <text x="690" y="78" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">Repeats each turn</text>
        </svg>