<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Participants -->
  <rect x="30" y="10" width="90" height="36" rx="4" fill="#f8fafc" stroke="#06b6d4" stroke-width="2"/>
  <text x="75" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">User</text>

  <rect x="200" y="10" width="120" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="260" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Agent (LLM)</text>

  <rect x="410" y="10" width="130" height="36" rx="4" fill="#f8fafc" stroke="#06b6d4" stroke-width="2"/>
  <text x="475" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Tool Dispatcher</text>

  <rect x="620" y="10" width="110" height="36" rx="4" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="675" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Web Search</text>

  <rect x="790" y="10" width="100" height="36" rx="4" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="840" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Calculator</text>

  <!-- Lifelines -->
  <line x1="75" y1="46" x2="75" y2="570" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="260" y1="46" x2="260" y2="570" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="475" y1="46" x2="475" y2="570" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="675" y1="46" x2="675" y2="570" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="840" y1="46" x2="840" y2="570" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Activation bars -->
  <rect x="70" y="70" width="10" height="40" fill="#06b6d4" opacity="0.2" rx="2"/>
  <rect x="255" y="85" width="10" height="410" fill="#a855f7" opacity="0.2" rx="2"/>
  <rect x="470" y="155" width="10" height="40" fill="#06b6d4" opacity="0.2" rx="2"/>
  <rect x="670" y="175" width="10" height="40" fill="#f59e0b" opacity="0.2" rx="2"/>
  <rect x="470" y="330" width="10" height="40" fill="#06b6d4" opacity="0.2" rx="2"/>
  <rect x="835" y="350" width="10" height="40" fill="#f59e0b" opacity="0.2" rx="2"/>

  <!-- LOOP rectangle -->
  <rect x="170" y="95" width="710" height="380" rx="4" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="170" y="95" width="130" height="20" rx="4" fill="#a855f7" opacity="0.1"/>
  <text x="235" y="109" text-anchor="middle" fill="#a855f7" font-family="Space Grotesk, sans-serif" font-size="10" font-weight="600">LOOP think-act-observe</text>

  <!-- 1. User request -->
  <text x="22" y="82" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">1</text>
  <line x1="80" y1="80" x2="250" y2="80" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="165" y="74" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">user request</text>

  <!-- 2. Agent reasons (iteration 1) -->
  <text x="22" y="132" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">2</text>
  <rect x="240" y="120" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="260" y="134" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">think</text>
  <text x="300" y="134" fill="#475569" font-family="Nunito, sans-serif" font-size="10">reason about needed tools</text>

  <!-- 3. Tool call: web_search -->
  <text x="22" y="162" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">3</text>
  <line x1="265" y1="160" x2="465" y2="160" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="365" y="154" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">tool_call: web_search({query})</text>

  <!-- 4. Dispatch to web search -->
  <text x="22" y="187" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">4</text>
  <line x1="480" y1="180" x2="665" y2="180" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="573" y="174" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">execute search</text>

  <!-- 4b. Search result -->
  <line x1="665" y1="210" x2="480" y2="210" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="573" y="204" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">search results</text>

  <!-- 5. Result back to agent -->
  <text x="22" y="242" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">5</text>
  <line x1="465" y1="235" x2="265" y2="235" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="365" y="229" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">tool_result: [{title, snippet, url}]</text>

  <!-- 6. Agent reasons again (iteration 2) -->
  <text x="22" y="277" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">6</text>
  <rect x="240" y="265" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="260" y="279" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">think</text>
  <text x="300" y="279" fill="#475569" font-family="Nunito, sans-serif" font-size="10">observe result, reason about next step</text>

  <!-- 7. Tool call: calculator -->
  <text x="22" y="312" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">7</text>
  <line x1="265" y1="310" x2="465" y2="310" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="365" y="304" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">tool_call: calculator({expression})</text>

  <!-- 8. Dispatch to calculator -->
  <text x="22" y="357" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">8</text>
  <line x1="480" y1="345" x2="830" y2="345" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="655" y="339" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">execute calculation</text>

  <line x1="830" y1="380" x2="480" y2="380" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="655" y="374" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">numeric result</text>

  <!-- 8b. Result back to agent -->
  <line x1="465" y1="405" x2="265" y2="405" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="365" y="399" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">tool_result: calculated value</text>

  <!-- 9. Agent produces final answer -->
  <text x="22" y="442" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">9</text>
  <rect x="240" y="435" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="260" y="449" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">think</text>
  <text x="300" y="449" fill="#475569" font-family="Nunito, sans-serif" font-size="10">synthesize final answer</text>

  <!-- 10. Return to user -->
  <text x="17" y="487" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">10</text>
  <line x1="250" y1="480" x2="80" y2="480" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="165" y="474" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">final answer with cited sources</text>

  <!-- Legend -->
  <line x1="30" y1="555" x2="60" y2="555" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="68" y="559" fill="#475569" font-family="Nunito, sans-serif" font-size="9">request</text>
  <line x1="160" y1="555" x2="130" y2="555" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="168" y="559" fill="#475569" font-family="Nunito, sans-serif" font-size="9">response</text>
  <rect x="240" y="548" width="50" height="14" rx="3" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="298" y="559" fill="#475569" font-family="Nunito, sans-serif" font-size="9">loop boundary</text>
</svg>
