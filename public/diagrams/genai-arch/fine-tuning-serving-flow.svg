<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Participants -->
  <rect x="20" y="10" width="110" height="36" rx="4" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="75" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Data Source</text>

  <rect x="190" y="10" width="100" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="240" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Trainer</text>

  <rect x="370" y="10" width="110" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="425" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Evaluator</text>

  <rect x="550" y="10" width="130" height="36" rx="4" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="615" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Model Registry</text>

  <rect x="740" y="10" width="100" height="36" rx="4" fill="#f8fafc" stroke="#06b6d4" stroke-width="2"/>
  <text x="790" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Serving</text>

  <rect x="900" y="10" width="90" height="36" rx="4" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="945" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Monitor</text>

  <!-- Lifelines -->
  <line x1="75" y1="46" x2="75" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="240" y1="46" x2="240" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="425" y1="46" x2="425" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="615" y1="46" x2="615" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="790" y1="46" x2="790" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="945" y1="46" x2="945" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Activation bars -->
  <rect x="70" y="70" width="10" height="40" fill="#f59e0b" opacity="0.2" rx="2"/>
  <rect x="235" y="90" width="10" height="120" fill="#a855f7" opacity="0.2" rx="2"/>
  <rect x="420" y="235" width="10" height="50" fill="#a855f7" opacity="0.2" rx="2"/>
  <rect x="610" y="310" width="10" height="40" fill="#f59e0b" opacity="0.2" rx="2"/>
  <rect x="785" y="365" width="10" height="40" fill="#06b6d4" opacity="0.2" rx="2"/>
  <rect x="940" y="410" width="10" height="40" fill="#f59e0b" opacity="0.2" rx="2"/>

  <!-- 1. Collect data -->
  <text x="12" y="82" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">1</text>
  <line x1="80" y1="80" x2="230" y2="80" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="155" y="74" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">raw training data (JSONL)</text>

  <!-- 2. Prepare and validate -->
  <text x="12" y="117" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">2</text>
  <rect x="220" y="105" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="240" y="119" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">prep</text>
  <text x="280" y="119" fill="#475569" font-family="Nunito, sans-serif" font-size="10">clean, deduplicate, split train/val</text>

  <!-- 3. Train (LoRA) -->
  <text x="12" y="157" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">3</text>
  <rect x="220" y="145" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="240" y="159" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">train</text>
  <text x="280" y="159" fill="#475569" font-family="Nunito, sans-serif" font-size="10">LoRA fine-tuning on base model</text>

  <!-- 3b. Training metrics -->
  <rect x="220" y="175" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="240" y="189" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">log</text>
  <text x="280" y="189" fill="#475569" font-family="Nunito, sans-serif" font-size="10">track loss, learning rate, checkpoints</text>

  <!-- 4. Evaluate -->
  <text x="12" y="242" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">4</text>
  <line x1="245" y1="240" x2="415" y2="240" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="330" y="234" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">evaluate on held-out test set</text>

  <line x1="415" y1="275" x2="245" y2="275" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="330" y="269" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">metrics: loss, BLEU, human eval scores</text>

  <!-- 5. Register -->
  <text x="12" y="322" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">5</text>
  <line x1="245" y1="315" x2="605" y2="315" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="425" y="309" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">register model + metadata + eval scores</text>

  <line x1="605" y1="340" x2="245" y2="340" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="425" y="356" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">version tag (v1.2.0)</text>

  <!-- 6. Deploy A/B -->
  <text x="12" y="377" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">6</text>
  <line x1="620" y1="375" x2="780" y2="375" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="700" y="369" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">deploy with A/B traffic split</text>

  <rect x="770" y="385" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="790" y="399" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">serve</text>
  <text x="830" y="399" fill="#475569" font-family="Nunito, sans-serif" font-size="10">vLLM / TGI</text>

  <!-- 7. Monitor drift -->
  <text x="12" y="427" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">7</text>
  <line x1="795" y1="420" x2="935" y2="420" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="865" y="414" text-anchor="middle" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="10">monitor quality + drift</text>

  <!-- 7b. Drift alert -->
  <line x1="935" y1="445" x2="80" y2="445" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="508" y="439" text-anchor="middle" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="10">drift detected: trigger retraining pipeline</text>

  <!-- Legend -->
  <line x1="30" y1="470" x2="60" y2="470" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="68" y="474" fill="#475569" font-family="Nunito, sans-serif" font-size="9">request</text>
  <line x1="160" y1="470" x2="130" y2="470" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="168" y="474" fill="#475569" font-family="Nunito, sans-serif" font-size="9">response</text>
  <line x1="240" y1="470" x2="270" y2="470" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="278" y="474" fill="#475569" font-family="Nunito, sans-serif" font-size="9">async / monitoring</text>
</svg>
