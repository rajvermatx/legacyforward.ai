<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 530" width="1050" height="530">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Participants -->
  <rect x="20" y="10" width="90" height="36" rx="4" fill="#f8fafc" stroke="#06b6d4" stroke-width="2"/>
  <text x="65" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Client</text>

  <rect x="170" y="10" width="100" height="36" rx="4" fill="#f8fafc" stroke="#06b6d4" stroke-width="2"/>
  <text x="220" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Router</text>

  <rect x="330" y="10" width="110" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="385" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Classifier</text>

  <rect x="500" y="10" width="110" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="555" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Fast Model</text>

  <rect x="660" y="10" width="120" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="720" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Standard Model</text>

  <rect x="830" y="10" width="130" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="895" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Premium Model</text>

  <rect x="970" y="10" width="70" height="36" rx="4" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="1005" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Logger</text>

  <!-- Lifelines -->
  <line x1="65" y1="46" x2="65" y2="505" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="220" y1="46" x2="220" y2="505" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="385" y1="46" x2="385" y2="505" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="555" y1="46" x2="555" y2="505" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="720" y1="46" x2="720" y2="505" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="895" y1="46" x2="895" y2="505" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="1005" y1="46" x2="1005" y2="505" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Activation bars -->
  <rect x="60" y="70" width="10" height="40" fill="#06b6d4" opacity="0.2" rx="2"/>
  <rect x="215" y="85" width="10" height="290" fill="#06b6d4" opacity="0.2" rx="2"/>
  <rect x="380" y="105" width="10" height="50" fill="#a855f7" opacity="0.2" rx="2"/>
  <rect x="550" y="210" width="10" height="40" fill="#a855f7" opacity="0.15" rx="2"/>
  <rect x="715" y="210" width="10" height="40" fill="#a855f7" opacity="0.15" rx="2"/>
  <rect x="890" y="210" width="10" height="40" fill="#a855f7" opacity="0.15" rx="2"/>
  <rect x="1000" y="400" width="10" height="30" fill="#f59e0b" opacity="0.2" rx="2"/>

  <!-- 1. Client request -->
  <text x="12" y="82" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">1</text>
  <line x1="70" y1="80" x2="210" y2="80" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="140" y="74" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">user request</text>

  <!-- 2. Classify complexity -->
  <text x="12" y="117" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">2</text>
  <line x1="225" y1="110" x2="375" y2="110" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="300" y="104" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">classify complexity</text>

  <line x1="375" y1="145" x2="225" y2="145" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="300" y="139" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">tier: fast | standard | premium</text>

  <!-- 3. Select model -->
  <text x="12" y="177" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">3</text>
  <rect x="200" y="170" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="220" y="184" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">select</text>
  <text x="260" y="184" fill="#475569" font-family="Nunito, sans-serif" font-size="10">pick model based on tier + availability</text>

  <!-- 4. Call selected model (show all three as options) -->
  <text x="12" y="222" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">4</text>
  <line x1="225" y1="220" x2="545" y2="220" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="225" y1="230" x2="710" y2="230" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="225" y1="240" x2="885" y2="240" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="555" y="256" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">call selected model (one of three tiers)</text>

  <!-- 5. Model response -->
  <text x="12" y="292" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">5</text>
  <line x1="885" y1="285" x2="225" y2="285" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="555" y="279" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">completion + usage metadata</text>

  <!-- 6. Quality gate -->
  <text x="12" y="327" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">6</text>
  <rect x="200" y="315" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="220" y="329" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">gate</text>
  <text x="260" y="329" fill="#475569" font-family="Nunito, sans-serif" font-size="10">quality check (escalate if below threshold)</text>

  <!-- 7. Return to client -->
  <text x="12" y="367" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">7</text>
  <line x1="210" y1="360" x2="70" y2="360" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="140" y="354" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">response</text>

  <!-- 8. Async log -->
  <text x="12" y="407" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">8</text>
  <line x1="225" y1="400" x2="995" y2="400" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="610" y="394" text-anchor="middle" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="10">async: log model, tier, latency, tokens, cost</text>

  <!-- Legend -->
  <line x1="30" y1="490" x2="60" y2="490" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="68" y="494" fill="#475569" font-family="Nunito, sans-serif" font-size="9">request</text>
  <line x1="160" y1="490" x2="130" y2="490" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="168" y="494" fill="#475569" font-family="Nunito, sans-serif" font-size="9">response</text>
  <line x1="240" y1="490" x2="270" y2="490" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="278" y="494" fill="#475569" font-family="Nunito, sans-serif" font-size="9">async</text>
</svg>
