<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" width="920" height="500">
  <defs>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f172a"/>
    </marker>
    <marker id="arr-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Participants -->
  <rect x="30" y="10" width="100" height="36" rx="4" fill="#f8fafc" stroke="#06b6d4" stroke-width="2"/>
  <text x="80" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Client</text>

  <rect x="200" y="10" width="110" height="36" rx="4" fill="#f8fafc" stroke="#06b6d4" stroke-width="2"/>
  <text x="255" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">API Server</text>

  <rect x="380" y="10" width="120" height="36" rx="4" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="440" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Session Store</text>

  <rect x="570" y="10" width="130" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="635" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">Memory Manager</text>

  <rect x="770" y="10" width="120" height="36" rx="4" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="830" y="33" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600">LLM Provider</text>

  <!-- Lifelines -->
  <line x1="80" y1="46" x2="80" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="255" y1="46" x2="255" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="440" y1="46" x2="440" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="635" y1="46" x2="635" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="830" y1="46" x2="830" y2="475" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Activation bars -->
  <rect x="75" y="70" width="10" height="50" fill="#06b6d4" opacity="0.2" rx="2"/>
  <rect x="250" y="85" width="10" height="290" fill="#06b6d4" opacity="0.2" rx="2"/>
  <rect x="435" y="105" width="10" height="40" fill="#f59e0b" opacity="0.2" rx="2"/>
  <rect x="630" y="165" width="10" height="50" fill="#a855f7" opacity="0.2" rx="2"/>
  <rect x="825" y="255" width="10" height="60" fill="#a855f7" opacity="0.2" rx="2"/>
  <rect x="435" y="345" width="10" height="40" fill="#f59e0b" opacity="0.2" rx="2"/>

  <!-- 1. User sends message -->
  <text x="22" y="82" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">1</text>
  <line x1="85" y1="80" x2="245" y2="80" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="165" y="74" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">POST /chat {session_id, message}</text>

  <!-- 2. Load session history -->
  <text x="22" y="117" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">2</text>
  <line x1="260" y1="110" x2="430" y2="110" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="345" y="104" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">load session history</text>

  <!-- 2b. Return history -->
  <line x1="430" y1="135" x2="260" y2="135" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="345" y="129" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">messages[]</text>

  <!-- 3. Apply memory strategy -->
  <text x="22" y="177" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">3</text>
  <line x1="260" y1="170" x2="625" y2="170" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="440" y="164" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">apply memory strategy (window/summary/hybrid)</text>

  <!-- 3b. Return trimmed messages -->
  <line x1="625" y1="205" x2="260" y2="205" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="440" y="199" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">trimmed messages[]</text>

  <!-- 4. Build messages array -->
  <text x="22" y="237" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">4</text>
  <rect x="235" y="225" width="40" height="20" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="255" y="239" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="9">build</text>
  <text x="295" y="239" fill="#475569" font-family="Nunito, sans-serif" font-size="10">system prompt + history + new message</text>

  <!-- 5. Call LLM -->
  <text x="22" y="272" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">5</text>
  <line x1="260" y1="265" x2="820" y2="265" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="540" y="259" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">messages[] + temperature + max_tokens</text>

  <!-- 6. LLM response -->
  <text x="22" y="312" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">6</text>
  <line x1="820" y1="305" x2="260" y2="305" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="540" y="299" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">assistant response + usage</text>

  <!-- 7. Save both turns -->
  <text x="22" y="352" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">7</text>
  <line x1="260" y1="350" x2="430" y2="350" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="345" y="344" text-anchor="middle" fill="#f59e0b" font-family="Nunito, sans-serif" font-size="10">async: save user + assistant turns</text>

  <!-- 8. Return response -->
  <text x="22" y="397" fill="#06b6d4" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700">8</text>
  <line x1="245" y1="390" x2="85" y2="390" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="165" y="384" text-anchor="middle" fill="#475569" font-family="Nunito, sans-serif" font-size="10">HTTP 200 + streamed text</text>

  <!-- Legend -->
  <line x1="30" y1="460" x2="60" y2="460" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="68" y="464" fill="#475569" font-family="Nunito, sans-serif" font-size="9">request</text>
  <line x1="160" y1="460" x2="130" y2="460" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="168" y="464" fill="#475569" font-family="Nunito, sans-serif" font-size="9">response</text>
  <line x1="240" y1="460" x2="270" y2="460" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="278" y="464" fill="#475569" font-family="Nunito, sans-serif" font-size="9">async</text>
</svg>
