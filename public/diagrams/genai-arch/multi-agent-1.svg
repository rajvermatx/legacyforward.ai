          <path d="M 205 325 L 70 325 L 70 235" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow9)"></path>
          <text x="137" y="345" text-anchor="middle" fill="#475569" font-family="JetBrains Mono" font-size="9">final response</text>

          
          <text x="400" y="440" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11">Agents may iterate multiple rounds before the orchestrator is satisfied with results</text>
