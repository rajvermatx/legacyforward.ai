    </marker>
  </defs>
  <text x="450" y="30" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk" font-size="16" font-weight="700">LLM Cost Equation</text>
  <rect x="100" y="60" width="700" height="80" rx="12" fill="#f8fafc" stroke="#06b6d4" stroke-width="2"/>
  <text x="200" y="105" text-anchor="middle" fill="#3b82f6" font-family="Space Grotesk" font-size="16" font-weight="700">Requests</text>
  <text x="290" y="105" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="16" font-weight="700">×</text>
  <text x="380" y="105" text-anchor="middle" fill="#a855f7" font-family="Space Grotesk" font-size="16" font-weight="700">Tokens/Req</text>
  <text x="480" y="105" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="16" font-weight="700">×</text>
  <text x="570" y="105" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk" font-size="16" font-weight="700">Price/Token</text>
  <text x="650" y="105" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="16" font-weight="700">=</text>
  <text x="730" y="105" text-anchor="middle" fill="#ef4444" font-family="Space Grotesk" font-size="16" font-weight="700">Total Cost</text>
  <rect x="100" y="170" width="700" height="80" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="450" y="195" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="13" font-weight="600">Example: Customer Support Bot</text>
  <text x="450" y="220" text-anchor="middle" fill="#0f172a" font-family="JetBrains Mono" font-size="11">10,000 req/day × 2,000 tokens × $0.003/1K = $60/day = $1,800/mo</text>
  <text x="450" y="280" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk" font-size="14" font-weight="600">Optimization Levers</text>
  <rect x="90" y="300" width="150" height="55" rx="8" fill="#f8fafc" stroke="#22c55e" stroke-width="2"/>
  <text x="165" y="322" text-anchor="middle" fill="#22c55e" font-family="Space Grotesk" font-size="12" font-weight="600">Caching</text>
  <text x="165" y="340" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="9">Cache repeated queries</text>
  <rect x="290" y="300" width="150" height="55" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="365" y="322" text-anchor="middle" fill="#3b82f6" font-family="Space Grotesk" font-size="12" font-weight="600">Model Tiering</text>
  <text x="365" y="340" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="9">Route by complexity</text>
  <rect x="490" y="300" width="150" height="55" rx="8" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="565" y="322" text-anchor="middle" fill="#a855f7" font-family="Space Grotesk" font-size="12" font-weight="600">Prompt Tuning</text>
  <text x="565" y="340" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="9">Reduce token count</text>
  <rect x="690" y="300" width="150" height="55" rx="8" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="765" y="322" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk" font-size="12" font-weight="600">Batching</text>
  <text x="765" y="340" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="9">Group requests</text>
