<svg viewBox="0 0 900 420" width="900" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4"/>
    </marker>
    <marker id="arwP" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arwG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arwO" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arwR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arwB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="450" y="35" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk" font-size="16" font-weight="700">Deterministic vs Non-Deterministic Systems</text>
  <rect x="40" y="70" width="380" height="300" rx="12" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="230" y="100" text-anchor="middle" fill="#3b82f6" font-family="Space Grotesk" font-size="15" font-weight="600">Traditional Function</text>
  <rect x="100" y="120" width="260" height="50" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="140" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="12" font-weight="600">calculateTax(income)</text>
  <text x="230" y="155" text-anchor="middle" fill="#475569" font-family="JetBrains Mono" font-size="10">Pure function</text>
  <line x1="230" y1="170" x2="230" y2="200" stroke="#06b6d4" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="100" y="200" width="260" height="50" rx="10" fill="#f8fafc" stroke="#22c55e" stroke-width="2"/>
  <text x="230" y="225" text-anchor="middle" fill="#22c55e" font-family="Space Grotesk" font-size="13" font-weight="600">Always: $12,500.00</text>
  <text x="230" y="245" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">Same input = Same output, every time</text>
  <rect x="80" y="270" width="300" height="80" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="295" text-anchor="middle" fill="#3b82f6" font-family="JetBrains Mono" font-size="11">Testable · Predictable · Auditable</text>
  <text x="230" y="315" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">Unit tests give deterministic results</text>
  <text x="230" y="330" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">Easy to debug and verify</text>
  <rect x="480" y="70" width="380" height="300" rx="12" fill="#f8fafc" stroke="#a855f7" stroke-width="2"/>
  <text x="670" y="100" text-anchor="middle" fill="#a855f7" font-family="Space Grotesk" font-size="15" font-weight="600">AI Model</text>
  <rect x="540" y="120" width="260" height="50" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="670" y="140" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="12" font-weight="600">summarize(document)</text>
  <text x="670" y="155" text-anchor="middle" fill="#475569" font-family="JetBrains Mono" font-size="10">Non-deterministic</text>
  <line x1="670" y1="170" x2="670" y2="200" stroke="#a855f7" stroke-width="2" marker-end="url(#arwP)"/>
  <rect x="540" y="200" width="260" height="90" rx="10" fill="#f8fafc" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="222" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk" font-size="11" font-weight="600">Run 1: "The report covers..."</text>
  <text x="670" y="242" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk" font-size="11" font-weight="600">Run 2: "Key findings include..."</text>
  <text x="670" y="262" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk" font-size="11" font-weight="600">Run 3: "This document details..."</text>
  <rect x="520" y="310" width="300" height="50" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="670" y="330" text-anchor="middle" fill="#a855f7" font-family="JetBrains Mono" font-size="11">Variable · Probabilistic · Creative</text>
  <text x="670" y="347" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10">Requires evaluation frameworks</text>
</svg>