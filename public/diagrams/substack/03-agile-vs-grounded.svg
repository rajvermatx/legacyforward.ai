  <text x="680" y="99" text-anchor="middle" fill="#ffffff" font-family="Space Grotesk" font-size="15" font-weight="700">Grounded Delivery</text>
  <circle cx="538" cy="140" r="7" fill="#cffafe" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="538" y="144" text-anchor="middle" fill="#0891b2" font-family="Space Grotesk" font-size="9" font-weight="700">1</text>
  <text x="660" y="136" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="12" font-weight="600">Value Hypothesis</text>
  <text x="660" y="152" text-anchor="middle" fill="#64748b" font-family="Nunito" font-size="10" font-weight="400">What outcome are we betting on?</text>
