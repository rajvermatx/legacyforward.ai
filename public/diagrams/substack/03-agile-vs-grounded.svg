  <text x="200" y="224" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="12" font-weight="600">Story Points</text>
  <text x="200" y="240" text-anchor="middle" fill="#64748b" font-family="Nunito" font-size="10" font-weight="400">Velocity-based estimation</text>
