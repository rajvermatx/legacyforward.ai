  <text x="200" y="136" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="12" font-weight="600">User Stories</text>
  <text x="200" y="152" text-anchor="middle" fill="#64748b" font-family="Nunito" font-size="10" font-weight="400">Feature-driven requirements</text>
  <circle cx="78" cy="184" r="7" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="78" y="188" text-anchor="middle" fill="#64748b" font-family="Space Grotesk" font-size="9" font-weight="700">2</text>
  <text x="200" y="180" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="12" font-weight="600">Binary Pass/Fail</text>
  <text x="200" y="196" text-anchor="middle" fill="#64748b" font-family="Nunito" font-size="10" font-weight="400">Tests pass or they don't</text>
  <circle cx="78" cy="228" r="7" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
