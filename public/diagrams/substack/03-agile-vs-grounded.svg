  <rect x="0" y="0" width="900" height="350" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="17" font-weight="700">Agile vs. Grounded Delivery</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-family="Nunito" font-size="12" font-weight="400">How AI projects require a different delivery framework</text>
