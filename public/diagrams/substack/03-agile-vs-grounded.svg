  <text x="660" y="196" text-anchor="middle" fill="#64748b" font-family="Nunito" font-size="10" font-weight="400">92% accuracy +/-3%</text>
  <circle cx="538" cy="228" r="7" fill="#cffafe" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="538" y="232" text-anchor="middle" fill="#0891b2" font-family="Space Grotesk" font-size="9" font-weight="700">3</text>
  <text x="660" y="224" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="12" font-weight="600">Time-boxed Research</text>
  <text x="660" y="240" text-anchor="middle" fill="#64748b" font-family="Nunito" font-size="10" font-weight="400">Bounded exploration sprints</text>
  <circle cx="538" cy="272" r="7" fill="#cffafe" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="538" y="276" text-anchor="middle" fill="#0891b2" font-family="Space Grotesk" font-size="9" font-weight="700">4</text>
  <text x="660" y="268" text-anchor="middle" fill="#0f172a" font-family="Space Grotesk" font-size="12" font-weight="600">Continuous Evaluation</text>
  <text x="660" y="284" text-anchor="middle" fill="#64748b" font-family="Nunito" font-size="10" font-weight="400">Model drift and drift alerts</text>
  <text x="450" y="332" text-anchor="middle" fill="#94a3b8" font-family="Nunito" font-size="11" font-weight="400">AI systems require probabilistic thinking, not deterministic pass/fail</text>
