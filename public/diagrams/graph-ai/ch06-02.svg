  <text x="450" y="28" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk" font-size="16" font-weight="700">Hybrid Architecture: Relational + Graph</text>
  <rect x="55" y="120" width="190" height="90" rx="10" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="150" text-anchor="middle" fill="#3b82f6" font-family="Space Grotesk" font-size="13" font-weight="700">Relational DB</text>
  <text x="150" y="175" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="11" font-weight="400">Transactions</text>
