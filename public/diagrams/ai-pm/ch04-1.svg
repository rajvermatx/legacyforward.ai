<svg viewBox="0 0 900 250" width="900" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4"/>
    </marker>
    <marker id="arwP" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arwG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arwO" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arwR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arwB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="450" y="30" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk" font-size="16" font-weight="700">Build vs Buy vs Integrate</text>
  <rect x="60" y="50" width="240" height="50" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="82" text-anchor="middle" fill="#3b82f6" font-family="Space Grotesk" font-size="14" font-weight="700">Build</text>
  <rect x="330" y="50" width="240" height="50" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="450" y="82" text-anchor="middle" fill="#a855f7" font-family="Space Grotesk" font-size="14" font-weight="700">Buy</text>
  <rect x="600" y="50" width="240" height="50" rx="10" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="720" y="82" text-anchor="middle" fill="#06b6d4" font-family="Space Grotesk" font-size="14" font-weight="700">Integrate</text>
  <text x="25" y="119" text-anchor="start" fill="#0f172a" font-family="Space Grotesk" font-size="11" font-weight="600">Cost</text>
  <text x="180" y="119" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">High upfront</text>
  <text x="450" y="119" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">License fee</text>
  <text x="720" y="119" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">Low / API</text>
  <line x1="15" y1="128" x2="885" y2="128" stroke="#f1f5f9" stroke-width="1"/>
  <text x="25" y="149" text-anchor="start" fill="#0f172a" font-family="Space Grotesk" font-size="11" font-weight="600">Speed</text>
  <text x="180" y="149" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">Slow (months)</text>
  <text x="450" y="149" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">Fast (weeks)</text>
  <text x="720" y="149" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">Fastest (days)</text>
  <line x1="15" y1="158" x2="885" y2="158" stroke="#f1f5f9" stroke-width="1"/>
  <text x="25" y="179" text-anchor="start" fill="#0f172a" font-family="Space Grotesk" font-size="11" font-weight="600">Control</text>
  <text x="180" y="179" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">Full control</text>
  <text x="450" y="179" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">Limited</text>
  <text x="720" y="179" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">Minimal</text>
  <line x1="15" y1="188" x2="885" y2="188" stroke="#f1f5f9" stroke-width="1"/>
  <text x="25" y="209" text-anchor="start" fill="#0f172a" font-family="Space Grotesk" font-size="11" font-weight="600">Differentiation</text>
  <text x="180" y="209" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">High</text>
  <text x="450" y="209" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">Low</text>
  <text x="720" y="209" text-anchor="middle" fill="#475569" font-family="Nunito" font-size="10" font-weight="400">Moderate</text>
  <line x1="15" y1="218" x2="885" y2="218" stroke="#f1f5f9" stroke-width="1"/>
</svg>