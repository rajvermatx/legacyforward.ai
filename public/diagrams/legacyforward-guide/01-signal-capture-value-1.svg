<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-sc1" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="24" font-family="system-ui, sans-serif" font-size="15"
        font-weight="700" fill="#1e293b" text-anchor="middle"
        dominant-baseline="central">Transformation vs Automation</text>

  <!-- Top node: AI Opportunity -->
  <rect x="255" y="44" width="170" height="44" rx="22"
        fill="#E8E6DE" stroke="#94a3b8" stroke-width="1.5" />
  <text x="340" y="66" font-family="system-ui, sans-serif" font-size="14"
        font-weight="600" fill="#1e293b" text-anchor="middle"
        dominant-baseline="central">AI Opportunity</text>

  <!-- Split arrow down-left -->
  <path d="M280 88 L180 144" fill="none" stroke="#94a3b8" stroke-width="1.5"
        marker-end="url(#arrow-sc1)" />
  <!-- Split arrow down-right -->
  <path d="M400 88 L500 144" fill="none" stroke="#94a3b8" stroke-width="1.5"
        marker-end="url(#arrow-sc1)" />

  <!-- Branch labels -->
  <text x="194" y="118" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#dc2626" text-anchor="middle"
        dominant-baseline="central">Automation</text>
  <text x="490" y="118" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#0d9488" text-anchor="middle"
        dominant-baseline="central">Transformation</text>

  <!-- LEFT branch: Automation -->
  <!-- Box 1 -->
  <rect x="80" y="152" width="190" height="48" rx="8"
        fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text x="175" y="172" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#dc2626" text-anchor="middle"
        dominant-baseline="central">Same task,</text>
  <text x="175" y="190" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#dc2626" text-anchor="middle"
        dominant-baseline="central">cheaper / faster</text>
  <path d="M175 200 L175 236" fill="none" stroke="#94a3b8" stroke-width="1.5"
        marker-end="url(#arrow-sc1)" />
  <!-- Box 2 -->
  <rect x="80" y="244" width="190" height="44" rx="8"
        fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" />
  <text x="175" y="266" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#ea580c" text-anchor="middle"
        dominant-baseline="central">Incremental ROI</text>
  <path d="M175 288 L175 320" fill="none" stroke="#94a3b8" stroke-width="1.5"
        marker-end="url(#arrow-sc1)" />
  <!-- STOP icon -->
  <circle cx="175" cy="348" r="26" fill="#dc2626" />
  <text x="175" y="344" font-family="system-ui, sans-serif" font-size="11"
        font-weight="700" fill="#ffffff" text-anchor="middle"
        dominant-baseline="central">CAUTION</text>
  <text x="175" y="360" font-family="system-ui, sans-serif" font-size="10"
        font-weight="600" fill="#ffffff" text-anchor="middle"
        dominant-baseline="central">Re-evaluate</text>

  <!-- RIGHT branch: Transformation -->
  <!-- Box 1 -->
  <rect x="410" y="152" width="190" height="48" rx="8"
        fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5" />
  <text x="505" y="172" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#0d9488" text-anchor="middle"
        dominant-baseline="central">Net new capability</text>
  <text x="505" y="190" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#0d9488" text-anchor="middle"
        dominant-baseline="central">not previously possible</text>
  <path d="M505 200 L505 236" fill="none" stroke="#94a3b8" stroke-width="1.5"
        marker-end="url(#arrow-sc1)" />
  <!-- Box 2 -->
  <rect x="410" y="244" width="190" height="44" rx="8"
        fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="505" y="258" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#16a34a" text-anchor="middle"
        dominant-baseline="central">Value unreachable</text>
  <text x="505" y="276" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#16a34a" text-anchor="middle"
        dominant-baseline="central">before AI</text>
  <path d="M505 288 L505 320" fill="none" stroke="#94a3b8" stroke-width="1.5"
        marker-end="url(#arrow-sc1)" />
  <!-- GO icon -->
  <circle cx="505" cy="348" r="26" fill="#16a34a" />
  <text x="505" y="344" font-family="system-ui, sans-serif" font-size="11"
        font-weight="700" fill="#ffffff" text-anchor="middle"
        dominant-baseline="central">GO</text>
  <text x="505" y="360" font-family="system-ui, sans-serif" font-size="10"
        font-weight="600" fill="#ffffff" text-anchor="middle"
        dominant-baseline="central">Proceed</text>
</svg>
