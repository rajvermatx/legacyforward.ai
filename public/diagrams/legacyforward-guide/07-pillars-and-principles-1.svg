<svg viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-fb1" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrow-fb2" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488" />
    </marker>
    <marker id="arrow-fb3" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed" />
    </marker>
    <marker id="arrow-fb4" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
    <marker id="arrow-fb5" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="24" font-family="system-ui, sans-serif" font-size="15"
        font-weight="700" fill="#1e293b" text-anchor="middle"
        dominant-baseline="central">The Feedback Loop</text>

  <!-- Center label -->
  <circle cx="340" cy="256" r="64" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="340" y="248" font-family="system-ui, sans-serif" font-size="11"
        font-weight="700" fill="#1e293b" text-anchor="middle"
        dominant-baseline="central">Continuous</text>
  <text x="340" y="264" font-family="system-ui, sans-serif" font-size="11"
        font-weight="700" fill="#1e293b" text-anchor="middle"
        dominant-baseline="central">Improvement</text>

  <!-- Node positions (circle r=170, center 340,256):
       Top    = 340, 86
       Right  = 510, 256
       Bottom = 340, 426
       Left   = 170, 256
  -->

  <!-- TOP node: Signal Capture (teal) -->
  <rect x="250" y="56" width="180" height="50" rx="10"
        fill="#ccfbf1" stroke="#0d9488" stroke-width="2" />
  <text x="340" y="74" font-family="system-ui, sans-serif" font-size="13"
        font-weight="700" fill="#0d9488" text-anchor="middle"
        dominant-baseline="central">Signal Capture</text>
  <text x="340" y="92" font-family="system-ui, sans-serif" font-size="10"
        fill="#475569" text-anchor="middle"
        dominant-baseline="central">Value Hypothesis</text>

  <!-- RIGHT node: Grounded Delivery (purple) -->
  <rect x="500" y="232" width="164" height="50" rx="10"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="2" />
  <text x="582" y="250" font-family="system-ui, sans-serif" font-size="13"
        font-weight="700" fill="#7c3aed" text-anchor="middle"
        dominant-baseline="central">Grounded</text>
  <text x="582" y="266" font-family="system-ui, sans-serif" font-size="13"
        font-weight="700" fill="#7c3aed" text-anchor="middle"
        dominant-baseline="central">Delivery</text>

  <!-- BOTTOM node: Legacy Coexistence (amber) -->
  <rect x="236" y="408" width="208" height="50" rx="10"
        fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
  <text x="340" y="426" font-family="system-ui, sans-serif" font-size="13"
        font-weight="700" fill="#b45309" text-anchor="middle"
        dominant-baseline="central">Legacy</text>
  <text x="340" y="442" font-family="system-ui, sans-serif" font-size="13"
        font-weight="700" fill="#b45309" text-anchor="middle"
        dominant-baseline="central">Coexistence</text>

  <!-- LEFT node: Operate (green) -->
  <rect x="16" y="232" width="140" height="50" rx="10"
        fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text x="86" y="257" font-family="system-ui, sans-serif" font-size="13"
        font-weight="700" fill="#16a34a" text-anchor="middle"
        dominant-baseline="central">Operate</text>

  <!-- Clockwise curved arrows -->

  <!-- Top → Right: "Value Hypothesis →" -->
  <path d="M430 78 Q530 100 502 236"
        fill="none" stroke="#0d9488" stroke-width="1.8"
        marker-end="url(#arrow-fb2)" />
  <text x="500" y="148" font-family="system-ui, sans-serif" font-size="10"
        font-weight="600" fill="#0d9488" text-anchor="middle"
        dominant-baseline="central" transform="rotate(68,500,148)">Value Hypothesis →</text>

  <!-- Right → Bottom: "Integration Req →" -->
  <path d="M566 282 Q580 380 444 410"
        fill="none" stroke="#7c3aed" stroke-width="1.8"
        marker-end="url(#arrow-fb3)" />
  <text x="542" y="358" font-family="system-ui, sans-serif" font-size="10"
        font-weight="600" fill="#7c3aed" text-anchor="middle"
        dominant-baseline="central" transform="rotate(60,542,358)">Integration Req →</text>

  <!-- Bottom → Left: "Data Feasibility →" -->
  <path d="M238 430 Q140 420 100 282"
        fill="none" stroke="#f59e0b" stroke-width="1.8"
        marker-end="url(#arrow-fb4)" />
  <text x="152" y="376" font-family="system-ui, sans-serif" font-size="10"
        font-weight="600" fill="#b45309" text-anchor="middle"
        dominant-baseline="central" transform="rotate(-60,152,376)">Data Feasibility →</text>

  <!-- Left → Top: "Operational Evidence →" -->
  <path d="M104 234 Q110 118 252 84"
        fill="none" stroke="#16a34a" stroke-width="1.8"
        marker-end="url(#arrow-fb5)" />
  <text x="148" y="148" font-family="system-ui, sans-serif" font-size="10"
        font-weight="600" fill="#16a34a" text-anchor="middle"
        dominant-baseline="central" transform="rotate(-68,148,148)">Operational Evidence →</text>
</svg>
