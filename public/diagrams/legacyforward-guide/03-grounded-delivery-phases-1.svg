<svg viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-gd1" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="24" font-family="system-ui, sans-serif" font-size="15"
        font-weight="700" fill="#1e293b" text-anchor="middle"
        dominant-baseline="central">Grounded Delivery: Five Phases</text>

  <!-- ── Phase 1: Frame (teal) ── y=44 to y=94 -->
  <rect x="160" y="44" width="360" height="50" rx="8"
        fill="#ccfbf1" stroke="#0d9488" stroke-width="2" />
  <text x="340" y="62" font-family="system-ui, sans-serif" font-size="14"
        font-weight="700" fill="#0d9488" text-anchor="middle"
        dominant-baseline="central">Frame</text>
  <text x="340" y="80" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Define the value hypothesis and success criteria</text>

  <!-- Arrow: y=94 → y=108 -->
  <path d="M340 94 L340 108" fill="none" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#arrow-gd1)" />

  <!-- Gate 1: GO/NO-GO — center y=120 -->
  <polygon points="340,108 394,126 340,144 286,126"
           fill="#F8F7F4" stroke="#94a3b8" stroke-width="1.5" />
  <text x="340" y="122" font-family="system-ui, sans-serif" font-size="9"
        font-weight="700" fill="#64748b" text-anchor="middle"
        dominant-baseline="central">GO /</text>
  <text x="340" y="133" font-family="system-ui, sans-serif" font-size="9"
        font-weight="700" fill="#64748b" text-anchor="middle"
        dominant-baseline="central">NO-GO</text>

  <!-- Arrow: y=144 → y=158 -->
  <path d="M340 144 L340 158" fill="none" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#arrow-gd1)" />

  <!-- ── Phase 2: Explore (blue) ── y=158 to y=208 -->
  <rect x="160" y="158" width="360" height="50" rx="8"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="2" />
  <text x="340" y="176" font-family="system-ui, sans-serif" font-size="14"
        font-weight="700" fill="#185FA5" text-anchor="middle"
        dominant-baseline="central">Explore</text>
  <text x="340" y="194" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Validate technical feasibility and data access</text>

  <!-- Arrow: y=208 → y=222 -->
  <path d="M340 208 L340 222" fill="none" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#arrow-gd1)" />

  <!-- Gate 2: GO/PIVOT/KILL — center y=234 -->
  <polygon points="340,222 398,240 340,258 282,240"
           fill="#F8F7F4" stroke="#94a3b8" stroke-width="1.5" />
  <text x="340" y="236" font-family="system-ui, sans-serif" font-size="8.5"
        font-weight="700" fill="#64748b" text-anchor="middle"
        dominant-baseline="central">GO / PIVOT / KILL</text>

  <!-- Arrow: y=258 → y=272 -->
  <path d="M340 258 L340 272" fill="none" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#arrow-gd1)" />

  <!-- ── Phase 3: Shape (purple) ── y=272 to y=322 -->
  <rect x="160" y="272" width="360" height="50" rx="8"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="2" />
  <text x="340" y="290" font-family="system-ui, sans-serif" font-size="14"
        font-weight="700" fill="#7c3aed" text-anchor="middle"
        dominant-baseline="central">Shape</text>
  <text x="340" y="308" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Build the solution against the validated value case</text>

  <!-- Arrow: y=322 → y=336 -->
  <path d="M340 322 L340 336" fill="none" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#arrow-gd1)" />

  <!-- Gate 3: GO/REDESIGN — center y=348 -->
  <polygon points="340,336 398,352 340,368 282,352"
           fill="#F8F7F4" stroke="#94a3b8" stroke-width="1.5" />
  <text x="340" y="348" font-family="system-ui, sans-serif" font-size="8.5"
        font-weight="700" fill="#64748b" text-anchor="middle"
        dominant-baseline="central">GO / REDESIGN</text>

  <!-- Arrow: y=368 → y=382 -->
  <path d="M340 368 L340 382" fill="none" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#arrow-gd1)" />

  <!-- ── Phase 4: Harden (amber) ── y=382 to y=432 -->
  <rect x="160" y="382" width="360" height="50" rx="8"
        fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
  <text x="340" y="400" font-family="system-ui, sans-serif" font-size="14"
        font-weight="700" fill="#b45309" text-anchor="middle"
        dominant-baseline="central">Harden</text>
  <text x="340" y="418" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Production-grade quality, safety, and observability</text>

  <!-- Arrow: y=432 → y=446 -->
  <path d="M340 432 L340 446" fill="none" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#arrow-gd1)" />

  <!-- Gate 4: GO/CONTINUE/KILL — center y=458 -->
  <polygon points="340,446 404,462 340,478 276,462"
           fill="#F8F7F4" stroke="#94a3b8" stroke-width="1.5" />
  <text x="340" y="458" font-family="system-ui, sans-serif" font-size="8.5"
        font-weight="700" fill="#64748b" text-anchor="middle"
        dominant-baseline="central">GO / CONTINUE / KILL</text>

  <!-- Arrow: y=478 → y=492 -->
  <path d="M340 478 L340 492" fill="none" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#arrow-gd1)" />

  <!-- ── Phase 5: Operate (green) ── y=492 to y=552 -->
  <rect x="160" y="492" width="360" height="50" rx="8"
        fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text x="340" y="510" font-family="system-ui, sans-serif" font-size="14"
        font-weight="700" fill="#16a34a" text-anchor="middle"
        dominant-baseline="central">Operate</text>
  <text x="340" y="528" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Sustain and improve in production continuously</text>

  <!-- "No Exit" badge -->
  <rect x="284" y="554" width="112" height="22" rx="11"
        fill="#16a34a" />
  <text x="340" y="565" font-family="system-ui, sans-serif" font-size="10"
        font-weight="700" fill="#ffffff" text-anchor="middle"
        dominant-baseline="central">No Exit — Permanent</text>
</svg>
