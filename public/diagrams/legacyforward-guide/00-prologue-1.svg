<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-p1" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" font-family="system-ui, sans-serif" font-size="16"
        font-weight="700" fill="#1e293b" text-anchor="middle"
        dominant-baseline="central">The Three Pillars of LegacyForward</text>

  <!-- Column 1: Signal Capture (teal) -->
  <rect x="40" y="56" width="180" height="200" rx="10"
        fill="#ccfbf1" stroke="#0d9488" stroke-width="2" />
  <rect x="40" y="56" width="180" height="44" rx="10"
        fill="#0d9488" stroke="#0d9488" stroke-width="2" />
  <!-- cover bottom corners of header -->
  <rect x="40" y="82" width="180" height="18" fill="#0d9488" />
  <text x="130" y="79" font-family="system-ui, sans-serif" font-size="14"
        font-weight="700" fill="#ffffff" text-anchor="middle"
        dominant-baseline="central">Signal Capture</text>
  <text x="130" y="120" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#0d9488" text-anchor="middle"
        dominant-baseline="central">Find Net New Value</text>
  <text x="130" y="152" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Identify opportunities</text>
  <text x="130" y="172" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">that only AI enables</text>
  <text x="130" y="200" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Hypothesis → Validation</text>
  <text x="130" y="218" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">→ Tracking</text>

  <!-- Column 2: Grounded Delivery (purple) -->
  <rect x="250" y="56" width="180" height="200" rx="10"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="2" />
  <rect x="250" y="56" width="180" height="44" rx="10"
        fill="#7c3aed" stroke="#7c3aed" stroke-width="2" />
  <rect x="250" y="82" width="180" height="18" fill="#7c3aed" />
  <text x="340" y="79" font-family="system-ui, sans-serif" font-size="14"
        font-weight="700" fill="#ffffff" text-anchor="middle"
        dominant-baseline="central">Grounded Delivery</text>
  <text x="340" y="120" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#7c3aed" text-anchor="middle"
        dominant-baseline="central">Ship Against Value</text>
  <text x="340" y="152" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Five-phase delivery</text>
  <text x="340" y="172" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">with explicit gates</text>
  <text x="340" y="200" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Frame → Explore → Shape</text>
  <text x="340" y="218" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">→ Harden → Operate</text>

  <!-- Column 3: Legacy Coexistence (amber) -->
  <rect x="460" y="56" width="180" height="200" rx="10"
        fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
  <rect x="460" y="56" width="180" height="44" rx="10"
        fill="#f59e0b" stroke="#f59e0b" stroke-width="2" />
  <rect x="460" y="82" width="180" height="18" fill="#f59e0b" />
  <text x="550" y="79" font-family="system-ui, sans-serif" font-size="14"
        font-weight="700" fill="#ffffff" text-anchor="middle"
        dominant-baseline="central">Legacy Coexistence</text>
  <text x="550" y="120" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#b45309" text-anchor="middle"
        dominant-baseline="central">Design for What Exists</text>
  <text x="550" y="152" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Five coexistence</text>
  <text x="550" y="172" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">patterns for legacy systems</text>
  <text x="550" y="200" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">Data Exhaust → Sidecar</text>
  <text x="550" y="218" font-family="system-ui, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" dominant-baseline="central">→ Agent</text>

  <!-- Core Principles bar -->
  <rect x="40" y="278" width="600" height="36" rx="8"
        fill="#1e293b" stroke="#1e293b" stroke-width="1.5" />
  <text x="340" y="296" font-family="system-ui, sans-serif" font-size="14"
        font-weight="700" fill="#ffffff" text-anchor="middle"
        dominant-baseline="central">Core Principles</text>
</svg>
