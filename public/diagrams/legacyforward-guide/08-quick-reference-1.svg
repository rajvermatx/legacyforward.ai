<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-ke1" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="22" font-family="system-ui, sans-serif" font-size="15"
        font-weight="700" fill="#1e293b" text-anchor="middle"
        dominant-baseline="central">Kill Early — The Cost of Delay</text>

  <!-- Axes -->
  <!-- Y axis -->
  <line x1="72" y1="44" x2="72" y2="310" stroke="#64748b" stroke-width="1.5" />
  <!-- X axis -->
  <line x1="72" y1="310" x2="648" y2="310" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#arrow-ke1)" />

  <!-- Y-axis label -->
  <text x="18" y="177" font-family="system-ui, sans-serif" font-size="11"
        font-weight="600" fill="#64748b" text-anchor="middle"
        dominant-baseline="central" transform="rotate(-90,18,177)">Relative Cost</text>

  <!-- Y-axis tick labels -->
  <text x="64" y="310" font-family="system-ui, sans-serif" font-size="9"
        fill="#94a3b8" text-anchor="end" dominant-baseline="central">1x</text>
  <text x="64" y="262" font-family="system-ui, sans-serif" font-size="9"
        fill="#94a3b8" text-anchor="end" dominant-baseline="central">10x</text>
  <text x="64" y="214" font-family="system-ui, sans-serif" font-size="9"
        fill="#94a3b8" text-anchor="end" dominant-baseline="central">25x</text>
  <text x="64" y="166" font-family="system-ui, sans-serif" font-size="9"
        fill="#94a3b8" text-anchor="end" dominant-baseline="central">50x</text>
  <text x="64" y="118" font-family="system-ui, sans-serif" font-size="9"
        fill="#94a3b8" text-anchor="end" dominant-baseline="central">75x</text>
  <text x="64" y="70" font-family="system-ui, sans-serif" font-size="9"
        fill="#94a3b8" text-anchor="end" dominant-baseline="central">100x</text>

  <!-- Gridlines -->
  <line x1="72" y1="262" x2="630" y2="262" stroke="#f1f5f9" stroke-width="1" />
  <line x1="72" y1="214" x2="630" y2="214" stroke="#f1f5f9" stroke-width="1" />
  <line x1="72" y1="166" x2="630" y2="166" stroke="#f1f5f9" stroke-width="1" />
  <line x1="72" y1="118" x2="630" y2="118" stroke="#f1f5f9" stroke-width="1" />
  <line x1="72" y1="70" x2="630" y2="70" stroke="#f1f5f9" stroke-width="1" />

  <!--
    Bar data (7 bars):
    Labels:       Hypothesis  Validation  Frame   Explore  Harden   Operate  Never
    Multipliers:  1x          2x          5x      10x      25x      50x      100x
    Max value = 100x, chart area height = 266px (from y=44 to y=310)
    Scale: 1 unit = 2.66px

    Bar heights:
      1x   = 2.66 px  → top y = 307
      2x   = 5.32 px  → top y = 305
      5x   = 13.3 px  → top y = 297
      10x  = 26.6 px  → top y = 283
      25x  = 66.5 px  → top y = 244
      50x  = 133px    → top y = 177
      100x = 266px    → top y = 44

    Bar width = 62, gap = 20
    Starting x = 80, bar centers: 80,80+82,80+164,...
    Bar x positions: 80, 162, 244, 326, 408, 490, 572
    Bar width: 62
  -->

  <!-- Bar 1: Hypothesis — green, 1x -->
  <rect x="80" y="307" width="54" height="3" rx="2"
        fill="#16a34a" />
  <text x="107" y="326" font-family="system-ui, sans-serif" font-size="9"
        fill="#64748b" text-anchor="middle" dominant-baseline="central">Hypothesis</text>
  <text x="107" y="337" font-family="system-ui, sans-serif" font-size="8"
        fill="#16a34a" font-weight="700" text-anchor="middle" dominant-baseline="central">1x</text>

  <!-- Bar 2: Validation — light green, 2x -->
  <rect x="158" y="304" width="54" height="6" rx="2"
        fill="#4ade80" />
  <text x="185" y="326" font-family="system-ui, sans-serif" font-size="9"
        fill="#64748b" text-anchor="middle" dominant-baseline="central">Validation</text>
  <text x="185" y="337" font-family="system-ui, sans-serif" font-size="8"
        fill="#16a34a" font-weight="700" text-anchor="middle" dominant-baseline="central">2x</text>

  <!-- Bar 3: Frame — yellow-green, 5x -->
  <rect x="236" y="296" width="54" height="14" rx="2"
        fill="#a3e635" />
  <text x="263" y="326" font-family="system-ui, sans-serif" font-size="9"
        fill="#64748b" text-anchor="middle" dominant-baseline="central">Frame</text>
  <text x="263" y="337" font-family="system-ui, sans-serif" font-size="8"
        fill="#65a30d" font-weight="700" text-anchor="middle" dominant-baseline="central">5x</text>

  <!-- Bar 4: Explore — yellow, 10x -->
  <rect x="314" y="283" width="54" height="27" rx="2"
        fill="#facc15" />
  <text x="341" y="326" font-family="system-ui, sans-serif" font-size="9"
        fill="#64748b" text-anchor="middle" dominant-baseline="central">Explore</text>
  <text x="341" y="337" font-family="system-ui, sans-serif" font-size="8"
        fill="#854d0e" font-weight="700" text-anchor="middle" dominant-baseline="central">10x</text>

  <!-- Bar 5: Harden — orange, 25x -->
  <rect x="392" y="243" width="54" height="67" rx="2"
        fill="#fb923c" />
  <text x="419" y="326" font-family="system-ui, sans-serif" font-size="9"
        fill="#64748b" text-anchor="middle" dominant-baseline="central">Harden</text>
  <text x="419" y="337" font-family="system-ui, sans-serif" font-size="8"
        fill="#9a3412" font-weight="700" text-anchor="middle" dominant-baseline="central">25x</text>

  <!-- Bar 6: Operate — red-orange, 50x -->
  <rect x="470" y="177" width="54" height="133" rx="2"
        fill="#f87171" />
  <text x="497" y="326" font-family="system-ui, sans-serif" font-size="9"
        fill="#64748b" text-anchor="middle" dominant-baseline="central">Operate</text>
  <text x="497" y="337" font-family="system-ui, sans-serif" font-size="8"
        fill="#991b1b" font-weight="700" text-anchor="middle" dominant-baseline="central">50x</text>

  <!-- Bar 7: Never — deep red, 100x -->
  <rect x="548" y="44" width="54" height="266" rx="2"
        fill="#dc2626" />
  <text x="575" y="326" font-family="system-ui, sans-serif" font-size="9"
        fill="#64748b" text-anchor="middle" dominant-baseline="central">Never</text>
  <text x="575" y="337" font-family="system-ui, sans-serif" font-size="8"
        fill="#991b1b" font-weight="700" text-anchor="middle" dominant-baseline="central">100x</text>

  <!-- Large X over "Never" bar -->
  <line x1="552" y1="48" x2="598" y2="306" stroke="#7f1d1d" stroke-width="4" stroke-linecap="round" />
  <line x1="598" y1="48" x2="552" y2="306" stroke="#7f1d1d" stroke-width="4" stroke-linecap="round" />

  <!-- Footer note -->
  <text x="340" y="362" font-family="system-ui, sans-serif" font-size="10"
        fill="#94a3b8" text-anchor="middle" dominant-baseline="central">The cheapest initiative you can kill is the one you kill earliest.</text>
</svg>
