  <text x="154" y="66" font-family="system-ui, sans-serif" font-size="13"
        font-weight="700" fill="#94a3b8" text-anchor="middle"
        dominant-baseline="central">Legacy Environment</text>

  <!-- LEFT items -->
  <rect x="36" y="82" width="236" height="40" rx="6"
