  <!-- Crossing arrows with labels -->
  <!-- Arrow 1: Format Translation — y=102 -->
  <path d="M272 102 L408 102" fill="none" stroke="#64748b" stroke-width="1.5"
        marker-end="url(#arrow-lc2)" />
  <rect x="298" y="88" width="84" height="16" rx="3" fill="#ffffff" />
  <text x="340" y="96" font-family="system-ui, sans-serif" font-size="9"
        font-weight="600" fill="#64748b" text-anchor="middle"
