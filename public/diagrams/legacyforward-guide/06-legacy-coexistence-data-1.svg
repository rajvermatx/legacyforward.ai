  <text x="154" y="102" font-family="system-ui, sans-serif" font-size="12"
        font-weight="600" fill="#cbd5e1" text-anchor="middle"
        dominant-baseline="central">EBCDIC Data</text>

  <rect x="36" y="132" width="236" height="40" rx="6"
        fill="#334155" stroke="#475569" stroke-width="1" />
  <text x="154" y="152" font-family="system-ui, sans-serif" font-size="12"
