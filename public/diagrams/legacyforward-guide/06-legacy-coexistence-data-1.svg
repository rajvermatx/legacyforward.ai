  <rect x="304" y="180" width="72" height="16" rx="3" fill="#ffffff" />
  <text x="340" y="188" font-family="system-ui, sans-serif" font-size="9"
        font-weight="600" fill="#64748b" text-anchor="middle"
        dominant-baseline="central">Governance</text>

  <!-- Arrow 3: Lineage Tracking — y=252 -->
  <path d="M272 252 L408 252" fill="none" stroke="#0d9488" stroke-width="1.5"
        marker-end="url(#arrow-lc2r)" />
  <rect x="294" y="240" width="92" height="16" rx="3" fill="#ffffff" />
  <text x="340" y="248" font-family="system-ui, sans-serif" font-size="9"
        font-weight="600" fill="#0d9488" text-anchor="middle"
        dominant-baseline="central">Lineage Tracking</text>
